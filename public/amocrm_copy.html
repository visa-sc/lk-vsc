<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Копия amoCRM — VSC</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sb-bg:#17293e; --sb-ico:#8299b3; --sb-act:#4ba3e3; --sb-txt:#a9bbcf;
    --blue:#2e80ec; --link:#3a87c8; --txt:#313942; --mut:#92989b;
    --border:#e4e7ea; --border-soft:#eef1f4; --bg:#fff; --feed-bg:#f4f5f8;
    --green:#6fc48d; --task-green:#4caf50;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; font:15px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "PT Sans", Arial, sans-serif; color:var(--txt); background:var(--bg); overflow:hidden; -webkit-font-smoothing:antialiased; }
  a, .lnk { color:var(--link); text-decoration:none; cursor:pointer; background:none; border:0; font:inherit; padding:0; }
  a:hover, .lnk:hover { text-decoration:underline; }

  /* ── сайдбар (как в amo: лого сверху, скролл-меню, колокольчик снизу) ── */
  #app { display:flex; height:100vh; }
  /* цвета сайдбара сняты со скриншота реальной amo: плоский тёмный графит-синий, без градиента */
  aside { width:66px; background:#141c28; display:flex; flex-direction:column; align-items:center; flex-shrink:0; z-index:60; }
  /* лого = amo: приглушённая стальная плитка (цвет со скрина amo), белые V|S|C с разделителями */
  .logo { width:66px; height:64px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; cursor:pointer; flex-shrink:0; background:#3589BD; }
  .logo i { display:inline-block; width:1px; height:15px; background:rgba(255,255,255,.5); margin:0 5px; }
  .logo:hover { filter:brightness(1.08); }
  .nav-scroll { flex:1; width:66px; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
  .nav-scroll::-webkit-scrollbar { width:0; height:0; }
  .nav-i { position:relative; width:66px; padding:11px 0 9px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; border:0; background:none; transition:background .12s; }
  .nav-i:hover { background:rgba(255,255,255,.04); }
  .nav-i svg { width:22px; height:22px; stroke:var(--sb-ico); fill:none; stroke-width:1.6; }
  .nav-i span { font-size:9.5px; color:var(--sb-txt); line-height:1.15; text-align:center; }
  .nav-i.act { background:rgba(75,163,227,.10); }
  .nav-i.act svg { stroke:var(--sb-act); }
  .nav-i.act span { color:#fff; }
  .nav-i:hover svg { stroke:#cfe2f3; }
  .nav-sep { width:34px; height:1px; background:rgba(255,255,255,.08); margin:6px auto; }
  .nav-badge { position:absolute; top:5px; right:11px; min-width:16px; height:16px; padding:0 4px; border-radius:9px; background:#e5484d; color:#fff; font-size:9.5px; font-weight:700; line-height:16px; text-align:center; box-shadow:0 0 0 2px #141c28; }
  .nav-badge.green { background:#3fb27f; }
  .sb-bell { position:relative; width:66px; padding:12px 0 14px; display:flex; justify-content:center; cursor:pointer; flex-shrink:0; border-top:1px solid rgba(255,255,255,.06); }
  .sb-bell svg { width:23px; height:23px; stroke:var(--sb-ico); fill:none; stroke-width:1.6; }
  .sb-bell:hover svg { stroke:#cfe2f3; }
  .sb-bell .nav-badge { top:8px; right:12px; }
  /* профиль юзера внизу сайдбара (как в amo) */
  .sb-user { width:66px; padding:4px 0 14px; display:flex; justify-content:center; cursor:pointer; flex-shrink:0; }
  .sb-user .av { width:32px; height:32px; border-radius:50%; background:#3b5878; color:#e8eef5; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; letter-spacing:.5px; }
  .sb-user:hover .av { background:#46688f; }
  .profile-pop { position:fixed; left:74px; bottom:12px; z-index:300; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 30px rgba(20,40,70,.18); min-width:230px; padding:6px 0; font-size:13.5px; }
  .profile-pop .ph { padding:8px 14px 10px; border-bottom:1px solid #eef1f4; }
  .profile-pop .ph b { display:block; font-size:14px; }
  .profile-pop .ph span { color:var(--mut); font-size:12px; }
  .profile-pop .pi { padding:9px 14px; cursor:pointer; }
  .profile-pop .pi:hover { background:#f2f6fa; }
  /* глобальный поиск сверху (выпадашка результатов) */
  .gs-box { position:fixed; z-index:320; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 10px 34px rgba(20,40,70,.16); max-height:62vh; overflow:auto; display:none; }
  .gs-box .gs-h { padding:8px 14px 4px; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--mut); }
  .gs-box .gs-row { padding:8px 14px; cursor:pointer; font-size:13.5px; display:flex; gap:8px; align-items:baseline; justify-content:space-between; }
  .gs-box .gs-row:hover { background:#f2f6fa; }
  .gs-box .gs-sub { color:var(--mut); font-size:12px; white-space:nowrap; }
  .gs-box .gs-st { font-size:11px; padding:1px 7px; border-radius:4px; margin-left:6px; color:#3b4650; white-space:nowrap; }
  .gs-box .gs-more { border-top:1px solid #eef1f4; }
  .gs-box .gs-empty { padding:12px 14px; color:var(--mut); font-size:13px; }
  .composer .qd { font-size:12px; color:var(--link); cursor:pointer; align-self:center; white-space:nowrap; }
  /* ── карточка сделки как в amo: тёмная шапка ── */
  .dl-dark { background:#2e3d4e; padding:14px 20px 14px; position:relative; }
  .dl-dark .back { color:#9fb0c0; }
  .dl-dark h2 { color:#fff; }
  .dl-dark .dl-sub { color:#8fa1b3; }
  .dl-dark .tag { background:rgba(255,255,255,.14); border-color:transparent; color:#e2ebf3; }
  .dl-dark .editable:hover { outline-color:rgba(255,255,255,.3); }
  .dl-dots { position:absolute; top:14px; right:16px; color:#9fb0c0; cursor:pointer; letter-spacing:2px; font-weight:700; font-size:16px; padding:2px 6px; }
  .dl-dots:hover { color:#fff; }
  .stagew { margin-top:12px; cursor:pointer; }
  .stagew .pn { color:#8fa1b3; font-size:12.5px; }
  .stagew .sn { color:#fff; font-weight:700; display:flex; align-items:center; gap:7px; }
  .stagew .sn .caret2 { font-size:10px; color:#8fa1b3; }
  .stgbar { display:flex; gap:2px; margin-top:9px; }
  .stgbar i { flex:1; height:4px; border-radius:1px; background:rgba(255,255,255,.22); }
  /* дропдаун этапов всех воронок (клик по этапу в шапке) */
  .stage-dd { position:fixed; z-index:170; background:#fff; border-radius:12px; box-shadow:0 16px 48px rgba(20,40,70,.32); width:360px; max-height:72vh; overflow:auto; padding:6px 0; }
  .stage-dd .sd-p { padding:11px 16px 9px; font-weight:700; color:#5d6774; cursor:pointer; border-top:1px solid #eef1f4; font-size:13.5px; }
  .stage-dd .sd-p:first-child { border-top:0; }
  .stage-dd .sd-p:hover { color:var(--blue); }
  .stage-dd .sd-s { padding:9px 16px; cursor:pointer; font-size:13.5px; margin:1px 6px; border-radius:6px; }
  .stage-dd .sd-s:hover { filter:brightness(.94); }
  .stage-dd .sd-s.cur { font-weight:700; }
  /* пустые поля в стиле amo: серый лейбл + «...»/«Выбрать» */
  .fv-empty { color:#b6bfc9; }
  .frow-empty .fl { color:#aab4bf; }
  /* подразделитель внутри группы (--X--) */
  .fsub { display:flex; align-items:center; gap:8px; color:#6b7581; font-weight:700; font-size:12.5px; margin:12px 0 4px; cursor:pointer; }
  .fsub:before, .fsub:after { content:""; height:1px; background:#e4e9ef; flex:1; }
  .fsub:hover { color:var(--blue); }
  .fsub .fsub-caret { font-size:10px; color:#a7b0ba; transition:transform .15s; }
  .fsub2 .fsub-body { display:none; }
  .fsub2.open .fsub-body { display:block; }
  .fsub2.open .fsub-caret { transform:rotate(90deg); }
  /* мини-карточка контакта внизу карточки сделки (как amo) */
  .cmini { margin:8px 20px 0; padding:14px 0 6px; border-top:1px solid var(--border-soft); }
  .cmini .cm-head { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .cmini .ava2 { width:38px; height:38px; border-radius:50%; background:#dfe9f2; color:#41566b; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0; }
  .cmini .cm-name { color:var(--link); cursor:pointer; font-weight:700; }
  .cmini .frow { padding:4px 0; }
  .add-ent { display:flex; align-items:center; gap:12px; margin:0 20px; padding:10px 0; cursor:pointer; color:var(--link); }
  .add-ent .plus { width:36px; height:36px; border-radius:50%; border:1.5px solid #c9d6e2; display:flex; align-items:center; justify-content:center; font-size:20px; color:#8aa2b8; flex-shrink:0; }
  .add-ent:hover .plus { border-color:var(--blue); color:var(--blue); }
  /* правая панель «Виджеты» (как amo) */
  .dcard-w { width:248px; flex-shrink:0; border-left:1px solid var(--border); background:#fbfcfd; display:flex; flex-direction:column; overflow:auto; }
  .dcard-w h5 { margin:0; padding:16px 16px 10px; font-size:15px; }
  .wrow { display:flex; align-items:center; gap:9px; padding:11px 14px; border-top:1px solid #eef1f4; font-size:13px; color:#4a5663; cursor:pointer; }
  .wrow:hover { background:#f2f6fa; }
  .wrow .wico { width:22px; height:22px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; flex-shrink:0; font-weight:700; }
  .wadd { padding:12px 16px; color:var(--link); cursor:pointer; font-size:13px; }
  @media (max-width:1200px){ .dcard-w{ display:none; } }
  /* отвязка контакта в карточке сделки */
  .lc-unlink { color:#a7b3c0; cursor:pointer; padding:0 6px; font-size:14px; opacity:0; align-self:center; }
  .dl-contact:hover .lc-unlink { opacity:1; }
  .lc-unlink:hover { color:#e5484d; }
  /* сохранённые фильтры (пресеты) */
  .fsaved { display:flex; gap:6px; margin:0 0 12px; }
  .fsaved select { flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:9px; font:inherit; font-size:13px; }
  .fsaved .btn { padding:6px 10px; font-size:12px; white-space:nowrap; }
  /* чеклист мультисписка (редактор поля, как в amo) */
  .cf-multibox { background:#fff; border:1px solid #e4e9f0; border-radius:12px; padding:10px 12px; box-shadow:0 8px 26px rgba(20,40,70,.14); max-height:260px; overflow:auto; }
  .cf-multibox .cfm-item { display:block; padding:5px 2px; font-size:13.5px; cursor:pointer; }
  .cf-multibox .cfm-item:hover { color:var(--blue); }
  .cf-multibox .cfm-acts { display:flex; gap:6px; margin-top:10px; position:sticky; bottom:0; background:#fff; padding-top:6px; }
  .cf-multibox .btn { padding:6px 12px; font-size:12.5px; }
  .notif-panel { position:fixed; z-index:200; width:320px; background:#fff; border-radius:12px; box-shadow:0 12px 40px rgba(20,40,70,.28); overflow:hidden; font-size:13.5px; }
  .notif-panel .np-h { padding:14px 18px; font-weight:700; font-size:15px; border-bottom:1px solid var(--border-soft); }
  .notif-panel .np-item { padding:13px 18px; border-bottom:1px solid var(--border-soft); cursor:pointer; }
  .notif-panel .np-item:hover { background:#f6f9fc; }
  .notif-panel .np-item b { font-size:15px; }
  .notif-panel .np-item.hot b { color:#e5484d; }
  .notif-panel .np-item span { color:var(--mut); font-size:12px; }
  .notif-panel .np-note { padding:12px 18px; color:var(--mut); font-size:12px; background:#fafbfc; }
  /* заглушка внешних разделов (Почта/imBox/Wazzup/F.Doc/amoМаркет) */
  .ext-wrap { max-width:640px; margin:60px auto; text-align:center; padding:0 24px; }
  .ext-wrap .ext-ico { width:76px; height:76px; margin:0 auto 22px; border-radius:20px; background:linear-gradient(135deg,#eaf2fb,#dce8f6); display:flex; align-items:center; justify-content:center; }
  .ext-wrap .ext-ico svg { width:38px; height:38px; stroke:var(--blue); fill:none; stroke-width:1.5; }
  .ext-wrap h2 { font-size:22px; margin:0 0 10px; }
  .ext-wrap p { color:var(--mut); font-size:14.5px; line-height:1.6; margin:0 0 8px; }
  .ext-wrap .ext-badge { display:inline-block; margin-top:14px; padding:5px 13px; border-radius:20px; background:#fff4e5; color:#c47f1a; font-size:12.5px; font-weight:700; }
  /* вкладки раздела «Списки» (как в amo: Контакты/Компании/каталоги) */
  .lists-tabs { position:sticky; top:0; z-index:8; display:flex; gap:2px; padding:8px 16px 0; background:#fff; border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
  .lists-tabs::-webkit-scrollbar { height:0; }
  .lists-tabs .lt { border:0; background:none; font:inherit; font-size:13.5px; color:var(--mut); padding:8px 14px 12px; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .lists-tabs .lt:hover { color:var(--txt); }
  .lists-tabs .lt.act { color:var(--txt); font-weight:700; border-bottom-color:var(--blue); }

  /* ── шапка ── */
  #wrap { flex:1; display:flex; flex-direction:column; min-width:0; }
  header { height:64px; display:flex; align-items:center; padding:0 16px 0 24px; gap:18px; border-bottom:1px solid transparent; flex-shrink:0; }
  #secTitle { font-size:17px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; cursor:default; }
  #secTitle.clickable { cursor:pointer; }
  #secTitle .caret { font-size:11px; color:var(--mut); margin-left:6px; }
  .search { flex:1; max-width:560px; display:flex; align-items:center; gap:8px; color:#b6bcc3; background:#f4f5f7; border-radius:10px; padding:9px 14px; transition:background .15s, box-shadow .15s; }
  .search:focus-within { background:#fff; box-shadow:0 0 0 1.5px #bcd4f0, 0 2px 10px rgba(30,60,100,.06); }
  .search svg { width:16px; height:16px; stroke:#b6bcc3; fill:none; stroke-width:2; flex-shrink:0; }
  .search input { border:0; outline:0; font:inherit; width:100%; color:var(--txt); }
  .search input::placeholder { color:#b6bcc3; }
  #hCount { margin-left:auto; white-space:nowrap; color:var(--txt); font-size:14px; }
  #hCount b { font-size:16px; }
  .hbtn { border:1px solid var(--border); background:#fff; border-radius:9px; padding:8px 15px; font:inherit; font-size:12.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--txt); cursor:pointer; transition:background .15s, box-shadow .15s, transform .1s; }
  .hbtn:hover { background:#f7f9fb; box-shadow:0 1px 6px rgba(30,60,100,.08); }
  .hbtn:active { transform:scale(.985); }
  .hbtn.blue { background:var(--blue); border-color:var(--blue); color:#fff; }
  .hbtn.blue:hover { background:#2a74d6; }
  .hbtn.dots { padding:8px 10px; letter-spacing:2px; }

  main { flex:1; overflow:auto; position:relative; }

  /* ── выпадающий список воронок (как в амо) ── */
  #pipePanel { position:absolute; top:0; left:0; bottom:0; width:330px; background:#fff; box-shadow:2px 0 18px rgba(20,40,70,.18); z-index:55; padding:0; display:none; flex-direction:column; }
  #pipePanel h3 { font-size:17px; text-transform:uppercase; font-weight:700; margin:0; padding:22px 24px 14px; }
  #pipePanel .pp-item { display:block; width:100%; text-align:left; background:none; border:0; border-top:1px solid var(--border-soft); padding:16px 24px; font:inherit; color:var(--txt); cursor:pointer; }
  #pipePanel .pp-item:hover { background:#f6f9fc; }
  #pipePanel .pp-item.act { color:var(--blue); font-weight:700; }
  #pipeShade { position:absolute; inset:0; background:rgba(20,35,60,.25); z-index:54; display:none; }

  /* ── канбан ── */
  #kb { display:flex; min-height:100%; }
  .kb-col { min-width:250px; width:250px; border-right:1px solid var(--border-soft); flex-shrink:0; }
  .kb-head { position:sticky; top:0; background:#fff; padding:12px 10px 8px; text-align:center; z-index:5; }
  .kb-head .nm { font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .kb-head .ct { font-size:12px; color:var(--mut); margin-top:2px; }
  .kb-head .bar { height:3px; border-radius:2px; margin-top:8px; background:#dfe3e8; }
  .col-resize { position:absolute; top:0; right:-4px; width:8px; height:100%; cursor:col-resize; z-index:2; user-select:none; }
  .col-resize:hover { background:linear-gradient(90deg,transparent 3px,#9fc3e8 3px,#9fc3e8 5px,transparent 5px); }
  table.amo th { position:relative; }
  table.amo th.sortable { cursor:pointer; user-select:none; }
  table.amo th.sortable:hover { color:var(--link); }
  .bulk-th, .bulk-cb { width:34px; text-align:center; }
  .bulk-bar { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:150; background:#2e3a48; color:#fff; border-radius:10px; padding:10px 16px; display:flex; gap:10px; align-items:center; box-shadow:0 8px 26px rgba(20,40,70,.32); font-size:13.5px; }
  .bulk-bar select { padding:5px 8px; border-radius:6px; border:none; font-size:13px; max-width:200px; }
  .bulk-bar .btn { padding:5px 12px; }
  .bulk-bar .btn.ghost { background:rgba(255,255,255,.15); color:#fff; }
  .bulk-bar .btn.ghost:hover { background:rgba(255,255,255,.28); }
  .deal-chip { display:inline-block; max-width:100%; padding:2px 8px; margin:2px 4px 2px 0; border-radius:3px; font-size:12.5px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; vertical-align:middle; }
  .deal-chip:hover { filter:brightness(.96); text-decoration:underline; }
  .kb-quick { margin:0 8px; padding:8px 10px; border:1.5px dashed #c9d3de; border-radius:9px; color:#7b8794; font-size:13px; text-align:center; cursor:pointer; background:#fafbfc; }
  .kb-quick:hover { border-color:var(--link); color:var(--link); background:#f2f7fd; }
  .kb-quick[data-open] { text-align:left; cursor:default; border-style:solid; }
  .kb-cards { padding:8px; }
  .kb-card { background:#fff; border:1px solid #e3e9f0; border-radius:10px; padding:10px 13px; margin-bottom:8px; cursor:pointer; position:relative; box-shadow:0 1px 2px rgba(25,50,85,.04); transition:box-shadow .15s, border-color .15s, transform .12s; }
  .kb-card:hover { border-color:#bed3e8; box-shadow:0 4px 14px rgba(25,50,85,.10); transform:translateY(-1px); }
  .kb-card .top { display:flex; justify-content:space-between; gap:6px; font-size:13px; }
  .kb-card .top .dt { color:var(--mut); font-size:12px; white-space:nowrap; }
  .kb-card .comp { color:var(--txt); font-size:13px; }
  .kb-card .cn { color:var(--txt); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .kb-card .rsp { color:var(--mut); font-size:12.5px; margin-top:1px; }
  .pin-task { margin:8px 12px; padding:9px 12px; background:#fff; border:1px solid var(--border); border-radius:10px; font-size:13px; display:flex; gap:8px; align-items:baseline; }
  .pin-task .pt-clock { flex-shrink:0; }
  .pin-task b { font-weight:600; }
  .kb-card .ttl { color:var(--link); font-size:14px; margin:2px 0; }
  .kb-card .tags { margin-top:3px; }
  /* индикатор задач на карточке канбана (как в amo) */
  .kb-task { font-size:12px; margin-top:5px; }
  .kb-task::before { content:""; display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:1px; background:currentColor; }
  .kb-task.none, .kb-task.over { color:#e05252; }
  .kb-task.today { color:#2fa96b; }
  .kb-task.fut { color:#98a2ad; }
  .tag { display:inline-block; background:#f2f4f6; border:1px solid #e7eaee; color:#6b7684; border-radius:3px; padding:0 6px; font-size:11.5px; margin:1px 3px 1px 0; }
  .kb-more { display:block; margin:2px auto 14px; }

  /* ── таблица контактов ── */
  table.amo { width:100%; border-collapse:collapse; font-size:14px; }
  table.amo th { text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#7c8691; font-weight:700; padding:12px 14px; border-bottom:1px solid var(--border); position:sticky; top:0; background:#fff; }
  table.amo td { padding:11px 14px; border-bottom:1px solid var(--border-soft); vertical-align:middle; }
  table.amo tr:hover td { background:#f8fafc; }

  /* ── карточка (сделка/контакт) ── */
  .dcard-bg { position:fixed; top:0; right:0; bottom:0; left:66px; z-index:100; display:flex; background:#fff; }
  .dcard-l { width:430px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:auto; }
  .dl-head { padding:16px 20px 0; }
  .dl-head .back { color:var(--mut); font-size:20px; margin-right:8px; cursor:pointer; }
  .dl-head h2 { display:inline; font-size:19px; margin:0; }
  .dl-sub { margin:8px 0 0; color:var(--mut); font-size:13px; }
  .dl-stage { padding:14px 20px 0; }
  .dl-stage .pn { color:var(--mut); font-size:12.5px; }
  .dl-stage .sn { font-weight:700; margin-top:2px; }
  .stage-bar { display:flex; gap:2px; margin-top:8px; }
  .stage-bar i { flex:1; height:4px; border-radius:1px; background:#e6eaee; }
  .dl-stage .stage-bar i { height:9px; cursor:pointer; }
  .dl-stage .stage-bar i:hover { outline:2px solid var(--blue); outline-offset:-1px; }
  .dl-tabs { display:flex; gap:16px; padding:14px 20px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
  .dl-tabs span { padding-bottom:9px; color:var(--mut); }
  .dl-tabs span.act { color:var(--txt); font-weight:700; border-bottom:2px solid var(--blue); }
  .fields { padding:6px 20px 20px; }
  .frow { display:flex; padding:7px 0; font-size:13.5px; border-bottom:1px dotted transparent; }
  .frow .fl { width:44%; color:#8b939c; flex-shrink:0; padding-right:8px; }
  .cf-act { margin-left:8px; text-decoration:none; font-size:13px; flex-shrink:0; opacity:.75; }
  .cf-act:hover { opacity:1; text-decoration:none; }
  .frow .fv { color:var(--txt); word-break:break-word; }
  .fgroup { background:#f3f5f7; border-radius:3px; padding:8px 12px; font-size:13px; color:#5d6774; margin:10px 0 4px; }
  /* сворачиваемые группы полей (как в amoCRM) */
  .fgrp { margin:4px -20px 0; border-top:1px solid var(--border); }
  .fgrp-h { padding:11px 20px; font-weight:600; font-size:13px; color:#3a4652; background:#f5f8fa; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }
  .fgrp-h:hover { background:#eaf1f7; }
  .fgrp-caret { color:#9aa4ae; transition:transform .15s; font-size:12px; }
  .fgrp.open .fgrp-caret { transform:rotate(90deg); }
  .fgrp-body { display:none; padding:2px 20px 8px; }
  .fgrp.open .fgrp-body { display:block; }
  .ro-lock { font-size:11px; opacity:.5; }
  .frow-empty .fl { color:#aab3bc; }
  .cf-empty .muted { font-size:12.5px; }
  .cf-empty:hover .muted { color:var(--link); }
  .dl-contact { border-top:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:10px; }
  .ava { width:36px; height:36px; border-radius:50%; background:#d7dee6; color:#5d6b7c; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
  .dcard-r { flex:1; background:var(--feed-bg); display:flex; flex-direction:column; min-width:0; }
  .feed-top { padding:14px 24px; color:#b6bcc3; display:flex; gap:8px; align-items:center; }
  .feed { flex:1; overflow:auto; padding:0 24px 12px; }
  .day-sep { text-align:center; margin:14px 0; }
  .day-sep b { background:#fff; border:1px solid var(--border); border-radius:14px; padding:3px 14px; font-size:12px; color:#7b848d; font-weight:400; }
  .ev { background:#fff; border:1px solid var(--border); border-radius:4px; padding:10px 14px; margin:8px 0; font-size:13.5px; }
  .ev .eh { color:var(--mut); font-size:12px; margin-bottom:4px; }
  .ev.note-y { background:#fffbea; border-color:#eddf9e; }
  .ev-grp-h { cursor:pointer; padding:6px 4px; color:#8a94a0; font-size:12px; }
  .ev-grp-h .grp-tgl { color:var(--link); margin-left:4px; }
  .ev-grp-b { border-left:2px solid #e3e7ec; margin-left:4px; padding-left:8px; }
  .ev.task { border-color:#bfdec7; background:#f6fbf7; }
  .ev.task.open { border-color:#e8b7b7; background:#fdf8f8; }
  .ev.call { border-left:3px solid #9ec7ea; }
  .feed-tabs { display:flex; gap:2px; padding:0 24px; }
  .feed-tabs span { background:#e9ebef; padding:4px 12px; font-size:12.5px; color:#5d6774; cursor:pointer; border-radius:2px 2px 0 0; }
  .feed-tabs span.act { background:#fff; font-weight:700; }
  .feed-note { background:#fff; border:1px solid var(--border); margin:0 24px 18px; padding:14px; font-size:13.5px; color:#b6bcc3; border-radius:0 3px 3px 3px; }
  .feed-note a { margin-right:4px; }
  /* редактирование */
  .editable { cursor:pointer; border-bottom:1px dashed transparent; }
  .editable:hover { border-bottom-color:#b9cde0; background:#f6f9fc; }
  h2.editable:hover { background:#f6f9fc; }
  .ci { padding:8px 11px; border:1px solid var(--border); border-radius:9px; font:inherit; font-size:13.5px; width:100%; transition:border-color .15s, box-shadow .15s; }
  .ci:focus { outline:none; border-color:#9cc1ec; box-shadow:0 0 0 3px rgba(46,128,236,.12); }
  .composer { border-top:1px solid var(--border); background:#fff; padding:10px 24px 16px; }
  .cbtns { display:flex; gap:14px; margin-bottom:8px; }
  .ctab { font-size:13px; color:var(--mut); cursor:pointer; padding-bottom:3px; }
  .ctab.act { color:var(--txt); font-weight:700; border-bottom:2px solid var(--blue); }
  .cbody { display:flex; gap:8px; align-items:flex-start; }
  .cbody textarea.ci { resize:vertical; }
  .task-done { color:var(--blue); cursor:pointer; }
  .dl-del { position:absolute; top:14px; right:16px; background:none; border:0; font-size:16px; cursor:pointer; opacity:.5; }
  .dl-del:hover { opacity:1; }
  .dl-head { position:relative; }
  .tags-edit { cursor:pointer; border-bottom:1px dashed transparent; }
  .tags-edit:hover { border-bottom-color:#b9cde0; }
  .lead-toggle { display:flex; gap:6px; padding:8px 12px; }
  .lead-toggle button { border:1px solid var(--border); background:#fff; border-radius:5px; padding:5px 12px; font:inherit; font-size:13px; cursor:pointer; color:var(--mut); }
  .lead-toggle button.act { background:var(--blue); border-color:var(--blue); color:#fff; }

  /* ── дашборд (рабочий стол) ── */
  #dash { min-height:100%; background:linear-gradient(160deg,#274f7f 0%,#3a7cb0 50%,#5fb0d8 100%); padding:26px; }
  /* воронка-полоса на рабочем столе (как в amo): воронки слева · +новые · этапы с большими цифрами */
  .fwa { max-width:1250px; margin:0 auto 22px; background:rgba(13,30,55,.30); border-radius:12px; padding:16px 18px; display:flex; gap:18px; align-items:stretch; color:#fff; }
  .fwa-pipes { flex-shrink:0; display:flex; flex-direction:column; gap:6px; justify-content:center; max-width:180px; }
  .fwa-p { font-size:12.5px; color:#cfe0f5; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:2px 8px; border-radius:6px; }
  .fwa-p.act { color:#fff; font-weight:700; background:rgba(255,255,255,.12); }
  .fwa-new { flex-shrink:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:0 16px; border-left:1px solid rgba(255,255,255,.15); border-right:1px solid rgba(255,255,255,.15); }
  .fwa-plus { font-size:34px; font-weight:700; line-height:1; }
  .fwa-nl { font-size:11px; letter-spacing:.08em; color:#cfe0f5; margin-top:4px; }
  .fwa-lost { font-size:11.5px; color:#b9cde6; margin-top:14px; }
  .fwa-sts { display:flex; gap:14px; overflow-x:auto; flex:1; padding-bottom:4px; scrollbar-width:thin; }
  .fwa-st { min-width:150px; flex-shrink:0; }
  .fwa-sn { font-size:11px; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#e7f0fa; }
  .fwa-su { font-size:11px; color:#b9cde6; margin:2px 0 4px; }
  .fwa-line { height:3px; border-radius:2px; margin-bottom:8px; }
  .fwa-box { border:1px solid rgba(255,255,255,.35); border-radius:8px; padding:10px 8px 8px; text-align:center; }
  .fwa-big { font-size:30px; font-weight:700; line-height:1; }
  .fwa-rub { font-size:11.5px; color:#cfe0f5; margin-top:4px; border-top:1px solid rgba(255,255,255,.25); padding-top:5px; }
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:12px; max-width:1250px; margin:0 auto; }
  .dash-card { background:rgba(13,30,55,.42); border-radius:8px; padding:16px 18px; color:#fff; }
  .dash-card b { font-size:30px; color:#a8c4f0; font-weight:700; display:block; }
  .dash-card span { font-size:12.5px; color:#b8c9e2; text-transform:uppercase; letter-spacing:.04em; }
  .dash-note { max-width:1250px; margin:0 auto 16px; color:#cfdcf0; font-size:13px; }
  /* ── рабочий стол как в amo: заголовок, пилюли периода, воронка, виджеты ── */
  .desk-title { text-align:center; color:#fff; font-size:34px; font-weight:700; letter-spacing:.02em; padding:30px 0 22px; }
  .desk-bar { max-width:1250px; margin:0 auto 22px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .desk-pills { display:inline-flex; background:rgba(255,255,255,.14); border-radius:22px; padding:3px; }
  .desk-pills button { border:0; background:none; color:#dbe7f7; font:inherit; font-size:13px; padding:7px 16px; border-radius:20px; cursor:pointer; white-space:nowrap; }
  .desk-pills button.act { background:#fff; color:#1d3c66; font-weight:700; }
  .desk-cfg { margin-left:auto; border:0; background:rgba(255,255,255,.14); color:#fff; font:inherit; font-size:13px; padding:8px 16px; border-radius:20px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .desk-cfg:hover { background:rgba(255,255,255,.24); }
  /* воронка-виджет */
  .funnel-w { max-width:1250px; margin:0 auto 22px; background:rgba(13,30,55,.42); border-radius:10px; padding:18px 20px; }
  .funnel-w .fw-h { color:#cfe0f5; font-size:12.5px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px; display:flex; justify-content:space-between; }
  .funnel-row { display:flex; gap:8px; align-items:flex-end; overflow-x:auto; padding-bottom:4px; }
  .funnel-stage { min-width:120px; flex:1; }
  .funnel-stage .fs-bar { height:8px; border-radius:3px; margin-bottom:8px; }
  .funnel-stage .fs-c { color:#fff; font-size:26px; font-weight:700; }
  .funnel-stage .fs-n { color:#aec4e2; font-size:11px; text-transform:uppercase; letter-spacing:.03em; margin-top:3px; line-height:1.25; }
  .funnel-stage .fs-s { color:#8fb0d8; font-size:12px; margin-top:3px; }
  /* виджеты-статистика (тёмные карточки) */
  .w-grid { max-width:1250px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
  /* тайл как в amo: имя → крупное число → сумма → линия-разделитель → зелёная дельта внизу.
     Поток flex-колонкой, дельта прижата margin-top:auto — ничего не наезжает (баг был: второе
     absolute-правило .w-delta клало дельту поверх числа/суммы) */
  .w-card { position:relative; display:flex; flex-direction:column; background:#12233f; border:1px solid rgba(255,255,255,.06); border-radius:10px; padding:16px 18px 14px; color:#fff; min-height:150px; cursor:pointer; transition:border-color .15s, transform .1s; }
  .w-card:hover { border-color:rgba(142,166,247,.45); }
  .w-card:active { transform:scale(.99); }
  .w-card .w-name { font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#9fb6d6; font-weight:700; margin-bottom:12px; padding-right:18px; line-height:1.3; }
  .w-card .w-count { font-size:34px; font-weight:700; color:#8ea6f7; line-height:1.05; word-break:break-word; }
  .w-card .w-sum { font-size:13.5px; color:#cdd8ea; margin-top:6px; min-height:17px; }
  .w-card .w-delta { margin-top:auto; padding-top:8px; border-top:1px solid rgba(255,255,255,.16); font-size:12px; color:#aebdd0; min-height:15px; display:flex; align-items:baseline; gap:5px; }
  .w-card .w-plus { color:#5ecb87; font-size:15px; font-weight:700; }
  .w-card .w-del { position:absolute; top:10px; right:11px; color:#5b6f8c; cursor:pointer; font-size:15px; line-height:1; opacity:0; }
  .w-card:hover .w-del { opacity:1; }
  .w-card .w-del:hover { color:#e5484d; }
  .w-add { display:flex; align-items:center; justify-content:center; border:1.5px dashed rgba(255,255,255,.22); border-radius:10px; color:#cfe0f5; font-size:14px; cursor:pointer; min-height:132px; background:rgba(255,255,255,.03); }
  .w-add:hover { border-color:rgba(255,255,255,.5); background:rgba(255,255,255,.07); }

  /* ── прочие разделы (автоматизации/справочники/доработки) ── */
  .plain { padding:20px 26px; max-width:1250px; }
  .pcard { background:#fff; border:1px solid #e8ecf1; border-radius:14px; padding:20px 24px; margin-bottom:16px; box-shadow:0 1px 3px rgba(25,50,85,.04); }
  .pcard h2 { font-size:16px; margin:0 0 10px; }
  h3 { font-size:14px; margin:14px 0 8px; }
  .muted { color:var(--mut); }
  pre { background:#f3f5f8; border-radius:4px; padding:10px; overflow:auto; font-size:12px; max-height:420px; }
  details { margin:6px 0; }
  summary { cursor:pointer; font-weight:700; font-size:13.5px; }
  .md table, .plain table { width:100%; border-collapse:collapse; font-size:13px; }
  .md th,.md td,.plain th,.plain td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border-soft); vertical-align:top; }
  .md h1 { font-size:18px; } .md h2 { font-size:15px; margin:16px 0 6px; } .md h3 { font-size:13.5px; }
  .flag { font-size:12px; padding:2px 8px; border-radius:3px; background:#fdecec; color:#c0392b; }
  .flag.ok { background:#e8f6ee; color:#27865a; }
  .flag.warn { background:#fdf3e0; color:#9a6b00; }
  .pill { display:inline-block; background:#f2f4f6; border:1px solid #e7eaee; border-radius:3px; padding:1px 8px; font-size:12px; margin:2px 4px 2px 0; color:#5d6774; }
  input.ti { padding:9px 12px; border:1px solid var(--border); border-radius:4px; font:inherit; }
  button.btn { background:var(--blue); color:#fff; border:0; border-radius:9px; padding:9px 17px; cursor:pointer; font:inherit; font-size:13px; transition:background .15s, transform .1s, box-shadow .15s; }
  button.btn:hover { background:#2a74d6; box-shadow:0 2px 8px rgba(46,128,236,.25); }
  button.btn:active { transform:scale(.985); }

  /* ── логин ── */
  #login-screen { position:fixed; inset:0; background:var(--sb-bg); display:flex; align-items:center; justify-content:center; z-index:200; }
  .login-box { background:#fff; border-radius:10px; padding:34px 38px; width:360px; text-align:center; }
  .login-box .lg { width:54px; height:54px; border-radius:10px; background:#2e5f8f; color:#fff; font-weight:700; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; letter-spacing:2px; }
  .login-box h2 { margin:0 0 16px; font-size:18px; }
  .login-box input { width:100%; text-align:center; font-size:18px; letter-spacing:4px; margin-bottom:12px; }
  .login-box .err { color:#c0392b; font-size:13px; min-height:18px; margin-bottom:4px; }
  .ltabs { display:flex; gap:4px; margin:0 0 14px; border-bottom:1px solid #e6ebf0; }
  .ltab { flex:1; padding:8px 0; font-size:13.5px; cursor:pointer; color:#6b7581; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .ltab.act { color:#2e5f8f; border-bottom-color:#2e5f8f; font-weight:600; }
  .login-box .ti { text-align:left; font-size:15px; letter-spacing:0; }
  #loginCode { text-align:center; font-size:18px; letter-spacing:4px; }

  /* ── универсальное модальное окно ── */
  .modal-bg { position:fixed; inset:0; z-index:150; background:rgba(20,35,60,.34); display:flex; align-items:flex-start; justify-content:center; padding-top:8vh; }
  .modal { background:#fff; border-radius:16px; padding:24px 28px; width:440px; max-width:92vw; max-height:82vh; overflow:auto; box-shadow:0 20px 60px rgba(20,40,70,.24), 0 4px 14px rgba(20,40,70,.10); position:relative; }
  .modal h2 { margin:0 0 14px; font-size:17px; }
  .modal h3 { margin:0 0 14px; font-size:16px; }
  .modal .mlbl { display:block; font-size:12px; color:#7c8691; text-transform:uppercase; letter-spacing:.03em; margin:14px 0 5px; }
  .modal .x { position:absolute; top:12px; right:14px; border:none; background:none; font-size:22px; line-height:1; cursor:pointer; color:#8a949e; }
  .modal .x:hover { color:#333; }
  .btn.ghost { background:#eef2f6; color:var(--txt); }
  .btn.ghost:hover { background:#e2e8ef; }
  /* контекстное меню (кнопка «···») */
  .ctxmenu { position:fixed; z-index:160; background:#fff; border:1px solid #e8ecf1; border-radius:12px; box-shadow:0 12px 36px rgba(20,40,70,.18), 0 2px 8px rgba(20,40,70,.08); padding:6px; min-width:210px; }
  .ctxmenu div:not(.sep) { border-radius:8px; }
  .ctxmenu div { padding:9px 16px; font-size:14px; cursor:pointer; white-space:nowrap; }
  .ctxmenu div:hover { background:#f0f4f8; }
  .ctxmenu .sep { height:1px; background:var(--border); padding:0; margin:5px 0; cursor:default; }
  /* ── настройки ── */
  .stabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin:-4px -4px 16px; padding:0 4px; flex-wrap:wrap; }
  .stab { padding:9px 16px; font-size:14px; cursor:pointer; color:#6b7581; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .stab.act { color:var(--link); border-bottom-color:var(--link); font-weight:600; }
  .stab:hover { color:var(--link); }
  table.set { width:100%; border-collapse:collapse; font-size:13.5px; }
  table.set th { text-align:left; padding:8px 10px; color:#8a949e; font-weight:600; font-size:12px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  table.set td { padding:8px 10px; border-bottom:1px solid #eef2f6; vertical-align:middle; }
  table.set tr:hover td { background:#f7fafc; }
  .set select, .set input[type=text] { padding:5px 8px; border:1px solid var(--border); border-radius:6px; font-size:13px; }
  .rperm { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .rperm label { font-size:13px; display:inline-flex; align-items:center; gap:5px; cursor:pointer; white-space:nowrap; }
  .role-card { border:1px solid var(--border); border-radius:9px; padding:14px 16px; margin-bottom:12px; }
  .role-card h3 { margin:0 0 10px; font-size:15px; display:flex; align-items:center; gap:8px; }
  .badge-adm { background:#eaf3ff; color:#2b6cb0; font-size:11px; padding:2px 7px; border-radius:20px; }
  .swatch { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  /* ── фильтр (как в amoCRM: клик по поиску) ── */
  .filter-panel { position:fixed; z-index:140; background:#fff; border:1px solid #e8ecf1; border-radius:16px; box-shadow:0 18px 50px rgba(20,40,70,.20), 0 4px 12px rgba(20,40,70,.08); padding:18px 20px; width:520px; max-width:94vw; }
  .filter-panel h4 { margin:0 0 12px; font-size:14px; color:#33404d; }
  .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }
  .ffield { display:flex; flex-direction:column; gap:4px; }
  .ffield label { font-size:11.5px; color:#8a949e; text-transform:uppercase; font-weight:600; }
  .ffield input, .ffield select { padding:7px 9px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; width:100%; }
  .frange { display:flex; gap:6px; align-items:center; }
  .frange input { width:100%; }
  .cf-sec { margin-top:14px; border-top:1px solid var(--border); padding-top:10px; }
  .cf-sec-h { font-size:11.5px; color:#8a949e; text-transform:uppercase; font-weight:600; margin-bottom:8px; }
  .cf-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
  .cf-row .cf-field { flex:1.2; min-width:0; padding:6px 8px; border:1px solid var(--border); border-radius:7px; font-size:13px; }
  .cf-row .cf-val { flex:1; min-width:0; padding:6px 8px; border:1px solid var(--border); border-radius:7px; font-size:13px; }
  .cf-row .cf-del { border:none; background:#eef2f6; color:#8a949e; width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:16px; flex-shrink:0; }
  .cf-row .cf-del:hover { background:#f5d5d5; color:#c0392b; }
  .cf-add { border:none; background:none; color:var(--link); font-size:13px; cursor:pointer; padding:2px 0; }
  .filter-acts { display:flex; gap:8px; margin-top:14px; }
  .filter-acts .btn.ghost { background:#eef2f6; color:#33404d; }
  /* дропдаун выбора сотрудника/отдела на рабочем столе (как «Мои ⌄» в amo) */
  .dsel-pop { position:fixed; z-index:310; width:300px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 14px 44px rgba(20,40,70,.22); padding:10px; }
  .dsel-pop .ds-q { margin-bottom:6px; }
  .dsel-pop .ds-list { max-height:52vh; overflow:auto; }
  .dsel-pop .ds-grp { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 8px 5px; font-size:11px; font-weight:700; letter-spacing:.04em; color:#5d6774; cursor:pointer; border-top:1px solid var(--border-soft); margin-top:4px; }
  .dsel-pop .ds-grp:first-child { border-top:0; margin-top:0; }
  .dsel-pop .ds-grp:hover { color:var(--blue); }
  .dsel-pop .ds-all { font-size:10px; font-weight:700; background:#e8f0fb; color:#3a6db4; border-radius:4px; padding:1px 6px; white-space:nowrap; }
  .dsel-pop .ds-row { padding:7px 8px; font-size:13.5px; border-radius:6px; cursor:pointer; }
  .dsel-pop .ds-row:hover { background:#f2f6fa; }
  .dsel-pop .ds-my { font-weight:700; }
  /* ── мобильная вёрстка (телефон): карточка стеком, шапка свайпом; в конце CSS, чтобы выигрывать каскад ── */
  @media (max-width:700px){
    header { gap:10px; padding:0 10px; overflow-x:auto; scrollbar-width:none; }
    header::-webkit-scrollbar { width:0; height:0; }
    .search { min-width:150px; }
    #hCount { display:none; }
    .kb-col { min-width:232px; width:232px; }
    .dcard-bg { flex-direction:column; overflow:auto; }
    .dcard-l { width:100%; flex-shrink:0; border-right:0; border-bottom:6px solid var(--border-soft); overflow:visible; }
    .dcard-r { flex:none; height:88vh; }
    .feed-top { padding:10px 14px; }
    .feed { padding:0 12px 12px; }
    .feed-tabs { padding:0 12px; overflow-x:auto; scrollbar-width:none; }
    .feed-tabs span { white-space:nowrap; }
    .composer { padding:10px 12px 14px; }
    .stage-dd { width:auto; max-width:94vw; }
    #pipePanel { width:300px; max-width:86vw; }
    .fwa { flex-wrap:wrap; gap:12px; }
    .fwa-pipes { max-width:46%; }
    .fwa-sts { flex-basis:100%; }
    #dash { padding:14px; }
    .filter-panel { padding:14px; left:8px !important; right:8px; width:auto; }
    .lists-tabs { padding:8px 8px 0; }
    .gs-box { left:8px !important; right:8px; width:auto !important; }
    .desk-title { font-size:24px; padding:16px 0 14px; }
    .desk-pills { max-width:100%; overflow-x:auto; scrollbar-width:none; }
    .desk-pills::-webkit-scrollbar { width:0; height:0; }
    .desk-pills button { padding:6px 11px; font-size:12px; }
  }
</style>
</head>
<body>
<div id="app" style="display:none">
  <aside id="sidebar"></aside>
  <div id="wrap">
    <header>
      <span id="secTitle"></span>
      <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg><input id="hSearch" placeholder="Поиск и фильтр"></div>
      <span id="hCount"></span>
      <button class="hbtn dots" id="hDots" title="Ещё">···</button>
      <button class="hbtn" id="hCfg">Настроить</button>
      <button class="hbtn blue" id="hNew">+ Новая сделка</button>
    </header>
    <main id="main">
      <div id="pipeShade"></div>
      <div id="pipePanel"></div>
      <div id="view"></div>
    </main>
  </div>
</div>
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="lg">V S C</div>
    <h2>Копия amoCRM</h2>
    <div class="ltabs"><span class="ltab act" data-l="user">Сотрудник</span><span class="ltab" data-l="code">По коду</span></div>
    <div class="err" id="loginErr"></div>
    <div id="lg-user">
      <input class="ti" type="email" id="loginEmail" placeholder="Рабочий email" autocomplete="username">
      <input class="ti" type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
      <div id="setHint" class="muted" style="display:none;font-size:12.5px;margin:-6px 0 10px">Первый вход — придумайте пароль (мин. 6 символов).</div>
      <button class="btn" style="width:100%" id="loginUserGo">Войти</button>
    </div>
    <div id="lg-code" style="display:none">
      <input class="ti" type="text" id="loginCode" placeholder="Код доступа" autocomplete="off">
      <button class="btn" style="width:100%" id="loginGo">Войти</button>
    </div>
    <p class="muted" style="font-size:12.5px">Или вход руководителя через <a href="/vsc">/vsc</a></p>
  </div>
</div>

<script>
(function(){
  "use strict";
  var API = "/amocrm_copy/api";
  var token=null, META=null, PIPES=[], USERS=[], KANBAN=null, CF=null, ME=null, curFilter=null, TASK_TYPES=[];
  var FSTATE={leads:{},contacts:{}};
  var $=function(s){return document.querySelector(s);};
  var esc=function(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});};
  var fmt=function(n){return (n==null?"—":Number(n).toLocaleString("ru-RU"));};
  var dt=function(ts){return ts?new Date(ts*1000).toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";};
  var dShort=function(ts){return ts?new Date(ts*1000).toLocaleDateString("ru-RU"):"";};
  var userName=function(id){var u=USERS.find(function(x){return x.id===id;});return u?u.name:(id||"");};

  function req(url){return fetch(url,{headers:{Authorization:"Bearer "+token}}).then(function(r){if(r.status===401)throw new Error("401");return r;});}
  function jreq(url){return req(url).then(function(r){return r.json();});}
  // запись (редактирование копии): POST/PATCH на /edit-api/*
  function ereq(method,path,body){
    return fetch(path,{method:method,headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined})
      .then(function(r){return r.json();});
  }
  function toast(msg,bad){
    var el=document.createElement("div");
    el.textContent=msg;
    el.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:300;background:"+(bad?"#c0392b":"#2f8b57")+";color:#fff;padding:9px 18px;border-radius:6px;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.2)";
    document.body.appendChild(el);
    setTimeout(function(){el.style.transition="opacity .4s";el.style.opacity="0";setTimeout(function(){el.remove();},400);},1800);
  }

  /* ─── сайдбар ─── */
  var ICONS = {
    desk:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
    leads:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-9 9"/><path d="M12 7a5 5 0 1 1-5 5"/><circle cx="12" cy="12" r="1.4"/></svg>',
    contacts:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.4"/><path d="M3.5 19c.6-3.2 2.8-5 5.5-5s4.9 1.8 5.5 5"/><circle cx="17" cy="9" r="2.6"/><path d="M15.5 14.3c2.4.2 4.1 1.7 4.7 4.2"/></svg>',
    auto:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"/></svg>',
    refs:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>',
    todo:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.6 2.6L16 9.5"/></svg>',
    tasks:'<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M8 12l2 2 4-4"/></svg>',
    companies:'<svg viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="13" rx="1"/><path d="M9 7V4h6v3M9 11h2M13 11h2M9 15h2M13 15h2"/></svg>',
    analytics:'<svg viewBox="0 0 24 24"><path d="M4 20V4M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/></svg>',
    lists:'<svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.3"/><circle cx="3.5" cy="12" r="1.3"/><circle cx="3.5" cy="18" r="1.3"/></svg>',
    customers:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c.7-4 3.5-6 7-6s6.3 2 7 6"/><path d="M12 2v1.5M18.4 5.6l-1 1M6.6 5.6l1 1"/></svg>',
    settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>',
    imbox:'<svg viewBox="0 0 24 24"><path d="M4 5h16v11H9l-4 3v-3H4z"/><circle cx="9" cy="10.5" r="1"/><circle cx="12" cy="10.5" r="1"/><circle cx="15" cy="10.5" r="1"/></svg>',
    fdoc:'<svg viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 12h6M9 15h6M9 18h4"/></svg>',
    mail:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 6.5L12 13l8.5-6.5"/></svg>',
    wazzup:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0-7.7 13.7L3 21l4.5-1.2A9 9 0 1 0 12 3z"/><path d="M8.5 9.5c0 4 2.5 6 6 6" stroke-width="1.4"/></svg>',
    market:'<svg viewBox="0 0 24 24"><path d="M4 8h16l-1 5H5z"/><path d="M4 8l-1-3H1"/><circle cx="8" cy="19" r="1.4"/><circle cx="16" cy="19" r="1.4"/></svg>',
    bell:'<svg viewBox="0 0 24 24"><path d="M6 16V10a6 6 0 0 1 12 0v6l2 2H4z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>'
  };
  // [ключ, подпись, иконка, право-секции(если ограничение), ключ-бейджа] — порядок как в amo
  var NAV=[
    ["desk","Рабочий стол","desk"],
    ["leads","Сделки","leads","leads"],
    ["imbox","imBox","imbox",null,"imbox"],
    ["customers","Покупатели","customers"],
    ["tasks","Задачи","tasks","tasks","tasksDue"],
    ["lists","Списки","lists"],
    ["fdoc","F.Doc","fdoc"],
    ["mail","Почта","mail",null,"mail"],
    ["wazzup","Wazzup","wazzup",null,"wazzup"],
    ["analytics","Аналитика","analytics","analytics"],
    ["market","amoМаркет","market",null,"market"],
    ["_sep"],
    ["auto","Автоматизации","auto"],
    ["refs","Справочники","refs"],
    ["todo","Доработки","todo"],
    ["settings","Настройки","settings","settings"]
  ];
  // Живые бейджи-счётчики (как «Задачи» в amo). Заполняем из META.counts;
  // внешние сервисы (imBox/Почта/Wazzup/amoМаркет) появятся при их подключении.
  function navBadge(key){
    if(!key)return null;
    var c=(META&&META.counts)||{};
    if(key==="tasksDue")return c.tasksDue?{n:c.tasksDue}:null;
    if(key==="imbox")return c.imbox?{n:c.imbox}:null;
    if(key==="mail")return c.mail?{n:c.mail}:null;
    if(key==="wazzup")return c.wazzup?{n:c.wazzup,green:true}:null;
    if(key==="market")return c.market?{n:c.market}:null;
    return null;
  }
  function badgeFmt(n){return n>999?"999+":(n>=1000?(Math.round(n/100)/10)+"K":String(n));}
  function badgeHtml(b){return b?'<span class="nav-badge'+(b.green?" green":"")+'">'+badgeFmt(b.n)+'</span>':"";}
  function navAllowed(n){
    if(n[0]==="_sep")return true;
    if(!n[3])return true;                 // без ограничения — видно всем
    if(!ME)return true;                    // до загрузки прав — не прячем
    if(ME.is_admin)return true;
    return !!(ME.rights&&ME.rights.sections&&ME.rights.sections[n[3]]);
  }
  var LAST_NAV=null;
  function renderSidebar(active){
    LAST_NAV=active;
    var bell=(META&&META.counts&&META.counts.notifications)||0;
    var items=NAV.filter(navAllowed).map(function(n){
      if(n[0]==="_sep")return '<div class="nav-sep"></div>';
      return '<button class="nav-i'+(n[0]===active?" act":"")+'" data-v="'+n[0]+'">'+ICONS[n[2]]+badgeHtml(navBadge(n[4]))+'<span>'+n[1]+'</span></button>';
    }).join("");
    $("#sidebar").innerHTML='<div class="logo" id="navLogo" title="На рабочий стол">V<i></i>S<i></i>C</div>'+
      '<div class="nav-scroll">'+items+'</div>'+
      '<div class="sb-bell" id="navBell" title="Уведомления">'+ICONS.bell+(bell?'<span class="nav-badge">'+badgeFmt(bell)+'</span>':"")+'</div>'+
      '<div class="sb-user" id="navUser" title="Профиль"><span class="av">'+esc(meInitials())+'</span></div>';
    var logo=$("#navLogo");if(logo)logo.onclick=function(){document.querySelectorAll(".dcard-bg").forEach(function(x){x.remove();});go("desk");};
    var bl=$("#navBell");if(bl)bl.onclick=function(e){openNotifPanel(e.currentTarget);};
    var us=$("#navUser");if(us)us.onclick=function(e){e.stopPropagation();openProfilePop();};
    document.querySelectorAll(".nav-i").forEach(function(b){b.onclick=function(){document.querySelectorAll(".dcard-bg").forEach(function(x){x.remove();});go(b.dataset.v);};});
  }
  // Профиль юзера внизу сайдбара (как в amo): имя/email/роль + выход
  function meInitials(){
    var n=((ME&&ME.name)||"Администратор").trim().split(/\s+/);
    return (((n[0]||"")[0]||"A")+((n[1]||"")[0]||"")).toUpperCase();
  }
  function openProfilePop(){
    var old=document.getElementById("profilePop");if(old){old.remove();return;}
    var d=document.createElement("div");d.className="profile-pop";d.id="profilePop";
    var role=ME&&ME.kind==="admin"?"Супер-админ (вход по коду)":(ME&&(ME.role||(ME.is_admin?"Администратор":"Сотрудник")))||"";
    d.innerHTML='<div class="ph"><b>'+esc((ME&&ME.name)||"Администратор")+'</b><span>'+esc([(ME&&ME.email)||"",role].filter(Boolean).join(" · "))+'</span></div>'+
      '<div class="pi" data-a="settings">Пользователи и права</div>'+
      '<div class="pi" data-a="logout" style="color:#c0392b">Выйти</div>';
    document.body.appendChild(d);
    d.querySelector('[data-a="logout"]').onclick=doLogout;
    d.querySelector('[data-a="settings"]').onclick=function(){d.remove();if(ME&&(ME.is_admin||ME.kind==="admin"))go("settings");else toast("Настройки доступны администратору");};
    setTimeout(function(){document.addEventListener("click",function cl(ev){if(!d.contains(ev.target)){d.remove();document.removeEventListener("click",cl);}});},0);
  }
  function doLogout(){
    var fin=function(){try{localStorage.removeItem("voyo_crmcopy_token");}catch(_){}location.href="/";};
    fetch(API+"/auth/logout",{method:"POST",headers:{"Authorization":"Bearer "+token}}).then(fin,fin);
  }
  // Глобальный поиск сверху (как в amo): 3+ символа → сделки/контакты/компании, всё из локальной БД
  var GS_T=null,GS_SEQ=0;
  function bindGlobalSearch(){
    var inp=$("#hSearch");if(!inp||inp.__gs)return;inp.__gs=1;
    var box=document.createElement("div");box.className="gs-box";box.id="gsBox";document.body.appendChild(box);
    var hide=function(){box.style.display="none";};
    inp.addEventListener("input",function(){
      var q=inp.value.trim();
      clearTimeout(GS_T);
      if(q.length<3){hide();return;}
      GS_T=setTimeout(function(){runGlobalSearch(q,inp,box);},350);
    });
    inp.addEventListener("keydown",function(e){if(e.key==="Escape")hide();});
    document.addEventListener("click",function(ev){if(ev.target!==inp&&!box.contains(ev.target))hide();});
  }
  function runGlobalSearch(q,inp,box){
    var seq=++GS_SEQ;
    Promise.all([
      jreq(API+"/leads_search?q="+encodeURIComponent(q)).catch(function(){return null;}),
      jreq(API+"/contacts?q="+encodeURIComponent(q)).catch(function(){return null;}),
      jreq(API+"/companies_page?q="+encodeURIComponent(q)).catch(function(){return null;}),
      jreq(API+"/customers_page?q="+encodeURIComponent(q)).catch(function(){return null;})
    ]).then(function(r){
      if(seq!==GS_SEQ||inp.value.trim()!==q)return;
      var L=(r[0]&&r[0].items)||[],C=(r[1]&&r[1].items)||[],K=(r[2]&&r[2].items)||[],U=(r[3]&&r[3].items)||[];
      var cnt=function(a){return a.length>=50?"50+":a.length;};
      var stOf=function(l){var p=PIPES.find(function(x){return x.id===l.pid;});var s=null;((p&&p._embedded&&p._embedded.statuses)||[]).forEach(function(x){if(x.id===l.sid)s=x;});return s||{};};
      var h="";
      if(L.length){
        h+='<div class="gs-h">Сделки ('+cnt(L)+')</div>'+L.slice(0,5).map(function(l){
          var st=stOf(l);
          return '<div class="gs-row" data-t="lead" data-id="'+l.id+'"><span>'+esc(l.name||("#"+l.id))+(st.name?' <span class="gs-st" style="background:'+esc(st.color||"#e3e7ec")+'55">'+esc(st.name)+'</span>':"")+'</span><span class="gs-sub">'+esc(l.resp||"")+(l.price?" · "+fmt(l.price)+" ₽":"")+'</span></div>';
        }).join("");
        if(L.length>5)h+='<div class="gs-row gs-more" data-t="allleads"><span style="color:var(--link)">Показать все ('+cnt(L)+')</span></div>';
      }
      if(C.length)h+='<div class="gs-h">Контакты ('+cnt(C)+')</div>'+C.slice(0,5).map(function(c){return '<div class="gs-row" data-t="contact" data-id="'+c.id+'"><span>'+esc(c.n||c.name||"")+'</span><span class="gs-sub">'+esc((c.p&&c.p[0])||(c.e&&c.e[0])||"")+'</span></div>';}).join("");
      if(K.length)h+='<div class="gs-h">Компании ('+cnt(K)+')</div>'+K.slice(0,5).map(function(c){return '<div class="gs-row" data-t="company" data-id="'+c.id+'"><span>'+esc(c.name||"")+'</span></div>';}).join("");
      if(U.length)h+='<div class="gs-h">Покупатели ('+cnt(U)+')</div>'+U.slice(0,5).map(function(c){return '<div class="gs-row" data-t="customer" data-id="'+c.id+'"><span>'+esc(c.name||"")+'</span><span class="gs-sub">'+esc(c.resp||"")+'</span></div>';}).join("");
      if(!h)h='<div class="gs-empty">Ничего не найдено по «'+esc(q)+'»</div>';
      box.innerHTML=h;
      var rct=inp.getBoundingClientRect();
      box.style.left=rct.left+"px";box.style.top=(rct.bottom+6)+"px";box.style.minWidth=Math.max(320,rct.width)+"px";
      box.style.display="block";
      box.querySelectorAll(".gs-row").forEach(function(row){row.onclick=function(){
        box.style.display="none";
        if(row.dataset.t==="allleads"){go("leads");setTimeout(function(){searchLeads(q);},300);inp.value=q;return;}
        inp.value="";
        var id=parseInt(row.dataset.id,10);
        if(row.dataset.t==="lead")openLead(id);else if(row.dataset.t==="contact")openContact(id);else if(row.dataset.t==="customer")openCustomer(id);else openCompany(id);
      };});
    });
  }
  // Панель уведомлений (колокольчик внизу, как в amo)
  function openNotifPanel(anchor){
    document.querySelectorAll(".notif-panel").forEach(function(x){x.remove();});
    var r=anchor.getBoundingClientRect();
    var p=document.createElement("div");p.className="notif-panel";
    var due=(META&&META.counts&&META.counts.tasksDue)||0;
    var open=(META&&META.counts&&META.counts.tasksOpen)||0;
    p.innerHTML='<div class="np-h">Уведомления</div>'+
      '<div class="np-item'+(due?' hot':'')+'" data-go="tasks"><b>'+due+'</b> задач требуют внимания <span>(просроченные и на сегодня)</span></div>'+

    p.innerHTML='<h4>Фильтр '+(isLeads?"сделок":"контактов")+'</h4>'+savedRow+'<div id="fAmoSaved" style="margin:0 0 12px"></div><div class="fgrid">'+fields+'</div>'+

  function filterQS(vals){
    var parts=[];
    Object.keys(vals).forEach(function(k){if(k==="_cf"||k==="_ccf")return;parts.push(k+"="+encodeURIComponent(vals[k]));});
    (vals._cf||[]).forEach(function(x){parts.push("cf="+encodeURIComponent(x[0]+":"+x[1]));});
    (vals._ccf||[]).forEach(function(x){parts.push("ccf="+encodeURIComponent(x[0]+":"+x[1]));});
    return parts.join("&");
  }

  function widgetQS(w){

  // переход в раздел БЕЗ рендера его дефолтного вида (сразу применим фильтр — иначе гонка с канбаном)
  function navSection(sec){curView=sec;VIEW_EPOCH++;hidePipePanel();renderSidebar(sec);try{pushUrl(sectionPath(sec));}catch(_){}}
  // клик по виджету — как в amo: открыть соответствующий раздел с ЕГО фильтром
  function openWidgetFilter(w){
    if(w.kind==="amo"){ navSection("leads"); applySpecFilter({name:w.name,spec:w.spec||{}},"leads"); return; }
    if(w.kind==="filter"){
      var sec=w.entity==="contacts"?"contacts":"leads";
      navSection(sec);
      if(sec==="leads")runLeadsFilter({},w.qs||"");else runContactsFilter({},w.qs||"");
      return;
    }
    // дефолтный виджет (конструктор): переводим его параметры в spec того же движка
    var spec={};
    if(w.pipeline)spec.pipeline=w.pipeline;
    if(w.status)spec.status=[+w.status];
    if(w.won)spec.status=[142];
    if(w.lost)spec.status=[143];
    var respCsv=w.resp?String(w.resp):((deskSel&&deskSel.ids&&deskSel.ids.length)?deskSel.ids.join(","):"");
    if(respCsv)spec.resp=respCsv.split(",").filter(Boolean).map(Number);
    if(w.field&&w.field!=="none"&&deskPeriod!=="all"){
      if(String(w.field)==="427242")spec.cf={"427242":{preset:deskPeriod}};
      else spec.created={preset:deskPeriod};
    }
    navSection("leads"); applySpecFilter({name:w.name,spec:spec},"leads");
  }
  function renderDeskWidgets(){
    // первый заход — тянем серверный набор виджетов учётки, потом рендерим
    if(!Array.isArray(DESK_W)){var ep0=VIEW_EPOCH;return ensureDeskWidgets(function(){if(ep0===VIEW_EPOCH&&$("#wGrid"))renderDeskWidgets();});}
    var ws=loadDeskWidgets();
    var grid=$("#wGrid");
    grid.innerHTML=ws.map(function(w){
      return '<div class="w-card" data-wid="'+w.id+'" title="Открыть список по фильтру виджета"><span class="w-del" title="Убрать">×</span><div class="w-name">'+esc(w.name)+'</div><div class="w-count" data-c>…</div>'+(w.metric==="sum"?'':'<div class="w-sum" data-s></div>')+'<div class="w-delta" data-d></div></div>';
    }).join("")+'<div class="w-add" id="wAdd">＋ Добавить виджет</div>';
    $("#wAdd").onclick=openWidgetEditor;

      var w=loadDeskWidgets().find(function(x){return x.id===card.dataset.wid;});
      if(w)openWidgetFilter(w);
    };});
    // тянем статистику по каждому виджету (всё из своей локальной БД)
    ws.forEach(function(w){
      var pr;
      if(w.kind==="filter"){
        // виджет по сохранённому фильтру (как в amo): считаем через фильтр-эндпоинт
        var ep=w.entity==="contacts"?"/contacts_filter?":"/leads_filter?";
        pr=jreq(API+ep+(w.qs?w.qs+"&":"")+"count_only=1").then(function(r){return {count:r.total||0,sum:r.sum||0};});
      }else if(w.kind==="amo"){
        // точная копия амо-виджета: spec повторяет фильтр живого amo (widget_stat2)
        pr=jreq(API+"/widget_stat2?spec="+encodeURIComponent(JSON.stringify(w.spec||{})));
        // дельта «+N за сегодня» как у amo-тайлов: тот же фильтр, период = сегодня
        (function(){
          var s2=JSON.parse(JSON.stringify(w.spec||{}));
          if(s2.created_preset==="yesterday")s2.created_preset="today";
          else if(s2.cf&&s2.cf["427242"]&&s2.cf["427242"].preset==="yesterday")s2.cf["427242"]={preset:"today"};
          else if(s2.cf&&s2.cf["427242"]&&s2.cf["427242"].from)s2.cf["427242"]={preset:"today"};
          else if(s2.no_tasks)s2.created_preset="today";
          else return;
          jreq(API+"/widget_stat2?spec="+encodeURIComponent(JSON.stringify(s2))).then(function(r2){
            var card=grid.querySelector('[data-wid="'+w.id+'"]');if(!card)return;
            var dEl=card.querySelector("[data-d]");if(!dEl)return;
            var n=r2.count||0;
            dEl.innerHTML=n?('<span class="w-plus">+'+fmt(n)+'</span> за сегодня'):'<span style="opacity:.55">0 за сегодня</span>';
          }).catch(function(){});
        })();
      }else{
        pr=jreq(API+"/widget_stat?"+widgetQS(w));
      }
      pr.then(function(r){
        var card=grid.querySelector('[data-wid="'+w.id+'"]');if(!card)return;
        if(w.metric==="sum"){card.querySelector("[data-c]").textContent=fmt(r.sum||0)+" ₽";card.querySelector("[data-c]").style.fontSize="27px";}
        else{card.querySelector("[data-c]").textContent=fmt(r.count||0);var sEl=card.querySelector("[data-s]");if(sEl)sEl.textContent=(r.sum?fmt(r.sum)+" ₽":"");}
      }).catch(function(){});
      // зелёная дельта «+N за сегодня» (как в amo): тот же срез виджета, дата = поле виджета (или created), период = сегодня
      if(w.kind!=="filter"&&w.kind!=="amo"){
        var dq=[(w.pipeline?"pipeline="+w.pipeline:""),(w.status?"status="+w.status:""),(w.won?"won=1":""),(w.lost?"lost=1":""),(w.resp?"resp="+w.resp:deskRespQS()),"field="+((w.field&&w.field!=="none")?w.field:"created"),"period=today"].filter(Boolean).join("&");
        jreq(API+"/widget_stat?"+dq).then(function(r2){
          var card=grid.querySelector('[data-wid="'+w.id+'"]');if(!card)return;
          var dEl=card.querySelector("[data-d]");if(!dEl)return;
          var n=(w.metric==="sum")?(r2.sum||0):(r2.count||0);
          dEl.innerHTML=n?('<span class="w-plus">+'+fmt(n)+(w.metric==="sum"?" ₽":"")+'</span> за сегодня'):'<span style="opacity:.55">0 за сегодня</span>';
        }).catch(function(){});
      }
    });
  }

  function loadTasks(resp,ttype){
    var doneP=taskShowDone?jreq(API+"/tasks_list?done=1"+(resp&&resp!=="0"?("&responsible="+resp):"")).catch(function(){return[];}):Promise.resolve([]);
    Promise.all([jreq(API+"/tasks_list"+(resp&&resp!=="0"?("?responsible="+resp):"")),doneP]).then(function(rr){
      var items=rr[0],doneItems=rr[1]||[];
      var typeName={};TASK_TYPES.forEach(function(t){typeName[t.id]=t.name;});
      if(ttype&&ttype!=="0")items=items.filter(function(t){return String(t.task_type)===String(ttype);});
      if(taskRange!=="all"){
        var now2=Date.now()/1000, dayEnd2=now2-(now2%86400)+86400;
        var horizon=taskRange==="day"?dayEnd2:taskRange==="week"?dayEnd2+6*86400:dayEnd2+29*86400;
        items=items.filter(function(t){return t.till&&t.till<horizon;});
      }
      var now=Date.now()/1000, dayEnd=now-(now%86400)+86400;
      var groups={overdue:[],today:[],tomorrow:[],later:[]};
      items.forEach(function(t){
        if(t.till&&t.till<now)groups.overdue.push(t);
        else if(t.till&&t.till<dayEnd)groups.today.push(t);
        else if(t.till&&t.till<dayEnd+86400)groups.tomorrow.push(t);
        else groups.later.push(t);
      });
      var titles={overdue:"Просроченные",today:"Сегодня",tomorrow:"Завтра",later:"Позже"};
      var colors={overdue:"#d64545",today:"#2f8b57",tomorrow:"#2e80ec",later:"#92989b"};
      var html="";
      ["overdue","today","tomorrow","later"].forEach(function(g){
        if(!groups[g].length)return;
        html+='<h3 style="color:'+colors[g]+'">'+titles[g]+' ('+groups[g].length+')</h3><table class="amo"><tbody>';
        groups[g].forEach(function(t){
          html+='<tr><td style="width:130px" class="muted">'+dt(t.till)+'</td><td style="width:130px" class="muted">'+esc(typeName[t.task_type]||"")+'</td><td>'+esc(t.text||"")+'</td><td style="width:180px"><a data-lead="'+t.entity_id+'">'+esc((t.lead_name||"сделка #"+t.entity_id).slice(0,30))+'</a></td><td class="muted" style="width:150px">'+esc(t.resp||"")+'</td><td style="width:190px"><a class="tdone" data-t="'+t.id+'">выполнить</a> · <a class="tmove" data-t="'+t.id+'">перенести</a> · <a class="tedit" data-t="'+t.id+'" data-text="'+esc(t.text||"")+'" data-till="'+(t.till||0)+'" data-type="'+(t.task_type||0)+'">изменить</a></td></tr>';
        });
        html+='</tbody></table>';
      });
      if(taskShowDone&&doneItems.length){
        if(ttype&&ttype!=="0")doneItems=doneItems.filter(function(t){return String(t.task_type)===String(ttype);});
        html+='<h3 style="color:#8a94a0">Выполненные за 30 дней ('+doneItems.length+')</h3><table class="amo"><tbody>'+doneItems.map(function(t){
          return '<tr style="opacity:.78"><td style="width:130px" class="muted">'+dt(t.till)+'</td><td style="width:130px" class="muted">'+esc(typeName[t.task_type]||"")+'</td><td style="text-decoration:line-through">'+esc(t.text||"")+'</td><td style="width:180px"><a data-lead="'+t.entity_id+'">'+esc((t.lead_name||"сделка #"+t.entity_id).slice(0,30))+'</a></td><td class="muted" style="width:150px">'+esc(t.resp||"")+'</td><td style="width:190px;color:#2f8b57">'+esc(t.result||"")+'</td></tr>';
        }).join("")+'</tbody></table>';
      }
      var rerun=function(){loadTasks($("#taskResp")?$("#taskResp").value:0,$("#taskType")?$("#taskType").value:0);};
      $("#tasksBox").innerHTML=html||'<p class="muted">Открытых задач нет</p>';
      $("#tasksBox").querySelectorAll("[data-lead]").forEach(function(a){a.onclick=function(){openLead(parseInt(a.dataset.lead,10));};});
      $("#tasksBox").querySelectorAll(".tdone").forEach(function(a){a.onclick=function(){
        var res=prompt("Результат задачи (необязательно):","");
        if(res===null)return;
        ereq("POST","/edit-api/task/"+a.dataset.t+"/complete",{result:res||""}).then(function(r){if(r&&r.success){toast("Задача выполнена");rerun();}else toast("Не удалось",true);});
      };});
      $("#tasksBox").querySelectorAll(".tedit").forEach(function(a){a.onclick=function(){
        openTaskEditor({id:a.dataset.t,text:a.dataset.text||"",task_type:parseInt(a.dataset.type,10)||0,till:parseInt(a.dataset.till,10)||0},rerun);
      };});
      $("#tasksBox").querySelectorAll(".tmove").forEach(function(a){a.onclick=function(){
        var v=prompt("Новый срок (ДД.ММ.ГГГГ):",new Date(Date.now()+86400000).toLocaleDateString("ru-RU"));
        if(!v)return;
        var m=v.trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        if(!m){toast("Формат: ДД.ММ.ГГГГ",true);return;}
        var till=Math.floor(new Date(+m[3],+m[2]-1,+m[1],18,0,0).getTime()/1000);
        ereq("PATCH","/edit-api/task/"+a.dataset.t,{complete_till:till}).then(function(r){if(r&&r.success){toast("Срок перенесён");rerun();}else toast("Не удалось",true);});
      };});
    });
  }

  /* ─── сделки: канбан ─── */
  var curPipe=null, DRAG=null;
  function dropLeadToStage(col){
    if(!DRAG)return;
    var d=DRAG, sid=parseInt(col.dataset.sid,10);
    if(!sid||col===d.fromCol){DRAG=null;return;}
    var p=PIPES.find(function(x){return x.id===curPipe;});
    ereq("POST","/edit-api/lead/"+d.id+"/stage",{pipeline_id:curPipe,status_id:sid}).then(function(r){
      if(r&&r.success){
        col.querySelector(".kb-cards").appendChild(d.el); // визуально переносим карточку
        toast("Сделка перенесена → "+(r.status_name||""));
        var price=parseInt((d.el&&d.el.dataset.price)||"0",10)||0;
        recountCol(d.fromCol,-1,-price); recountCol(col,+1,price);
      } else toast((r&&r.message)||"Не удалось перенести",true);
      DRAG=null;
    }).catch(function(){toast("Ошибка сети",true);DRAG=null;});
  }
  // живой пересчёт колонки после dnd/быстрого добавления: счётчик + сумма + шапка-итог воронки
  function recountCol(col,delta,priceDelta){
    if(!col)return;
    var sid=parseInt(col.dataset.sid,10);
    var kbp=KANBAN&&KANBAN.kanban&&KANBAN.kanban[curPipe];
    if(kbp&&sid){
      var k=kbp[sid]||(kbp[sid]={count:0,sum:0});
      k.count=Math.max(0,(k.count||0)+delta);
      k.sum=Math.max(0,(k.sum||0)+(priceDelta||0));
      var ct=col.querySelector(".kb-head .ct");
      if(ct)ct.textContent=fmt(k.count)+" сделок: "+fmt(k.sum)+" ₽";
      if(document.getElementById("kb")){var tot=pipeTotal(curPipe);$("#hCount").innerHTML=fmt(tot.c)+" сделки: <b>"+fmt(tot.s)+" ₽</b>";}
    }else{
      var ct2=col.querySelector(".kb-head .ct"); if(!ct2)return;
      var m=ct2.textContent.match(/([\d\s]+)\s*сделок/); var n=m?parseInt(m[1].replace(/\s/g,""),10):0;
      ct2.textContent=(n+delta)+" сделок"+(ct2.textContent.indexOf(":")>=0?ct2.textContent.slice(ct2.textContent.indexOf(":")):"");
    }
  }
  function pipeTotal(pid){var kb=(KANBAN&&KANBAN.kanban[pid])||{};var c=0,s=0;Object.keys(kb).forEach(function(k){c+=kb[k].count;s+=kb[k].sum;});return {c:c,s:s};}

  function cfDisplay(f,t){

        var parts=[raw.name||""];
        if(raw.vat_id)parts.push("ИНН "+raw.vat_id);

        if(raw.tax_registration_reason_code&&raw.tax_registration_reason_code!==raw.kpp)parts.push("ОГРН "+raw.tax_registration_reason_code);
        if(raw.bank_code)parts.push("БИК "+raw.bank_code);
        if(raw.address)parts.push("Адрес: "+raw.address);
        return parts.filter(Boolean).join(" · ");
      }
      var val=raw&&raw.name?raw.name:raw;
      if((t==="date"||t==="date_time"||t==="birthday")&&val&&isFinite(val))val=dShort(Number(val));
      else if(typeof val==="boolean")val=val?"Да":"Нет";
      return val;

  // редактируемые кастомные поля. entity: "leads"|"contacts". Показываем заполненные (клик→правка).

  // телефон/почта → кликабельные tel:/mailto: (как в amo). Ссылка — сосед .fv, не мешает правке.
  function fieldActionHtml(name,t,f){

    if((/email/i.test(t)||/mail|почт/i.test(name))&&raw.indexOf("@")>=0)return '<a class="cf-act" href="mailto:'+esc(raw)+'" title="Написать письмо">✉️</a>';

  function cfRowHtml(f,t,byId,entity,editById){

  function cfEmptyRowHtml(def,entity,editById){
    if(!entity||!def)return "";

    var ro=editById&&editById[def.id]===false;
    var isSel=(def.type==="select"||def.type==="multiselect"||def.type==="radiobutton")&&def.enums&&def.enums.length;

  function fieldsHtml(vals,defs,entity){
    var byId={},typeById={};(defs||[]).forEach(function(f){byId[f.id]=f.name;typeById[f.id]=f.type;});

  // разделители amo: «---X---» (3 дефиса) = свёртываемый блок, «--X--» (2 дефиса) = подпись-линия внутри блока
  function sepKind(name){
    var n=String(name||"").trim();
    if(/^[-–—]{3,}.+[-–—]{3,}$/.test(n))return "group";
    if(/^[-–—]{2}[^-–—].*[^-–—][-–—]{2}$/.test(n))return "sub";
    return null;
  }
  function isSeparator(name){return !!sepKind(name);}
  function sepLabel(name){return String(name).replace(/^[-–—\s]+|[-–—\s]+$/g,"").trim();}
  function fieldGroups(defs){
    // элементы: {id} поле | {sub, items:[{id}...]} — сворачиваемый подраздел (--X--), свёрнут по умолчанию
    var groups=[{name:null,items:[]}],curSub=null;
    (defs||[]).forEach(function(f){
      var k=sepKind(f.name);
      if(k==="group"){groups.push({name:sepLabel(f.name),items:[]});curSub=null;}
      else if(k==="sub"){curSub={sub:sepLabel(f.name),items:[]};groups[groups.length-1].items.push(curSub);}
      else (curSub?curSub.items:groups[groups.length-1].items).push({id:f.id});
    });
    return groups;
  }
  function fieldsGroupedHtml(vals,defs,entity){
    var byId={},typeById={},editById={},defById={};(defs||[]).forEach(function(f){byId[f.id]=f.name;typeById[f.id]=f.type;defById[f.id]=f;if(f.editable===false)editById[f.id]=false;});
    var valById={};(vals||[]).forEach(function(v){valById[v.field_id]=v;});
    var groups=fieldGroups(defs),html="";
    var fieldRow=function(fid){
      var f=valById[fid];
      if(f){var t=f.field_type||typeById[fid]||"";var r=cfRowHtml(f,t,byId,entity,editById);if(r)return r;}
      return cfEmptyRowHtml(defById[fid],entity,editById);
    };
    var rowOf=function(it){
      if(it.sub){
        var inner=(it.items||[]).map(function(x){return fieldRow(x.id);}).join("");
        return '<div class="fsub2"><div class="fsub fsub-h">'+esc(it.sub)+' <span class="fsub-caret">▸</span></div><div class="fsub-body">'+inner+'</div></div>';
      }
      return fieldRow(it.id);
    };
    groups.forEach(function(g){
      if(g.name===null){
        // верхние поля (до первого блока) — ВСЕ, включая пустые серым (как в amo)

      html+='<div class="fgrp"><div class="fgrp-h">'+esc(g.name)+'<span class="fgrp-caret">▸</span></div><div class="fgrp-body">'+rows+'</div></div>';
    });
    return html;
  }

  // клик по кастомному полю → инпут/селект, сохранение через /edit-api/{entity}/:id/cf
  function bindCfFields(bg,entity,id,defs,reload){
    // маршруты записи в единственном числе (/edit-api/lead|contact|company/:id/cf)
    var ent1=({leads:"lead",contacts:"contact",companies:"company"})[entity]||entity;

        var fid=parseInt(el.dataset.fid,10),ftype=el.dataset.ftype,cur=el.classList.contains("cf-empty")?"":el.textContent.trim(),input;
        var enums=cfEnums(defs,fid);
        var sendVal=function(v){
          ereq("PATCH","/edit-api/"+ent1+"/"+id+"/cf",{field_id:fid,field_name:el.dataset.fname,value:v}).then(function(r){if(r&&r.success){toast("Сохранено");reload();}else{toast("Не удалось",true);reload();}});
        };
        // МУЛЬТИСПИСОК → чеклист с галками (как в amo)
        if(ftype==="multiselect"&&enums.length){

          var box=document.createElement("div");box.className="cf-multibox";
          box.innerHTML=enums.map(function(e){var v=String(e.value||e);return '<label class="cfm-item"><input type="checkbox" data-v="'+esc(v)+'"'+(curVals.indexOf(v)>=0?" checked":"")+'> '+esc(v)+'</label>';}).join("")+
            '<div class="cfm-acts"><button class="btn cfm-save">Сохранить</button><button class="btn ghost cfm-cancel">Отмена</button></div>';
          el.innerHTML="";el.appendChild(box);
          box.onclick=function(ev){ev.stopPropagation();};
          box.querySelector(".cfm-cancel").onclick=function(){reload();};
          box.querySelector(".cfm-save").onclick=function(){
            sendVal([].map.call(box.querySelectorAll("input:checked"),function(cb){return cb.dataset.v;}));
          };
          return;
        }
        var kind="text"; // как соберём значение при сохранении
        if(enums.length&&(ftype==="select"||ftype==="radiobutton")){
          input=document.createElement("select");input.innerHTML='<option value="">—</option>'+enums.map(function(e){var v=e.value||e;return '<option'+(v===cur?" selected":"")+'>'+esc(v)+'</option>';}).join("");
        }else if(ftype==="checkbox"){
          // ЧЕКБОКС → Да/Нет (amo хранит boolean)
          kind="bool";
          input=document.createElement("select");input.innerHTML='<option value="">—</option><option'+(cur==="Да"?" selected":"")+'>Да</option><option'+(cur==="Нет"?" selected":"")+'>Нет</option>';
        }else if(ftype==="date"||ftype==="birthday"){
          // ДАТА → date picker c предзаполнением, хранение timestamp (как в amo)
          kind="date";input=document.createElement("input");input.type="date";

  function bindEditable(bg,key,getVal,saveFn,reload,kind){

      if(kind==="user"){input=document.createElement("select");input.innerHTML=userOptions(cur);}
      else{input=document.createElement("input");input.type=kind==="number"?"number":"text";input.value=(cur==null?"":cur);}
      input.className="ci";input.style.maxWidth="260px";
      el.innerHTML="";el.appendChild(input);input.focus();
      var done=false;
      var save=function(){
        if(done)return;done=true;
        var v=input.value;
        saveFn(v).then(function(r){if(r&&r.success){toast("Сохранено");reload();}else{toast((r&&r.message)||"Не удалось",true);reload();}});
      };
      input.addEventListener("blur",save);

    };

  // регулируемая ширина колонок таблицы (перетаскивание границы заголовка), с запоминанием
  function makeTableResizable(table,key){
    if(!table)return;
    var ths=table.querySelectorAll("thead th");
    var saved={};try{saved=JSON.parse(localStorage.getItem(key))||{};}catch(e){}
    ths.forEach(function(th,i){
      if(saved[i])th.style.width=saved[i]+"px";
      if(th.querySelector(".col-resize"))return;
      var h=document.createElement("span");h.className="col-resize";th.appendChild(h);
      h.addEventListener("mousedown",function(e){
        e.preventDefault();e.stopPropagation();
        var startX=e.pageX,startW=th.offsetWidth;
        function mv(ev){th.style.width=Math.max(48,startW+(ev.pageX-startX))+"px";}
        function up(){document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);saved[i]=th.offsetWidth;try{localStorage.setItem(key,JSON.stringify(saved));}catch(_){}}
        document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);
      });
    });
  }

  function renderBulkBar(){

  function bulkApply(action,val){
    var ids=Object.keys(BULK.ids),entity=BULK.kind==="leads"?"lead":"contact",done=0,total=ids.length;
    if(!total)return;
    toast("Применяю к "+total+"…");
    ids.forEach(function(id){
      var pr;
      if(action==="resp")pr=ereq("PATCH","/edit-api/"+entity+"/"+id,{responsible_user_id:val});
      else if(action==="delete")pr=ereq("POST","/edit-api/"+entity+"/"+id+"/delete");
      else if(action==="tag")pr=ereq("PATCH","/edit-api/lead/"+id+"/tags",{tags:val.split(",").map(function(x){return x.trim();}).filter(Boolean),append:true});
      else pr=Promise.resolve();
      pr.then(function(){done++;if(done===total){toast("Готово: "+done);var k=BULK.kind;bulkClear();if(views[curView])views[curView]();}});
    });
  }
