<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Копия amoCRM — VSC</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sb-bg:#17293e; --sb-ico:#8299b3; --sb-act:#4ba3e3; --sb-txt:#a9bbcf;
    --blue:#2e80ec; --link:#3a87c8; --txt:#313942; --mut:#92989b;
    --border:#e4e7ea; --border-soft:#eef1f4; --bg:#fff; --feed-bg:#f4f5f8;
    --green:#6fc48d; --task-green:#4caf50;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; font:15px/1.4 "PT Sans", -apple-system, Arial, sans-serif; color:var(--txt); background:var(--bg); overflow:hidden; }
  a, .lnk { color:var(--link); text-decoration:none; cursor:pointer; background:none; border:0; font:inherit; padding:0; }
  a:hover, .lnk:hover { text-decoration:underline; }

  /* ── сайдбар (как в amo: лого сверху, скролл-меню, колокольчик снизу) ── */
  #app { display:flex; height:100vh; }
  aside { width:66px; background:linear-gradient(180deg,#1b3350 0%,#17293e 60%,#14243a 100%); display:flex; flex-direction:column; align-items:center; flex-shrink:0; z-index:60; }
  .logo { width:66px; height:64px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; letter-spacing:5px; cursor:pointer; flex-shrink:0; background:linear-gradient(135deg,#2e6fb0,#2e5f8f); text-indent:5px; }
  .logo:hover { filter:brightness(1.08); }
  .nav-scroll { flex:1; width:66px; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
  .nav-scroll::-webkit-scrollbar { width:0; height:0; }
  .nav-i { position:relative; width:66px; padding:11px 0 9px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; border:0; background:none; transition:background .12s; }
  .nav-i:hover { background:rgba(255,255,255,.04); }
  .nav-i svg { width:22px; height:22px; stroke:var(--sb-ico); fill:none; stroke-width:1.6; }
  .nav-i span { font-size:9.5px; color:var(--sb-txt); line-height:1.15; text-align:center; }
  .nav-i.act { background:rgba(75,163,227,.10); }
  .nav-i.act svg { stroke:var(--sb-act); }
  .nav-i.act span { color:#fff; }
  .nav-i:hover svg { stroke:#cfe2f3; }
  .nav-sep { width:34px; height:1px; background:rgba(255,255,255,.08); margin:6px auto; }
  .nav-badge { position:absolute; top:5px; right:11px; min-width:16px; height:16px; padding:0 4px; border-radius:9px; background:#e5484d; color:#fff; font-size:9.5px; font-weight:700; line-height:16px; text-align:center; box-shadow:0 0 0 2px #17293e; }
  .nav-badge.green { background:#3fb27f; }
  .sb-bell { position:relative; width:66px; padding:12px 0 14px; display:flex; justify-content:center; cursor:pointer; flex-shrink:0; border-top:1px solid rgba(255,255,255,.06); }
  .sb-bell svg { width:23px; height:23px; stroke:var(--sb-ico); fill:none; stroke-width:1.6; }
  .sb-bell:hover svg { stroke:#cfe2f3; }
  .sb-bell .nav-badge { top:8px; right:12px; }
  .notif-panel { position:fixed; z-index:200; width:320px; background:#fff; border-radius:12px; box-shadow:0 12px 40px rgba(20,40,70,.28); overflow:hidden; font-size:13.5px; }
  .notif-panel .np-h { padding:14px 18px; font-weight:700; font-size:15px; border-bottom:1px solid var(--border-soft); }
  .notif-panel .np-item { padding:13px 18px; border-bottom:1px solid var(--border-soft); cursor:pointer; }
  .notif-panel .np-item:hover { background:#f6f9fc; }
  .notif-panel .np-item b { font-size:15px; }
  .notif-panel .np-item.hot b { color:#e5484d; }
  .notif-panel .np-item span { color:var(--mut); font-size:12px; }
  .notif-panel .np-note { padding:12px 18px; color:var(--mut); font-size:12px; background:#fafbfc; }
  /* заглушка внешних разделов (Почта/imBox/Wazzup/F.Doc/amoМаркет) */
  .ext-wrap { max-width:640px; margin:60px auto; text-align:center; padding:0 24px; }
  .ext-wrap .ext-ico { width:76px; height:76px; margin:0 auto 22px; border-radius:20px; background:linear-gradient(135deg,#eaf2fb,#dce8f6); display:flex; align-items:center; justify-content:center; }
  .ext-wrap .ext-ico svg { width:38px; height:38px; stroke:var(--blue); fill:none; stroke-width:1.5; }
  .ext-wrap h2 { font-size:22px; margin:0 0 10px; }
  .ext-wrap p { color:var(--mut); font-size:14.5px; line-height:1.6; margin:0 0 8px; }
  .ext-wrap .ext-badge { display:inline-block; margin-top:14px; padding:5px 13px; border-radius:20px; background:#fff4e5; color:#c47f1a; font-size:12.5px; font-weight:700; }
  /* вкладки раздела «Списки» (как в amo: Контакты/Компании/каталоги) */
  .lists-tabs { position:sticky; top:0; z-index:8; display:flex; gap:2px; padding:8px 16px 0; background:#fff; border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
  .lists-tabs::-webkit-scrollbar { height:0; }
  .lists-tabs .lt { border:0; background:none; font:inherit; font-size:13.5px; color:var(--mut); padding:8px 14px 12px; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .lists-tabs .lt:hover { color:var(--txt); }
  .lists-tabs .lt.act { color:var(--txt); font-weight:700; border-bottom-color:var(--blue); }

  /* ── шапка ── */
  #wrap { flex:1; display:flex; flex-direction:column; min-width:0; }
  header { height:64px; display:flex; align-items:center; padding:0 16px 0 24px; gap:18px; border-bottom:1px solid transparent; flex-shrink:0; }
  #secTitle { font-size:17px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; cursor:default; }
  #secTitle.clickable { cursor:pointer; }
  #secTitle .caret { font-size:11px; color:var(--mut); margin-left:6px; }
  .search { flex:1; max-width:560px; display:flex; align-items:center; gap:8px; color:#b6bcc3; }
  .search svg { width:16px; height:16px; stroke:#b6bcc3; fill:none; stroke-width:2; flex-shrink:0; }
  .search input { border:0; outline:0; font:inherit; width:100%; color:var(--txt); }
  .search input::placeholder { color:#b6bcc3; }
  #hCount { margin-left:auto; white-space:nowrap; color:var(--txt); font-size:14px; }
  #hCount b { font-size:16px; }
  .hbtn { border:1px solid var(--border); background:#fff; border-radius:4px; padding:8px 14px; font:inherit; font-size:12.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--txt); cursor:default; }
  .hbtn.blue { background:var(--blue); border-color:var(--blue); color:#fff; }
  .hbtn.dots { padding:8px 10px; letter-spacing:2px; }

  main { flex:1; overflow:auto; position:relative; }

  /* ── выпадающий список воронок (как в амо) ── */
  #pipePanel { position:absolute; top:0; left:0; bottom:0; width:330px; background:#fff; box-shadow:2px 0 18px rgba(20,40,70,.18); z-index:55; padding:0; display:none; flex-direction:column; }
  #pipePanel h3 { font-size:17px; text-transform:uppercase; font-weight:700; margin:0; padding:22px 24px 14px; }
  #pipePanel .pp-item { display:block; width:100%; text-align:left; background:none; border:0; border-top:1px solid var(--border-soft); padding:16px 24px; font:inherit; color:var(--txt); cursor:pointer; }
  #pipePanel .pp-item:hover { background:#f6f9fc; }
  #pipePanel .pp-item.act { color:var(--blue); font-weight:700; }
  #pipeShade { position:absolute; inset:0; background:rgba(20,35,60,.25); z-index:54; display:none; }

  /* ── канбан ── */
  #kb { display:flex; min-height:100%; }
  .kb-col { min-width:250px; width:250px; border-right:1px solid var(--border-soft); flex-shrink:0; }
  .kb-head { position:sticky; top:0; background:#fff; padding:12px 10px 8px; text-align:center; z-index:5; }
  .kb-head .nm { font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .kb-head .ct { font-size:12px; color:var(--mut); margin-top:2px; }
  .kb-head .bar { height:3px; border-radius:2px; margin-top:8px; background:#dfe3e8; }
  .col-resize { position:absolute; top:0; right:-4px; width:8px; height:100%; cursor:col-resize; z-index:2; user-select:none; }
  .col-resize:hover { background:linear-gradient(90deg,transparent 3px,#9fc3e8 3px,#9fc3e8 5px,transparent 5px); }
  table.amo th { position:relative; }
  table.amo th.sortable { cursor:pointer; user-select:none; }
  table.amo th.sortable:hover { color:var(--link); }
  .bulk-th, .bulk-cb { width:34px; text-align:center; }
  .bulk-bar { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:150; background:#2e3a48; color:#fff; border-radius:10px; padding:10px 16px; display:flex; gap:10px; align-items:center; box-shadow:0 8px 26px rgba(20,40,70,.32); font-size:13.5px; }
  .bulk-bar select { padding:5px 8px; border-radius:6px; border:none; font-size:13px; max-width:200px; }
  .bulk-bar .btn { padding:5px 12px; }
  .bulk-bar .btn.ghost { background:rgba(255,255,255,.15); color:#fff; }
  .bulk-bar .btn.ghost:hover { background:rgba(255,255,255,.28); }
  .deal-chip { display:inline-block; max-width:100%; padding:2px 8px; margin:2px 4px 2px 0; border-radius:3px; font-size:12.5px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; vertical-align:middle; }
  .deal-chip:hover { filter:brightness(.96); text-decoration:underline; }
  .kb-quick { margin:0 8px; padding:8px 10px; border:1px dashed #c3ccd6; border-radius:4px; color:#7b8794; font-size:13px; text-align:center; cursor:pointer; background:#fafbfc; }
  .kb-quick:hover { border-color:var(--link); color:var(--link); background:#f2f7fd; }
  .kb-quick[data-open] { text-align:left; cursor:default; border-style:solid; }
  .kb-cards { padding:8px; }
  .kb-card { background:#fff; border:1px solid #dfe5eb; border-radius:4px; padding:9px 11px; margin-bottom:7px; cursor:pointer; position:relative; }
  .kb-card:hover { border-color:#b9cde0; }
  .kb-card .top { display:flex; justify-content:space-between; gap:6px; font-size:13px; }
  .kb-card .top .dt { color:var(--mut); font-size:12px; white-space:nowrap; }
  .kb-card .comp { color:var(--txt); font-size:13px; }
  .kb-card .ttl { color:var(--link); font-size:14px; margin:2px 0; }
  .kb-card .tags { margin-top:3px; }
  .tag { display:inline-block; background:#f2f4f6; border:1px solid #e7eaee; color:#6b7684; border-radius:3px; padding:0 6px; font-size:11.5px; margin:1px 3px 1px 0; }
  .kb-more { display:block; margin:2px auto 14px; }

  /* ── таблица контактов ── */
  table.amo { width:100%; border-collapse:collapse; font-size:14px; }
  table.amo th { text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#7c8691; font-weight:700; padding:12px 14px; border-bottom:1px solid var(--border); position:sticky; top:0; background:#fff; }
  table.amo td { padding:11px 14px; border-bottom:1px solid var(--border-soft); vertical-align:middle; }
  table.amo tr:hover td { background:#f8fafc; }

  /* ── карточка (сделка/контакт) ── */
  .dcard-bg { position:fixed; top:0; right:0; bottom:0; left:66px; z-index:100; display:flex; background:#fff; }
  .dcard-l { width:430px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:auto; }
  .dl-head { padding:16px 20px 0; }
  .dl-head .back { color:var(--mut); font-size:20px; margin-right:8px; cursor:pointer; }
  .dl-head h2 { display:inline; font-size:19px; margin:0; }
  .dl-sub { margin:8px 0 0; color:var(--mut); font-size:13px; }
  .dl-stage { padding:14px 20px 0; }
  .dl-stage .pn { color:var(--mut); font-size:12.5px; }
  .dl-stage .sn { font-weight:700; margin-top:2px; }
  .stage-bar { display:flex; gap:2px; margin-top:8px; }
  .stage-bar i { flex:1; height:4px; border-radius:1px; background:#e6eaee; }
  .dl-stage .stage-bar i { height:9px; cursor:pointer; }
  .dl-stage .stage-bar i:hover { outline:2px solid var(--blue); outline-offset:-1px; }
  .dl-tabs { display:flex; gap:16px; padding:14px 20px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
  .dl-tabs span { padding-bottom:9px; color:var(--mut); }
  .dl-tabs span.act { color:var(--txt); font-weight:700; border-bottom:2px solid var(--blue); }
  .fields { padding:6px 20px 20px; }
  .frow { display:flex; padding:7px 0; font-size:13.5px; border-bottom:1px dotted transparent; }
  .frow .fl { width:44%; color:#8b939c; flex-shrink:0; padding-right:8px; }
  .cf-act { margin-left:8px; text-decoration:none; font-size:13px; flex-shrink:0; opacity:.75; }
  .cf-act:hover { opacity:1; text-decoration:none; }
  .frow .fv { color:var(--txt); word-break:break-word; }
  .fgroup { background:#f3f5f7; border-radius:3px; padding:8px 12px; font-size:13px; color:#5d6774; margin:10px 0 4px; }
  /* сворачиваемые группы полей (как в amoCRM) */
  .fgrp { margin:4px -20px 0; border-top:1px solid var(--border); }
  .fgrp-h { padding:11px 20px; font-weight:600; font-size:13px; color:#3a4652; background:#f5f8fa; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }
  .fgrp-h:hover { background:#eaf1f7; }
  .fgrp-caret { color:#9aa4ae; transition:transform .15s; font-size:12px; }
  .fgrp.open .fgrp-caret { transform:rotate(90deg); }
  .fgrp-body { display:none; padding:2px 20px 8px; }
  .fgrp.open .fgrp-body { display:block; }
  .ro-lock { font-size:11px; opacity:.5; }
  .frow-empty .fl { color:#aab3bc; }
  .cf-empty .muted { font-size:12.5px; }
  .cf-empty:hover .muted { color:var(--link); }
  .dl-contact { border-top:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:10px; }
  .ava { width:36px; height:36px; border-radius:50%; background:#d7dee6; color:#5d6b7c; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
  .dcard-r { flex:1; background:var(--feed-bg); display:flex; flex-direction:column; min-width:0; }
  .feed-top { padding:14px 24px; color:#b6bcc3; display:flex; gap:8px; align-items:center; }
  .feed { flex:1; overflow:auto; padding:0 24px 12px; }
  .day-sep { text-align:center; margin:14px 0; }
  .day-sep b { background:#fff; border:1px solid var(--border); border-radius:14px; padding:3px 14px; font-size:12px; color:#7b848d; font-weight:400; }
  .ev { background:#fff; border:1px solid var(--border); border-radius:4px; padding:10px 14px; margin:8px 0; font-size:13.5px; }
  .ev .eh { color:var(--mut); font-size:12px; margin-bottom:4px; }
  .ev.task { border-color:#bfdec7; background:#f6fbf7; }
  .ev.task.open { border-color:#e8b7b7; background:#fdf8f8; }
  .ev.call { border-left:3px solid #9ec7ea; }
  .feed-tabs { display:flex; gap:2px; padding:0 24px; }
  .feed-tabs span { background:#e9ebef; padding:4px 12px; font-size:12.5px; color:#5d6774; cursor:pointer; border-radius:2px 2px 0 0; }
  .feed-tabs span.act { background:#fff; font-weight:700; }
  .feed-note { background:#fff; border:1px solid var(--border); margin:0 24px 18px; padding:14px; font-size:13.5px; color:#b6bcc3; border-radius:0 3px 3px 3px; }
  .feed-note a { margin-right:4px; }
  /* редактирование */
  .editable { cursor:pointer; border-bottom:1px dashed transparent; }
  .editable:hover { border-bottom-color:#b9cde0; background:#f6f9fc; }
  h2.editable:hover { background:#f6f9fc; }
  .ci { padding:7px 10px; border:1px solid var(--border); border-radius:4px; font:inherit; font-size:13.5px; width:100%; }
  .composer { border-top:1px solid var(--border); background:#fff; padding:10px 24px 16px; }
  .cbtns { display:flex; gap:14px; margin-bottom:8px; }
  .ctab { font-size:13px; color:var(--mut); cursor:pointer; padding-bottom:3px; }
  .ctab.act { color:var(--txt); font-weight:700; border-bottom:2px solid var(--blue); }
  .cbody { display:flex; gap:8px; align-items:flex-start; }
  .cbody textarea.ci { resize:vertical; }
  .task-done { color:var(--blue); cursor:pointer; }
  .dl-del { position:absolute; top:14px; right:16px; background:none; border:0; font-size:16px; cursor:pointer; opacity:.5; }
  .dl-del:hover { opacity:1; }
  .dl-head { position:relative; }
  .tags-edit { cursor:pointer; border-bottom:1px dashed transparent; }
  .tags-edit:hover { border-bottom-color:#b9cde0; }
  .lead-toggle { display:flex; gap:6px; padding:8px 12px; }
  .lead-toggle button { border:1px solid var(--border); background:#fff; border-radius:5px; padding:5px 12px; font:inherit; font-size:13px; cursor:pointer; color:var(--mut); }
  .lead-toggle button.act { background:var(--blue); border-color:var(--blue); color:#fff; }

  /* ── дашборд (рабочий стол) ── */
  #dash { min-height:100%; background:linear-gradient(135deg,#1d3c66 0%,#2a5d9e 55%,#2d6fbb 100%); padding:26px; }
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:12px; max-width:1250px; margin:0 auto; }
  .dash-card { background:rgba(13,30,55,.42); border-radius:8px; padding:16px 18px; color:#fff; }
  .dash-card b { font-size:30px; color:#a8c4f0; font-weight:700; display:block; }
  .dash-card span { font-size:12.5px; color:#b8c9e2; text-transform:uppercase; letter-spacing:.04em; }
  .dash-note { max-width:1250px; margin:0 auto 16px; color:#cfdcf0; font-size:13px; }
  /* ── рабочий стол как в amo: заголовок, пилюли периода, воронка, виджеты ── */
  .desk-title { text-align:center; color:#fff; font-size:34px; font-weight:700; letter-spacing:.02em; padding:30px 0 22px; }
  .desk-bar { max-width:1250px; margin:0 auto 22px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .desk-pills { display:inline-flex; background:rgba(255,255,255,.14); border-radius:22px; padding:3px; }
  .desk-pills button { border:0; background:none; color:#dbe7f7; font:inherit; font-size:13px; padding:7px 16px; border-radius:20px; cursor:pointer; white-space:nowrap; }
  .desk-pills button.act { background:#fff; color:#1d3c66; font-weight:700; }
  .desk-cfg { margin-left:auto; border:0; background:rgba(255,255,255,.14); color:#fff; font:inherit; font-size:13px; padding:8px 16px; border-radius:20px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .desk-cfg:hover { background:rgba(255,255,255,.24); }
  /* воронка-виджет */
  .funnel-w { max-width:1250px; margin:0 auto 22px; background:rgba(13,30,55,.42); border-radius:10px; padding:18px 20px; }
  .funnel-w .fw-h { color:#cfe0f5; font-size:12.5px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px; display:flex; justify-content:space-between; }
  .funnel-row { display:flex; gap:8px; align-items:flex-end; overflow-x:auto; padding-bottom:4px; }
  .funnel-stage { min-width:120px; flex:1; }
  .funnel-stage .fs-bar { height:8px; border-radius:3px; margin-bottom:8px; }
  .funnel-stage .fs-c { color:#fff; font-size:26px; font-weight:700; }
  .funnel-stage .fs-n { color:#aec4e2; font-size:11px; text-transform:uppercase; letter-spacing:.03em; margin-top:3px; line-height:1.25; }
  .funnel-stage .fs-s { color:#8fb0d8; font-size:12px; margin-top:3px; }
  /* виджеты-статистика (тёмные карточки) */
  .w-grid { max-width:1250px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
  .w-card { position:relative; background:#12233f; border:1px solid rgba(255,255,255,.06); border-radius:10px; padding:16px 18px 18px; color:#fff; min-height:132px; }
  .w-card .w-name { font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#9fb6d6; font-weight:700; margin-bottom:14px; padding-right:18px; line-height:1.3; }
  .w-card .w-count { font-size:34px; font-weight:700; color:#8ea6f7; line-height:1; }
  .w-card .w-sum { font-size:14px; color:#cdd8ea; margin-top:8px; }
  .w-card .w-delta { position:absolute; bottom:14px; left:18px; font-size:12px; color:#5fbf8f; }
  .w-card .w-del { position:absolute; top:10px; right:11px; color:#5b6f8c; cursor:pointer; font-size:15px; line-height:1; opacity:0; }
  .w-card:hover .w-del { opacity:1; }
  .w-card .w-del:hover { color:#e5484d; }
  .w-add { display:flex; align-items:center; justify-content:center; border:1.5px dashed rgba(255,255,255,.22); border-radius:10px; color:#cfe0f5; font-size:14px; cursor:pointer; min-height:132px; background:rgba(255,255,255,.03); }
  .w-add:hover { border-color:rgba(255,255,255,.5); background:rgba(255,255,255,.07); }

  /* ── прочие разделы (автоматизации/справочники/доработки) ── */
  .plain { padding:20px 26px; max-width:1250px; }
  .pcard { background:#fff; border:1px solid var(--border); border-radius:6px; padding:16px 20px; margin-bottom:14px; }
  .pcard h2 { font-size:16px; margin:0 0 10px; }
  h3 { font-size:14px; margin:14px 0 8px; }
  .muted { color:var(--mut); }
  pre { background:#f3f5f8; border-radius:4px; padding:10px; overflow:auto; font-size:12px; max-height:420px; }
  details { margin:6px 0; }
  summary { cursor:pointer; font-weight:700; font-size:13.5px; }
  .md table, .plain table { width:100%; border-collapse:collapse; font-size:13px; }
  .md th,.md td,.plain th,.plain td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border-soft); vertical-align:top; }
  .md h1 { font-size:18px; } .md h2 { font-size:15px; margin:16px 0 6px; } .md h3 { font-size:13.5px; }
  .flag { font-size:12px; padding:2px 8px; border-radius:3px; background:#fdecec; color:#c0392b; }
  .flag.ok { background:#e8f6ee; color:#27865a; }
  .flag.warn { background:#fdf3e0; color:#9a6b00; }
  .pill { display:inline-block; background:#f2f4f6; border:1px solid #e7eaee; border-radius:3px; padding:1px 8px; font-size:12px; margin:2px 4px 2px 0; color:#5d6774; }
  input.ti { padding:9px 12px; border:1px solid var(--border); border-radius:4px; font:inherit; }
  button.btn { background:var(--blue); color:#fff; border:0; border-radius:4px; padding:9px 16px; cursor:pointer; font:inherit; font-size:13px; }

  /* ── логин ── */
  #login-screen { position:fixed; inset:0; background:var(--sb-bg); display:flex; align-items:center; justify-content:center; z-index:200; }
  .login-box { background:#fff; border-radius:10px; padding:34px 38px; width:360px; text-align:center; }
  .login-box .lg { width:54px; height:54px; border-radius:10px; background:#2e5f8f; color:#fff; font-weight:700; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; letter-spacing:2px; }
  .login-box h2 { margin:0 0 16px; font-size:18px; }
  .login-box input { width:100%; text-align:center; font-size:18px; letter-spacing:4px; margin-bottom:12px; }
  .login-box .err { color:#c0392b; font-size:13px; min-height:18px; margin-bottom:4px; }
  .ltabs { display:flex; gap:4px; margin:0 0 14px; border-bottom:1px solid #e6ebf0; }
  .ltab { flex:1; padding:8px 0; font-size:13.5px; cursor:pointer; color:#6b7581; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .ltab.act { color:#2e5f8f; border-bottom-color:#2e5f8f; font-weight:600; }
  .login-box .ti { text-align:left; font-size:15px; letter-spacing:0; }
  #loginCode { text-align:center; font-size:18px; letter-spacing:4px; }

  /* ── универсальное модальное окно ── */
  .modal-bg { position:fixed; inset:0; z-index:150; background:rgba(20,35,60,.34); display:flex; align-items:flex-start; justify-content:center; padding-top:8vh; }
  .modal { background:#fff; border-radius:10px; padding:22px 26px; width:440px; max-width:92vw; max-height:82vh; overflow:auto; box-shadow:0 12px 40px rgba(20,40,70,.28); position:relative; }
  .modal h2 { margin:0 0 14px; font-size:17px; }
  .modal h3 { margin:0 0 14px; font-size:16px; }
  .modal .mlbl { display:block; font-size:12px; color:#7c8691; text-transform:uppercase; letter-spacing:.03em; margin:14px 0 5px; }
  .modal .x { position:absolute; top:12px; right:14px; border:none; background:none; font-size:22px; line-height:1; cursor:pointer; color:#8a949e; }
  .modal .x:hover { color:#333; }
  .btn.ghost { background:#eef2f6; color:var(--txt); }
  .btn.ghost:hover { background:#e2e8ef; }
  /* контекстное меню (кнопка «···») */
  .ctxmenu { position:fixed; z-index:160; background:#fff; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 26px rgba(20,40,70,.22); padding:6px 0; min-width:210px; }
  .ctxmenu div { padding:9px 16px; font-size:14px; cursor:pointer; white-space:nowrap; }
  .ctxmenu div:hover { background:#f0f4f8; }
  .ctxmenu .sep { height:1px; background:var(--border); padding:0; margin:5px 0; cursor:default; }
  /* ── настройки ── */
  .stabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin:-4px -4px 16px; padding:0 4px; flex-wrap:wrap; }
  .stab { padding:9px 16px; font-size:14px; cursor:pointer; color:#6b7581; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .stab.act { color:var(--link); border-bottom-color:var(--link); font-weight:600; }
  .stab:hover { color:var(--link); }
  table.set { width:100%; border-collapse:collapse; font-size:13.5px; }
  table.set th { text-align:left; padding:8px 10px; color:#8a949e; font-weight:600; font-size:12px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  table.set td { padding:8px 10px; border-bottom:1px solid #eef2f6; vertical-align:middle; }
  table.set tr:hover td { background:#f7fafc; }
  .set select, .set input[type=text] { padding:5px 8px; border:1px solid var(--border); border-radius:6px; font-size:13px; }
  .rperm { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .rperm label { font-size:13px; display:inline-flex; align-items:center; gap:5px; cursor:pointer; white-space:nowrap; }
  .role-card { border:1px solid var(--border); border-radius:9px; padding:14px 16px; margin-bottom:12px; }
  .role-card h3 { margin:0 0 10px; font-size:15px; display:flex; align-items:center; gap:8px; }
  .badge-adm { background:#eaf3ff; color:#2b6cb0; font-size:11px; padding:2px 7px; border-radius:20px; }
  .swatch { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  /* ── фильтр (как в amoCRM: клик по поиску) ── */
  .filter-panel { position:fixed; z-index:140; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 10px 34px rgba(20,40,70,.20); padding:16px 18px; width:520px; max-width:94vw; }
  .filter-panel h4 { margin:0 0 12px; font-size:14px; color:#33404d; }
  .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }
  .ffield { display:flex; flex-direction:column; gap:4px; }
  .ffield label { font-size:11.5px; color:#8a949e; text-transform:uppercase; font-weight:600; }
  .ffield input, .ffield select { padding:7px 9px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; width:100%; }
  .frange { display:flex; gap:6px; align-items:center; }
  .frange input { width:100%; }
  .cf-sec { margin-top:14px; border-top:1px solid var(--border); padding-top:10px; }
  .cf-sec-h { font-size:11.5px; color:#8a949e; text-transform:uppercase; font-weight:600; margin-bottom:8px; }
  .cf-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
  .cf-row .cf-field { flex:1.2; min-width:0; padding:6px 8px; border:1px solid var(--border); border-radius:7px; font-size:13px; }
  .cf-row .cf-val { flex:1; min-width:0; padding:6px 8px; border:1px solid var(--border); border-radius:7px; font-size:13px; }
  .cf-row .cf-del { border:none; background:#eef2f6; color:#8a949e; width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:16px; flex-shrink:0; }
  .cf-row .cf-del:hover { background:#f5d5d5; color:#c0392b; }
  .cf-add { border:none; background:none; color:var(--link); font-size:13px; cursor:pointer; padding:2px 0; }
  .filter-acts { display:flex; gap:8px; margin-top:14px; }
  .filter-acts .btn.ghost { background:#eef2f6; color:#33404d; }
</style>
</head>
<body>
<div id="app" style="display:none">
  <aside id="sidebar"></aside>
  <div id="wrap">
    <header>
      <span id="secTitle"></span>
      <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg><input id="hSearch" placeholder="Поиск и фильтр"></div>
      <span id="hCount"></span>
      <button class="hbtn dots" id="hDots" title="Ещё">···</button>
      <button class="hbtn" id="hCfg">Настроить</button>
      <button class="hbtn blue" id="hNew">+ Новая сделка</button>
    </header>
    <main id="main">
      <div id="pipeShade"></div>
      <div id="pipePanel"></div>
      <div id="view"></div>
    </main>
  </div>
</div>
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="lg">V S C</div>
    <h2>Копия amoCRM</h2>
    <div class="ltabs"><span class="ltab act" data-l="user">Сотрудник</span><span class="ltab" data-l="code">По коду</span></div>
    <div class="err" id="loginErr"></div>
    <div id="lg-user">
      <input class="ti" type="email" id="loginEmail" placeholder="Рабочий email" autocomplete="username">
      <input class="ti" type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
      <div id="setHint" class="muted" style="display:none;font-size:12.5px;margin:-6px 0 10px">Первый вход — придумайте пароль (мин. 6 символов).</div>
      <button class="btn" style="width:100%" id="loginUserGo">Войти</button>
    </div>
    <div id="lg-code" style="display:none">
      <input class="ti" type="text" id="loginCode" placeholder="Код доступа" autocomplete="off">
      <button class="btn" style="width:100%" id="loginGo">Войти</button>
    </div>
    <p class="muted" style="font-size:12.5px">Или вход руководителя через <a href="/vsc">/vsc</a></p>
  </div>
</div>

<script>
(function(){
  "use strict";
  var API = "/amocrm_copy/api";
  var token=null, META=null, PIPES=[], USERS=[], KANBAN=null, CF=null, ME=null, curFilter=null, TASK_TYPES=[];
  var FSTATE={leads:{},contacts:{}};
  var $=function(s){return document.querySelector(s);};
  var esc=function(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});};
  var fmt=function(n){return (n==null?"—":Number(n).toLocaleString("ru-RU"));};
  var dt=function(ts){return ts?new Date(ts*1000).toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";};
  var dShort=function(ts){return ts?new Date(ts*1000).toLocaleDateString("ru-RU"):"";};
  var userName=function(id){var u=USERS.find(function(x){return x.id===id;});return u?u.name:(id||"");};

  function req(url){return fetch(url,{headers:{Authorization:"Bearer "+token}}).then(function(r){if(r.status===401)throw new Error("401");return r;});}
  function jreq(url){return req(url).then(function(r){return r.json();});}
  // запись (редактирование копии): POST/PATCH на /edit-api/*
  function ereq(method,path,body){
    return fetch(path,{method:method,headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined})
      .then(function(r){return r.json();});
  }
  function toast(msg,bad){
    var el=document.createElement("div");
    el.textContent=msg;
    el.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:300;background:"+(bad?"#c0392b":"#2f8b57")+";color:#fff;padding:9px 18px;border-radius:6px;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.2)";
    document.body.appendChild(el);
    setTimeout(function(){el.style.transition="opacity .4s";el.style.opacity="0";setTimeout(function(){el.remove();},400);},1800);
  }

  /* ─── сайдбар ─── */
  var ICONS = {
    desk:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
    leads:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-9 9"/><path d="M12 7a5 5 0 1 1-5 5"/><circle cx="12" cy="12" r="1.4"/></svg>',
    contacts:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.4"/><path d="M3.5 19c.6-3.2 2.8-5 5.5-5s4.9 1.8 5.5 5"/><circle cx="17" cy="9" r="2.6"/><path d="M15.5 14.3c2.4.2 4.1 1.7 4.7 4.2"/></svg>',
    auto:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"/></svg>',
    refs:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>',
    todo:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.6 2.6L16 9.5"/></svg>',
    tasks:'<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M8 12l2 2 4-4"/></svg>',
    companies:'<svg viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="13" rx="1"/><path d="M9 7V4h6v3M9 11h2M13 11h2M9 15h2M13 15h2"/></svg>',
    analytics:'<svg viewBox="0 0 24 24"><path d="M4 20V4M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/></svg>',
    lists:'<svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.3"/><circle cx="3.5" cy="12" r="1.3"/><circle cx="3.5" cy="18" r="1.3"/></svg>',
    customers:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c.7-4 3.5-6 7-6s6.3 2 7 6"/><path d="M12 2v1.5M18.4 5.6l-1 1M6.6 5.6l1 1"/></svg>',
    settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>',
    imbox:'<svg viewBox="0 0 24 24"><path d="M4 5h16v11H9l-4 3v-3H4z"/><circle cx="9" cy="10.5" r="1"/><circle cx="12" cy="10.5" r="1"/><circle cx="15" cy="10.5" r="1"/></svg>',
    fdoc:'<svg viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 12h6M9 15h6M9 18h4"/></svg>',
    mail:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 6.5L12 13l8.5-6.5"/></svg>',
    wazzup:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0-7.7 13.7L3 21l4.5-1.2A9 9 0 1 0 12 3z"/><path d="M8.5 9.5c0 4 2.5 6 6 6" stroke-width="1.4"/></svg>',
    market:'<svg viewBox="0 0 24 24"><path d="M4 8h16l-1 5H5z"/><path d="M4 8l-1-3H1"/><circle cx="8" cy="19" r="1.4"/><circle cx="16" cy="19" r="1.4"/></svg>',
    bell:'<svg viewBox="0 0 24 24"><path d="M6 16V10a6 6 0 0 1 12 0v6l2 2H4z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>'
  };
  // [ключ, подпись, иконка, право-секции(если ограничение), ключ-бейджа] — порядок как в amo
  var NAV=[
    ["desk","Рабочий стол","desk"],
    ["leads","Сделки","leads","leads"],
    ["imbox","imBox","imbox",null,"imbox"],
    ["customers","Покупатели","customers"],
    ["tasks","Задачи","tasks","tasks","tasksDue"],
    ["lists","Списки","lists"],
    ["fdoc","F.Doc","fdoc"],
    ["mail","Почта","mail",null,"mail"],
    ["wazzup","Wazzup","wazzup",null,"wazzup"],
    ["analytics","Аналитика","analytics","analytics"],
    ["market","amoМаркет","market",null,"market"],
    ["_sep"],
    ["auto","Автоматизации","auto"],
    ["refs","Справочники","refs"],
    ["todo","Доработки","todo"],
    ["settings","Настройки","settings","settings"]
  ];
  // Живые бейджи-счётчики (как «Задачи» в amo). Заполняем из META.counts;
  // внешние сервисы (imBox/Почта/Wazzup/amoМаркет) появятся при их подключении.
  function navBadge(key){
    if(!key)return null;
    var c=(META&&META.counts)||{};
    if(key==="tasksDue")return c.tasksDue?{n:c.tasksDue}:null;
    if(key==="imbox")return c.imbox?{n:c.imbox}:null;
    if(key==="mail")return c.mail?{n:c.mail}:null;
    if(key==="wazzup")return c.wazzup?{n:c.wazzup,green:true}:null;
    if(key==="market")return c.market?{n:c.market}:null;
    return null;
  }
  function badgeFmt(n){return n>999?"999+":(n>=1000?(Math.round(n/100)/10)+"K":String(n));}
  function badgeHtml(b){return b?'<span class="nav-badge'+(b.green?" green":"")+'">'+badgeFmt(b.n)+'</span>':"";}
  function navAllowed(n){
    if(n[0]==="_sep")return true;
    if(!n[3])return true;                 // без ограничения — видно всем
    if(!ME)return true;                    // до загрузки прав — не прячем
    if(ME.is_admin)return true;
    return !!(ME.rights&&ME.rights.sections&&ME.rights.sections[n[3]]);
  }
  function renderSidebar(active){
    var bell=(META&&META.counts&&META.counts.notifications)||0;
    var items=NAV.filter(navAllowed).map(function(n){
      if(n[0]==="_sep")return '<div class="nav-sep"></div>';
      return '<button class="nav-i'+(n[0]===active?" act":"")+'" data-v="'+n[0]+'">'+ICONS[n[2]]+badgeHtml(navBadge(n[4]))+'<span>'+n[1]+'</span></button>';
    }).join("");
    $("#sidebar").innerHTML='<div class="logo" id="navLogo" title="На рабочий стол">V S C</div>'+
      '<div class="nav-scroll">'+items+'</div>'+
      '<div class="sb-bell" id="navBell" title="Уведомления">'+ICONS.bell+(bell?'<span class="nav-badge">'+badgeFmt(bell)+'</span>':"")+'</div>';
    var logo=$("#navLogo");if(logo)logo.onclick=function(){document.querySelectorAll(".dcard-bg").forEach(function(x){x.remove();});go("desk");};
    var bl=$("#navBell");if(bl)bl.onclick=function(e){openNotifPanel(e.currentTarget);};
    document.querySelectorAll(".nav-i").forEach(function(b){b.onclick=function(){document.querySelectorAll(".dcard-bg").forEach(function(x){x.remove();});go(b.dataset.v);};});
  }
  // Панель уведомлений (колокольчик внизу, как в amo)
  function openNotifPanel(anchor){
    document.querySelectorAll(".notif-panel").forEach(function(x){x.remove();});
    var r=anchor.getBoundingClientRect();
    var p=document.createElement("div");p.className="notif-panel";
    var due=(META&&META.counts&&META.counts.tasksDue)||0;
    var open=(META&&META.counts&&META.counts.tasksOpen)||0;
    p.innerHTML='<div class="np-h">Уведомления</div>'+
      '<div class="np-item'+(due?' hot':'')+'" data-go="tasks"><b>'+due+'</b> задач требуют внимания <span>(просроченные и на сегодня)</span></div>'+
      '<div class="np-item" data-go="tasks"><b>'+fmt(open)+'</b> открытых задач всего</div>'+
      '<div class="np-note">Уведомления Почты / imBox / Wazzup появятся после подключения внешних сервисов.</div>';
    document.body.appendChild(p);
    p.style.left=(r.right+8)+"px";
    p.style.bottom="14px";
    p.querySelectorAll("[data-go]").forEach(function(el){el.onclick=function(){p.remove();go(el.dataset.go);};});
    setTimeout(function(){document.addEventListener("click",function cl(ev){if(!p.contains(ev.target)&&ev.target!==anchor&&!anchor.contains(ev.target)){p.remove();document.removeEventListener("click",cl);}});},0);
  }

  /* ─── шапка ─── */
  function setHeader(title, opts){
    opts=opts||{};
    var t=$("#secTitle");
    t.innerHTML=esc(title)+(opts.caret?' <span class="caret">▾</span>':"");
    t.className=opts.caret?"clickable":"";
    t.onclick=opts.onTitle||null;
    $("#hCount").innerHTML=opts.count||"";
    $("#hSearch").value=""; $("#hSearch").placeholder=opts.searchPh||"Поиск и фильтр";
    $("#hSearch").onkeydown=opts.onSearch||null;
    curFilter=opts.filter||null;
    $("#hSearch").onclick=curFilter?function(){openFilterPanel();}:null;
    $("#hNew").textContent=opts.newBtn||"+ Новая сделка";
    $("#hNew").style.display=opts.onNew?"":"none";
    $("#hNew").onclick=opts.onNew||null;
    $("#hCfg").onclick=opts.onCfg||function(){toast("Здесь настройки — доступны в разделах со списками");};
    $("#hCfg").style.display=opts.onCfg===false?"none":"";
    var dots=$("#hDots");
    dots.style.display=opts.dotsMenu?"":"none";

  // контекстное меню у кнопки: items = [{label, on} | "sep"]
  function openCtxMenu(anchor,items){
    document.querySelectorAll(".ctxmenu").forEach(function(m){m.remove();});
    var r=anchor.getBoundingClientRect();
    var menu=document.createElement("div");menu.className="ctxmenu";
    menu.innerHTML=items.map(function(it){return it==="sep"?'<div class="sep"></div>':'<div>'+esc(it.label)+'</div>';}).join("");
    document.body.appendChild(menu);

    menu.style.left=Math.max(8,r.right-menu.offsetWidth)+"px";

    items.forEach(function(it){if(it==="sep")return;var row=rows[k++];if(it.on)row.onclick=function(){menu.remove();it.on();};});

  // ─── ФИЛЬТР (как в amoCRM: клик по строке поиска → панель фильтра) ───
  function userOptsHtml(sel){return '<option value="">— любой —</option>'+USERS.map(function(u){return '<option value="'+u.id+'"'+(String(u.id)===String(sel)?" selected":"")+'>'+esc(u.name)+'</option>';}).join("");}
  function closeFilterPanel(){var p=document.getElementById("filterPanel");if(p)p.remove();}
  // строка фильтра по кастомному полю: [поле][значение][×]
  function cfFilterRow(defs,sec,fid,val){
    return '<div class="cf-row" data-sec="'+sec+'"><select class="cf-field"><option value="">— поле —</option>'+
      defs.map(function(f){return '<option value="'+f.id+'"'+(String(f.id)===String(fid)?" selected":"")+'>'+esc(f.name)+'</option>';}).join("")+
      '</select><input class="cf-val" placeholder="значение" value="'+esc(val||"")+'"><button class="cf-del" title="убрать">×</button></div>';

  function openFilterPanel(){
    if(!curFilter)return;

    var anchor=$("#hSearch"),r=anchor.getBoundingClientRect();

      fields+='<div class="ffield"><label>Этап</label><select data-f="status"><option value="">— любой —</option>'+sts.map(function(s){return '<option value="'+s.id+'"'+(String(s.id)===String(st.status)?" selected":"")+'>'+esc(s.name)+'</option>';}).join("")+'</select></div>';
      fields+='<div class="ffield"><label>Бюджет, ₽</label><div class="frange"><input type="number" data-f="price_min" placeholder="от" value="'+(st.price_min||"")+'"><span>–</span><input type="number" data-f="price_max" placeholder="до" value="'+(st.price_max||"")+'"></div></div>';
      fields+='<div class="ffield"><label>Тег содержит</label><input type="text" data-f="tag" placeholder="напр. MSK" value="'+esc(st.tag||"")+'"></div>';
    }
    fields+='<div class="ffield"><label>Создано с</label><input type="date" data-f="date_from" value="'+(st.date_from||"")+'"></div>';
    fields+='<div class="ffield"><label>Создано по</label><input type="date" data-f="date_to" value="'+(st.date_to||"")+'"></div>';
    // секции фильтра по любым полям
    var ownDefs=isLeads?leadDefs:contDefs;
    var cfRowsHtml=(st._cf&&st._cf.length?st._cf:[["",""]]).map(function(x){return cfFilterRow(ownDefs,"cf",x[0],x[1]);}).join("");
    var ccfSection=isLeads?('<div class="cf-sec"><div class="cf-sec-h">Поля связанного контакта</div><div id="ccfRows">'+
      ((st._ccf&&st._ccf.length?st._ccf:[["",""]]).map(function(x){return cfFilterRow(contDefs,"ccf",x[0],x[1]);}).join(""))+
      '</div><button class="cf-add" data-add="ccf">+ ещё поле контакта</button></div>'):"";
    p.innerHTML='<h4>Фильтр '+(isLeads?"сделок":"контактов")+'</h4><div class="fgrid">'+fields+'</div>'+
      '<div class="cf-sec"><div class="cf-sec-h">Поля '+(isLeads?"сделки":"контакта")+' (любое поле)</div><div id="cfRows">'+cfRowsHtml+'</div><button class="cf-add" data-add="cf">+ ещё поле</button></div>'+
      ccfSection+
      '<div class="filter-acts"><button class="btn" id="fApply">Применить</button><button class="btn ghost" id="fReset">Сбросить</button><button class="btn ghost" id="fClose" style="margin-left:auto">Закрыть</button></div>';
    document.body.appendChild(p);
    p.style.top=(r.bottom+8)+"px";
    p.style.left=Math.max(10,Math.min(r.left,window.innerWidth-p.offsetWidth-10))+"px";
    p.addEventListener("click",function(e){e.stopPropagation();});
    // добавление/удаление строк полей
    p.querySelectorAll(".cf-add").forEach(function(btn){btn.onclick=function(){
      var sec=btn.dataset.add,box=p.querySelector(sec==="cf"?"#cfRows":"#ccfRows");
      var tmp=document.createElement("div");tmp.innerHTML=cfFilterRow(sec==="cf"?ownDefs:contDefs,sec,"","");box.appendChild(tmp.firstChild);bindDel();
    };});
    function bindDel(){p.querySelectorAll(".cf-del").forEach(function(b){b.onclick=function(){var row=b.closest(".cf-row");if(row.parentNode.children.length>1)row.remove();else{row.querySelector(".cf-field").value="";row.querySelector(".cf-val").value="";}};});}
    bindDel();
    var collectCf=function(sec){var out=[];p.querySelectorAll('.cf-row[data-sec="'+sec+'"]').forEach(function(row){var fid=row.querySelector(".cf-field").value,val=row.querySelector(".cf-val").value.trim();if(fid&&val)out.push([fid,val]);});return out;};
    var collect=function(){var vals={};p.querySelectorAll("[data-f]").forEach(function(el){var v=el.value.trim();if(v){if(el.type==="date")v=Math.floor(new Date(v+"T00:00:00").getTime()/1000);vals[el.dataset.f]=v;}});vals._cf=collectCf("cf");if(isLeads)vals._ccf=collectCf("ccf");return vals;};
    var collectRaw=function(){var raw={};p.querySelectorAll("[data-f]").forEach(function(el){if(el.value.trim())raw[el.dataset.f]=el.value.trim();});raw._cf=collectCf("cf");if(isLeads)raw._ccf=collectCf("ccf");return raw;};
    $("#fApply").onclick=function(){FSTATE[curFilter.kind]=collectRaw();var vals=collect();closeFilterPanel();if(isLeads)runLeadsFilter(vals);else runContactsFilter(vals);};
    $("#fReset").onclick=function(){FSTATE[curFilter.kind]={};closeFilterPanel();if(isLeads)vLeads();else vContacts();};
    $("#fClose").onclick=closeFilterPanel;
    setTimeout(function(){document.addEventListener("click",function cl(ev){if(!document.getElementById("filterPanel"))return document.removeEventListener("click",cl);if(!p.contains(ev.target)&&ev.target!==anchor){closeFilterPanel();document.removeEventListener("click",cl);}});},0);
  }
  function filterQS(vals){
    var parts=[];
    Object.keys(vals).forEach(function(k){if(k==="_cf"||k==="_ccf")return;parts.push(k+"="+encodeURIComponent(vals[k]));});
    (vals._cf||[]).forEach(function(x){parts.push("cf="+encodeURIComponent(x[0]+":"+x[1]));});
    (vals._ccf||[]).forEach(function(x){parts.push("ccf="+encodeURIComponent(x[0]+":"+x[1]));});
    return parts.join("&");
  }
  function runLeadsFilter(vals){
    var p=PIPES.find(function(x){return x.id===curPipe;})||PIPES[0];
    if(p&&!("pipeline" in vals))vals.pipeline=p.id;
    var stName={};((p&&p._embedded&&p._embedded.statuses)||[]).forEach(function(s){stName[s.id]=s.name;});
    setHeader("Фильтр сделок",{count:"",searchPh:"Поиск сделки (название или #id — Enter)",onSearch:function(e){if(e.key==="Enter")searchLeads(e.target.value);},filter:curFilter});
    $("#view").innerHTML='<div class="plain"><p class="muted">Фильтрую…</p></div>';
    jreq(API+"/leads_filter?"+filterQS(vals)).then(function(r){
      var items=(r&&r.items)||[];
      var head='<div class="plain" style="max-width:none"><div style="padding:6px 0 12px"><b>Найдено: '+fmt(r.total||items.length)+'</b> <a data-reset style="margin-left:12px">← к воронке</a></div>';
      if(!items.length){$("#view").innerHTML=head+'<p class="muted">Ничего не найдено.</p></div>';bindReset();return;}
      var html=head+'<table class="amo"><thead><tr><th style="width:34%">Название</th><th>Этап</th><th>Бюджет</th><th>Ответственный</th><th>Создана</th></tr></thead><tbody>';
      html+=items.map(function(l){return '<tr><td><a data-l="'+l.id+'">'+esc(l.name||("#"+l.id))+'</a></td><td class="muted">'+esc(stName[l.sid]||"")+'</td><td>'+fmt(l.price)+' ₽</td><td class="muted">'+esc(l.resp||"")+'</td><td class="muted">'+(l.created?dShort(l.created):"")+'</td></tr>';}).join("");
      html+='</tbody></table></div>';
      $("#view").innerHTML=html;
      $("#view").querySelectorAll("[data-l]").forEach(function(a){a.onclick=function(){openLead(parseInt(a.dataset.l,10));};});
      bindReset();makeTableResizable($("#view table.amo"),"crm_lead_colw");
    });
    function bindReset(){var a=$("#view").querySelector("[data-reset]");if(a)a.onclick=function(){FSTATE.leads={};vLeads();};}
  }
  function runContactsFilter(vals){
    setHeader("Фильтр контактов",{count:"",searchPh:"Поиск (имя, телефон, email — Enter)",onSearch:function(e){if(e.key==="Enter")doContactSearch(e.target.value);},filter:curFilter});

    jreq(API+"/contacts_filter?"+filterQS(vals)).then(function(r){
      var items=(r&&r.items)||[];
      var head='<div class="plain" style="max-width:none"><div style="padding:6px 0 12px"><b>Найдено: '+fmt(r.total||items.length)+'</b> <a data-reset style="margin-left:12px">← к контактам</a></div>';
      if(!items.length){$("#view").innerHTML=head+'<p class="muted">Ничего не найдено.</p></div>';bindReset();return;}
      var cols=contactActiveCols();
      var html=head+'<table class="amo"><thead>'+contactHeadHtml()+'</thead><tbody id="cbody">'+contactRows(items)+'</tbody></table></div>';
      $("#view").innerHTML=html;bindContactLinks();bindReset();makeTableResizable($("#view table.amo"),"crm_contact_colw");

  /* ─── РАБОЧИЙ СТОЛ как в amo: заголовок, период, воронка, виджеты-статистика ─── */
  var deskPeriod="today", deskPipe=null;
  var DESK_PERIODS=[["today","Сегодня"],["yesterday","Вчера"],["week","Неделя"],["month","Месяц"],["all","Всё время"]];
  function deskWidgetsKey(){return "crm_desk_widgets_"+((META&&META.account&&META.account.subdomain)||"x");}
  function loadDeskWidgets(){
    try{var v=JSON.parse(localStorage.getItem(deskWidgetsKey()));if(Array.isArray(v))return v;}catch(_){}
    // виджеты по умолчанию (как амошные счётчики сделок)
    return [
      {id:"w1",name:"Новые сделки",metric:"count",field:"created"},
      {id:"w2",name:"Успешно реализовано",metric:"count",won:1,field:"closed"},
      {id:"w3",name:"Выручка (успешные)",metric:"sum",won:1,field:"closed"},
      {id:"w4",name:"Сделок в работе (все)",metric:"count",field:"none"}
    ];
  }
  function saveDeskWidgets(ws){try{localStorage.setItem(deskWidgetsKey(),JSON.stringify(ws));}catch(_){}}
  function widgetQS(w){
    var p=[];
    if(w.pipeline)p.push("pipeline="+w.pipeline);
    if(w.status)p.push("status="+w.status);
    if(w.won)p.push("won=1");
    if(w.lost)p.push("lost=1");
    // поле «none» — без даты (все сделки фильтра, напр. «в работе»)
    if(w.field&&w.field!=="none"){p.push("field="+w.field);p.push("period="+deskPeriod);}
    return p.join("&");
  }
  function vDesk(){
    renderSidebar("desk");
    setHeader("Рабочий стол",{count:"",onCfg:false});
    var a=META.account||{};
    if(deskPipe==null){var mp=PIPES.find(function(p){return p.is_main;});deskPipe=mp?mp.id:(PIPES[0]&&PIPES[0].id);}
    var html='<div id="dash"><div class="desk-title">'+esc(a.name||"Рабочий стол")+'</div>';
    html+='<div class="desk-bar"><div class="desk-pills">'+DESK_PERIODS.map(function(x){return '<button data-per="'+x[0]+'"'+(x[0]===deskPeriod?" class=\"act\"":"")+'>'+x[1]+'</button>';}).join("")+'</div>';
    html+='<button class="desk-cfg" id="deskCfg">＋ Настроить</button></div>';
    html+='<div id="funnelW"></div><div class="w-grid" id="wGrid"></div></div>';

    $("#view").querySelectorAll(".desk-pills [data-per]").forEach(function(b){b.onclick=function(){deskPeriod=b.dataset.per;vDesk();};});

    renderFunnelWidget();
    renderDeskWidgets();

  function renderFunnelWidget(){
    jreq(API+"/analytics").then(function(r){
      var funnels=(r&&r.funnels)||[];
      var f=funnels.find(function(x){var p=PIPES.find(function(pp){return pp.id===deskPipe;});return p&&x.name===p.name;})||funnels[0];
      if(!f){$("#funnelW").innerHTML="";return;}
      var maxc=Math.max.apply(null,f.stages.map(function(s){return s.count;}).concat([1]));
      var pipeSel='<select id="funnelPipe" style="background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:6px;padding:4px 8px;font:inherit;font-size:12px">'+
        funnels.map(function(x){return '<option'+(x.name===f.name?" selected":"")+'>'+esc(x.name)+'</option>';}).join("")+'</select>';
      var html='<div class="funnel-w"><div class="fw-h"><span>Воронка · '+esc(f.name)+'</span><span>всего '+fmt(f.total)+'</span></div><div class="funnel-row">';
      f.stages.forEach(function(s){
        var h=Math.max(4,Math.round(8+ (s.count/maxc)*4));
        html+='<div class="funnel-stage"><div class="fs-bar" style="background:'+esc(s.color||"#4b78b0")+';height:'+h+'px"></div><div class="fs-c">'+fmt(s.count)+'</div><div class="fs-n">'+esc(s.name)+'</div><div class="fs-s">'+(s.sum?fmt(s.sum)+" ₽":"")+'</div></div>';
      });
      html+='</div></div>';
      $("#funnelW").innerHTML=html;
    }).catch(function(){$("#funnelW").innerHTML="";});
  }
  function renderDeskWidgets(){
    var ws=loadDeskWidgets();
    var grid=$("#wGrid");
    grid.innerHTML=ws.map(function(w){
      return '<div class="w-card" data-wid="'+w.id+'"><span class="w-del" title="Убрать">×</span><div class="w-name">'+esc(w.name)+'</div><div class="w-count" data-c>…</div>'+(w.metric==="sum"?'':'<div class="w-sum" data-s></div>')+'</div>';
    }).join("")+'<div class="w-add" id="wAdd">＋ Добавить виджет</div>';
    $("#wAdd").onclick=openWidgetEditor;
    grid.querySelectorAll(".w-del").forEach(function(x){x.onclick=function(e){e.stopPropagation();var id=x.closest("[data-wid]").dataset.wid;saveDeskWidgets(loadDeskWidgets().filter(function(w){return w.id!==id;}));renderDeskWidgets();};});
    // тянем статистику по каждому виджету последовательно щадя API нашей же БД
    ws.forEach(function(w){
      jreq(API+"/widget_stat?"+widgetQS(w)).then(function(r){
        var card=grid.querySelector('[data-wid="'+w.id+'"]');if(!card)return;
        if(w.metric==="sum"){card.querySelector("[data-c]").textContent=fmt(r.sum||0)+" ₽";card.querySelector("[data-c]").style.fontSize="27px";}
        else{card.querySelector("[data-c]").textContent=fmt(r.count||0);var sEl=card.querySelector("[data-s]");if(sEl)sEl.textContent=(r.sum?fmt(r.sum)+" ₽":"");}
      }).catch(function(){});
    });
  }
  // редактор виджета (логика добавления виджетов, как «Настроить» в amo)

      '<label class="mlbl">Считать по дате</label><select id="wD" class="ci"><option value="none">Без учёта периода (текущее состояние)</option><option value="created">Дата создания</option><option value="closed">Дата закрытия</option><option value="updated">Дата изменения</option></select>'+
      '<p class="muted" style="font-size:12px;margin:10px 0 0">Если выбрана дата — виджет считается за период, выбранный пилюлями сверху (Сегодня/Неделя/Месяц…).</p>'+

  /* ─── раздел «Задачи» ─── */
  function vTasks(){
    renderSidebar("tasks");
    var respSel='<select id="taskResp" class="ci" style="max-width:240px;display:inline-block;margin-left:10px"><option value="0">Все сотрудники</option>'+USERS.map(function(u){return '<option value="'+u.id+'">'+esc(u.name)+'</option>';}).join("")+'</select>';
    setHeader("Задачи",{count:respSel});
    setTimeout(function(){var s=$("#taskResp");if(s)s.onchange=function(){loadTasks(s.value);};},0);
    $("#view").innerHTML='<div class="plain" style="max-width:1000px"><div id="tasksBox">Загрузка…</div></div>';
    loadTasks(0);

  function loadTasks(resp){
    jreq(API+"/tasks_list"+(resp&&resp!=="0"?("?responsible="+resp):"")).then(function(items){
      var now=Date.now()/1000, dayEnd=now-(now%86400)+86400;
      var groups={overdue:[],today:[],tomorrow:[],later:[]};
      items.forEach(function(t){
        if(t.till&&t.till<now)groups.overdue.push(t);
        else if(t.till&&t.till<dayEnd)groups.today.push(t);
        else if(t.till&&t.till<dayEnd+86400)groups.tomorrow.push(t);
        else groups.later.push(t);
      });
      var titles={overdue:"Просроченные",today:"Сегодня",tomorrow:"Завтра",later:"Позже"};
      var colors={overdue:"#d64545",today:"#2f8b57",tomorrow:"#2e80ec",later:"#92989b"};
      var html="";
      ["overdue","today","tomorrow","later"].forEach(function(g){
        if(!groups[g].length)return;
        html+='<h3 style="color:'+colors[g]+'">'+titles[g]+' ('+groups[g].length+')</h3><table class="amo"><tbody>';
        groups[g].forEach(function(t){
          html+='<tr><td style="width:130px" class="muted">'+dt(t.till)+'</td><td>'+esc(t.text||"")+'</td><td style="width:180px"><a data-lead="'+t.entity_id+'">'+esc((t.lead_name||"сделка #"+t.entity_id).slice(0,30))+'</a></td><td class="muted" style="width:150px">'+esc(t.resp||"")+'</td><td style="width:90px"><a class="tdone" data-t="'+t.id+'">выполнить</a></td></tr>';
        });
        html+='</tbody></table>';
      });
      $("#tasksBox").innerHTML=html||'<p class="muted">Открытых задач нет</p>';
      $("#tasksBox").querySelectorAll("[data-lead]").forEach(function(a){a.onclick=function(){openLead(parseInt(a.dataset.lead,10));};});
      $("#tasksBox").querySelectorAll(".tdone").forEach(function(a){a.onclick=function(){
        var res=prompt("Результат задачи (необязательно):","");
        ereq("POST","/edit-api/task/"+a.dataset.t+"/complete",{result:res||""}).then(function(r){if(r&&r.success){toast("Задача выполнена");loadTasks($("#taskResp")?$("#taskResp").value:0);}else toast("Не удалось",true);});
      };});
    });
  }

  /* ─── сделки: канбан ─── */
  var curPipe=null, DRAG=null;
  function dropLeadToStage(col){

  function fieldsGroupedHtml(vals,defs,entity){

    var valById={};(vals||[]).forEach(function(v){valById[v.field_id]=v;});
    var groups=fieldGroups(defs),html="";
    // если разделителей-групп нет (напр. у компаний) — верхние поля показываем как группу «Основное»
    // (с пустыми редактируемыми «+ добавить»), а не только заполненные
    if(entity&&groups.length===1&&groups[0].name===null&&groups[0].ids.length)groups[0].name="Основное";
    groups.forEach(function(g){
      if(g.name===null){
        // верхние поля (до первого разделителя) — только заполненные, всегда видны
        var top="";g.ids.forEach(function(fid){var f=valById[fid];if(!f)return;var t=f.field_type||typeById[fid]||"";top+=cfRowHtml(f,t,byId,entity,editById);});
        html+=top;return;

      var rows="";
      g.ids.forEach(function(fid){
        var f=valById[fid];
        if(f){var t=f.field_type||typeById[fid]||"";var r=cfRowHtml(f,t,byId,entity,editById);if(r){rows+=r;return;}}
        rows+=cfEmptyRowHtml(defById[fid],entity,editById);

  var FEED_FILTERS=[["all","все"],["tasks","задачи"],["notes","примечания"]];
  function feedHtml(notes,tasks,filter,bg){

    if(filter!=="notes"&&filter!=="history")(tasks||[]).forEach(function(t){evs.push({ts:t.complete_till||t.created_at||0,kind:"task",t:t});});
    evs.sort(function(a,b){return b.ts-a.ts;});
    if(!evs.length)return '<p class="muted" style="padding:16px 4px">Пока пусто</p>';
    var html="",lastDay="";
    evs.slice(0,300).forEach(function(e){

      if(day!==lastDay){html+='<div class="day-sep"><b>'+day+'</b></div>';lastDay=day;}
      if(e.kind==="task"){

      } else {

  function makeTableResizable(table,key){
    if(!table)return;
    var ths=table.querySelectorAll("thead th");
    var saved={};try{saved=JSON.parse(localStorage.getItem(key))||{};}catch(e){}
    ths.forEach(function(th,i){
      if(saved[i])th.style.width=saved[i]+"px";
      if(th.querySelector(".col-resize"))return;
      var h=document.createElement("span");h.className="col-resize";th.appendChild(h);
      h.addEventListener("mousedown",function(e){
        e.preventDefault();e.stopPropagation();
        var startX=e.pageX,startW=th.offsetWidth;
        function mv(ev){th.style.width=Math.max(48,startW+(ev.pageX-startX))+"px";}
        function up(){document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);saved[i]=th.offsetWidth;try{localStorage.setItem(key,JSON.stringify(saved));}catch(_){}}
        document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);

    });

  /* ─── автоматизации ─── */
  function mdRender(md){
    var h=esc(md);
    h=h.replace(/^### (.*)$/gm,"<h3>$1</h3>").replace(/^## (.*)$/gm,"<h2>$1</h2>").replace(/^# (.*)$/gm,"<h1>$1</h1>");
    h=h.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>");
    h=h.replace(/((?:^\|.*\|\s*$\n?)+)/gm,function(block){
      var rows=block.trim().split("\n").filter(function(r){return !/^\|[\s:|-]+\|$/.test(r);});
      return "<table>"+rows.map(function(r,i){
        var cells=r.replace(/^\||\|$/g,"").split("|");
        return "<tr>"+cells.map(function(c){return (i===0?"<th>":"<td>")+c.trim()+(i===0?"</th>":"</td>");}).join("")+"</tr>";
      }).join("")+"</table>";
    });
    h=h.replace(/^- (.*)$/gm,"<li>$1</li>").replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g,"<ul>$1</ul>");
    return h.replace(/\n{2,}/g,"<br>");
  }

      var html='<p class="muted" style="margin:0 0 12px">Роли и права. Определяют, какие разделы видит сотрудник и что может делать. Права применяются при входе по email.</p>';
      html+=r.roles.map(function(ro){
        return '<div class="role-card" data-role="'+esc(ro.name)+'"><h3>'+esc(ro.name)+(ro.is_admin?' <span class="badge-adm">админ</span>':"")+' <span class="muted" style="font-weight:400;font-size:12px">— '+ro.users+' польз.</span></h3>'+
          '<label style="font-size:13px;display:block;margin-bottom:4px"><input type="checkbox" class="r-admin"'+(ro.is_admin?" checked":"")+'> Полный доступ (администратор)</label>'+
          permRow(ro.rights||{})+
          '<button class="btn r-save" style="margin-top:8px">Сохранить</button>'+
          (ro.users===0?'<button class="btn ghost r-del" style="margin:8px 0 0 8px">Удалить</button>':"")+'</div>';
      }).join("");
      html+='<div style="margin-top:10px"><input type="text" id="newRole" placeholder="Название новой роли" style="padding:7px 10px"><button class="btn ghost" id="addRole" style="margin-left:8px">+ Добавить роль</button></div>';
      $("#sbody").innerHTML=html;
      document.querySelectorAll(".role-card").forEach(function(card){
        card.querySelector(".r-save").onclick=function(){
          var rights={sections:{},edit:false,del:false,exp:false};
          card.querySelectorAll("[data-sec]").forEach(function(cb){rights.sections[cb.dataset.sec]=cb.checked;});
          card.querySelectorAll("[data-act]").forEach(function(cb){rights[cb.dataset.act]=cb.checked;});
          var isAdmin=card.querySelector(".r-admin").checked;
          ereq("PATCH",API+"/auth/role/"+encodeURIComponent(card.dataset.role),{rights:rights,is_admin:isAdmin?1:0}).then(function(x){toast(x&&x.success?"Роль сохранена":"Не удалось",!(x&&x.success));});
        };
        var delBtn=card.querySelector(".r-del");
        if(delBtn)delBtn.onclick=function(){if(!confirm("Удалить роль «"+card.dataset.role+"»?"))return;ereq("DELETE",API+"/auth/role/"+encodeURIComponent(card.dataset.role)).then(function(x){if(x&&x.success){toast("Роль удалена");settingsRoles();}else toast((x&&x.message)||"Не удалось",true);});};
      });
      $("#addRole").onclick=function(){var n=($("#newRole").value||"").trim();if(!n)return;ereq("POST",API+"/auth/role",{name:n}).then(function(x){if(x&&x.success){toast("Роль добавлена");settingsRoles();}else toast((x&&x.message)||"Не удалось",true);});};
    });
  }
  function settingsFields(){
    var block=function(title,arr){
      arr=arr||[];
      return '<details open style="margin-bottom:10px"><summary style="cursor:pointer;font-weight:600;padding:6px 0">'+title+' ('+arr.length+')</summary>'+
        '<table class="set"><tr><th>Поле</th><th>Тип</th><th>Код</th><th>Значений</th></tr>'+arr.map(function(f){
          return '<tr><td>'+esc(f.name)+'</td><td class="muted">'+esc(f.type)+'</td><td class="muted">'+esc(f.code||"")+'</td><td class="muted">'+((f.enums||[]).length||"")+'</td></tr>';
        }).join("")+'</table></details>';
    };
    var cf=CF||{};
    $("#sbody").innerHTML='<p class="muted" style="margin:0 0 12px">Кастомные поля — точная копия из amoCRM. Значения полей хранятся в карточках; здесь — их описания.</p>'+
      block("Поля сделок",cf.leads)+block("Поля контактов",cf.contacts)+block("Поля компаний",cf.companies);
  }
  function settingsPipelines(){
    var html='<p class="muted" style="margin:0 0 12px">Воронки и этапы — как в amoCRM ('+PIPES.length+' воронок).</p>';
    PIPES.forEach(function(p){
      var sts=((p._embedded&&p._embedded.statuses)||[]).slice().sort(function(a,b){return (a.sort||0)-(b.sort||0);});
      html+='<div class="role-card"><h3>'+esc(p.name)+(p.is_main?' <span class="badge-adm">основная</span>':"")+' <span class="muted" style="font-weight:400;font-size:12px">— '+sts.length+' этапов</span></h3>';
      html+='<table class="set" style="max-width:520px"><tr><th>#</th><th>Этап</th><th>Тип</th></tr>'+sts.map(function(s,i){
        var col=s.color||"#c1d5e0";
        var typ=s.type===1?"успех":(s.type===142?"успех":(s.type===143?"отказ":""));
        return '<tr><td class="muted">'+(i+1)+'</td><td><span class="swatch" style="background:'+esc(col)+'"></span>'+esc(s.name)+'</td><td class="muted">'+typ+'</td></tr>';
      }).join("")+'</table></div>';
    });
    $("#sbody").innerHTML=html;
  }

  /* ─── АНАЛИТИКА (сводные отчёты из БД) ─── */
  function vAnalytics(){
    renderSidebar("analytics");
    setHeader("Аналитика",{count:""});
    $("#view").innerHTML='<div class="plain"><div class="pcard"><p class="muted">Загрузка…</p></div></div>';
    jreq(API+"/analytics").then(function(r){
      if(!r||!r.success)return $("#view").innerHTML='<div class="plain"><div class="pcard"><p class="muted">'+esc((r&&r.message)||"Нет данных")+'</p></div></div>';
      var html='<div class="plain">';
      // Воронка продаж по этапам основной воронки
      (r.funnels||[]).forEach(function(f){
        var max=Math.max.apply(null,f.stages.map(function(s){return s.count;}).concat([1]));
        html+='<div class="pcard"><h2>Воронка: '+esc(f.name)+'</h2><table class="set"><tr><th>Этап</th><th>Сделок</th><th>Сумма</th><th style="width:34%">Доля</th></tr>'+
          f.stages.map(function(s){
            var w=Math.round(s.count/max*100);
            return '<tr><td><span class="swatch" style="background:'+esc(s.color||"#c1d5e0")+'"></span>'+esc(s.name)+'</td><td>'+fmt(s.count)+'</td><td class="muted">'+fmt(s.sum)+' ₽</td><td><div style="background:#e8eef4;border-radius:4px;height:14px"><div style="width:'+w+'%;background:var(--link);height:14px;border-radius:4px"></div></div></td></tr>';
          }).join("")+'</table></div>';
      });
      // По ответственным
      if(r.byUser&&r.byUser.length){
        html+='<div class="pcard"><h2>По ответственным (открытые сделки)</h2><table class="set"><tr><th>Сотрудник</th><th>Сделок</th><th>Сумма</th></tr>'+
          r.byUser.map(function(u){return '<tr><td>'+esc(u.name)+'</td><td>'+fmt(u.count)+'</td><td class="muted">'+fmt(u.sum)+' ₽</td></tr>';}).join("")+'</table></div>';
      }
      html+='</div>';
      $("#view").innerHTML=html;
    }).catch(function(){$("#view").innerHTML='<div class="plain"><div class="pcard"><p class="muted">Ошибка загрузки аналитики.</p></div></div>';});
  }

  /* ─── СПИСКИ (каталоги amoCRM: услуги, юр.лица, счета) ─── */
  function catalogElVal(el,fname){
    var f=(el.custom_fields_values||[]).find(function(x){return x.field_name===fname;});
    if(!f)return "";
    return (f.values||[]).map(function(v){return v.value&&v.value.name?v.value.name:v.value;}).join(", ");
  }
  // ─── СПИСКИ = как в amo: единый раздел с вкладками Контакты/Компании/каталоги ───
  var LIST_CATALOGS=null, listsTab="contacts";
  function listTabsHtml(active){
    listsTab=active;
    var tabs=[["contacts","Контакты"],["companies","Компании"]];
    (LIST_CATALOGS||[]).forEach(function(c){tabs.push(["cat:"+c.id,c.name]);});
    return '<div class="lists-tabs">'+tabs.map(function(t){
      return '<button class="lt'+(t[0]===active?" act":"")+'" data-lt="'+t[0]+'">'+esc(t[1])+'</button>';
    }).join("")+'</div>';
  }
  function bindListTabs(){document.querySelectorAll(".lists-tabs .lt").forEach(function(b){b.onclick=function(){openListTab(b.dataset.lt);};});}
  function openListTab(t){
    if(t==="contacts")return vContacts();
    if(t==="companies")return vCompanies();
    if(t.indexOf("cat:")===0)return vCatalog(parseInt(t.slice(4),10));
  }
  // раздел загружается — сначала подтягиваем каталоги (для вкладок), затем открываем активную
  function vLists(){
    renderSidebar("lists");
    if(LIST_CATALOGS){return openListTab(listsTab);}
    setHeader("Списки",{count:""});
    $("#view").innerHTML='<div class="plain"><div class="pcard"><p class="muted">Загрузка…</p></div></div>';
    jreq(API+"/catalogs").then(function(cats){
      LIST_CATALOGS=Array.isArray(cats)?cats:[];
      openListTab(listsTab||"contacts");
    }).catch(function(){LIST_CATALOGS=[];openListTab("contacts");});
  }
  function vCatalog(id){
    renderSidebar("lists");
    setHeader("Списки",{count:""});
    var c=(LIST_CATALOGS||[]).find(function(x){return x.id===id;});
    if(!c){$("#view").innerHTML=listTabsHtml("cat:"+id)+'<div class="plain"><div class="pcard"><p class="muted">Каталог не найден.</p></div></div>';bindListTabs();return;}
    var typeName={products:"Товары/услуги",suppliers:"Юр. лица",invoices:"Счета и покупки",contacts:"Контакты",customers:"Покупатели"};
    var els=c.elements||[];
    var freq={};els.forEach(function(e){(e.custom_fields_values||[]).forEach(function(f){freq[f.field_name]=(freq[f.field_name]||0)+1;});});
    var cols=Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];}).slice(0,6);
    var html=listTabsHtml("cat:"+id)+'<div class="plain" style="max-width:none"><div class="pcard"><h2>'+esc(c.name)+' <span class="muted" style="font-weight:400;font-size:13px">— '+els.length+' элементов'+(typeName[c.type]?" · "+typeName[c.type]:"")+'</span></h2>';
    if(!els.length){html+='<p class="muted">Пусто.</p></div></div>';}
    else{
      html+='<table class="amo"><thead><tr><th>Наименование</th>'+cols.map(function(x){return '<th>'+esc(x)+'</th>';}).join("")+'</tr></thead><tbody>';
      html+=els.slice(0,500).map(function(e){return '<tr><td>'+esc(e.name||"—")+'</td>'+cols.map(function(x){return '<td class="muted">'+esc(catalogElVal(e,x))+'</td>';}).join("")+'</tr>';}).join("");
      html+='</tbody></table>'+(els.length>500?'<p class="muted" style="margin-top:8px">Показаны первые 500 из '+els.length+'</p>':"")+'</div></div>';
    }
    $("#view").innerHTML=html;bindListTabs();
  }
  // ─── внешние разделы (каркас; сервисы подключаются позже) ───
  function extSection(nav,icon,title,desc){
    renderSidebar(nav);
    setHeader(title,{count:"",onCfg:false});
    $("#view").innerHTML='<div class="ext-wrap"><div class="ext-ico">'+ICONS[icon]+'</div><h2>'+esc(title)+'</h2>'+
      desc.map(function(p){return '<p>'+p+'</p>';}).join("")+
      '<div class="ext-badge">Раздел-каркас · интеграция подключается</div></div>';
  }
  function vImbox(){extSection("imbox","imbox","imBox — мессенджеры",["Единая входящая из мессенджеров и соцсетей (WhatsApp, Telegram, VK, Avito и т.д.), как в amoCRM.","Каркас раздела готов; подключение каналов и переписка появятся после интеграции провайдеров."]);}
  function vFdoc(){extSection("fdoc","fdoc","F.Doc — документооборот",["Электронный документооборот и подписание (аналог F.Doc в amoCRM).","В нашей копии уже есть собственный модуль ПЭП (esign) — его свяжем с этим разделом при подключении."]);}
  function vMail(){extSection("mail","mail","Почта",["Рабочая почта прямо в CRM: письма привязываются к сделкам и контактам, как в amoCRM.","Каркас готов; подключение почтовых ящиков (IMAP/SMTP) — на следующем шаге."]);}
  function vWazzup(){extSection("wazzup","wazzup","Wazzup — WhatsApp и Instagram",["Интеграция Wazzup: переписка в WhatsApp/Instagram из карточек сделок и контактов.","Каркас готов; подключение канала Wazzup выполняется по API-ключу."]);}
  function vMarket(){extSection("market","market","amoМаркет",["Каталог виджетов и интеграций (аналог amoМаркет).","Здесь будут доступные модули и интеграции нашей копии."]);}

  /* ─── ПОКУПАТЕЛИ (модуль customers) ─── */
  var custPage=0,custLoading=false,custSearch="";
  function custRow(c){
    return '<tr><td><a data-cu="'+c.id+'">'+esc(c.name||"Без имени")+'</a></td><td class="muted">'+esc(c.resp||"")+'</td><td>'+(c.ltv?fmt(c.ltv)+" ₽":"—")+'</td><td>'+(c.purchases||"—")+'</td><td>'+(c.avg?fmt(c.avg)+" ₽":"—")+'</td><td class="muted">'+(c.next_date?dShort(c.next_date):"")+'</td></tr>';
  }
  function vCustomers(){
    renderSidebar("customers");
    setHeader("Покупатели",{count:"",searchPh:"Поиск покупателя (имя — Enter)",onSearch:function(e){if(e.key==="Enter"){custSearch=e.target.value.trim();vCustomers();}}});
    $("#view").innerHTML='<div class="plain" style="max-width:none"><table class="amo"><thead><tr><th style="width:30%">Наименование</th><th>Ответственный</th><th>LTV</th><th>Покупок</th><th>Средний чек</th><th>След. платёж</th></tr></thead><tbody id="cubody"></tbody></table><div id="cumore" class="muted" style="padding:14px;text-align:center"></div></div>';
    custPage=0;custLoading=false;
    loadCustPage();
    $("#main").onscroll=function(){if(custLoading||custSearch)return;var m=$("#main");if(m.scrollTop+m.clientHeight>m.scrollHeight-600)loadCustPage();};
  }
  function loadCustPage(){
    if(custLoading)return;custLoading=true;var next=custPage+1;$("#cumore").textContent="Загрузка…";
    jreq(API+"/customers_page?page="+next+(custSearch?"&q="+encodeURIComponent(custSearch):"")).then(function(r){
      var items=(r&&r.items)||[];
      if(custPage===0&&r&&r.total!=null)$("#hCount").innerHTML=fmt(r.total)+" покупателей";
      if(!items.length){$("#cumore").textContent=custPage?"Это все покупатели":"Ничего не найдено";custLoading=false;return;}
      $("#cubody").insertAdjacentHTML("beforeend",items.map(custRow).join(""));
      $("#cubody").querySelectorAll("[data-cu]").forEach(function(a){if(!a.dataset.b){a.dataset.b=1;a.onclick=function(){openCustomer(parseInt(a.dataset.cu,10));};}});
      custPage=next;custLoading=false;$("#cumore").textContent=custSearch?"":"";
    }).catch(function(){$("#cumore").textContent="Недоступно";custLoading=false;});
  }
  function openCustomer(id){
    jreq(API+"/customer/"+id).then(function(r){
      if(!r||!r.success)return toast("Не найдено",true);
      var c=r.customer;
      var rows=[["Ответственный",userName(c.responsible_user_id)],["LTV",c.ltv?fmt(c.ltv)+" ₽":"—"],["Покупок",c.purchases_count||"—"],["Средний чек",c.average_check?fmt(c.average_check)+" ₽":"—"],["След. платёж",c.next_price?fmt(c.next_price)+" ₽":"—"],["Дата платежа",c.next_date?dShort(c.next_date):"—"],["Создан",c.created_at?dt(c.created_at):"—"]];
      var left='<div class="dl-head"><span class="back">‹</span><h2>'+esc(c.name||("Покупатель #"+c.id))+'</h2><div class="dl-sub">#'+c.id+'</div></div><div class="fields">'+rows.map(function(x){return '<div class="frow"><div class="fl">'+x[0]+'</div><div class="fv">'+esc(String(x[1]))+'</div></div>';}).join("")+fieldsHtml(c.custom_fields_values,null,"")+'</div>';
      var bg=cardShell(left,function(){return '<p class="muted" style="padding:16px 4px">Лента покупателя не выгружалась.</p>';},null);
    });
  }

  var views={desk:vDesk,leads:vLeads,contacts:vContacts,companies:vCompanies,customers:vCustomers,tasks:vTasks,lists:vLists,analytics:vAnalytics,auto:vAuto,refs:vRefs,todo:vTodo,settings:vSettings,imbox:vImbox,fdoc:vFdoc,mail:vMail,wazzup:vWazzup,market:vMarket};
  var curView="leads";
  function go(name){curView=name;hidePipePanel();(views[name]||vDesk)();}

  /* ─── вход ─── */
  function pickToken(){
    var qs=new URLSearchParams(location.search).get("token");
    var cands=[qs,localStorage.getItem("voyo_crmcopy_token"),localStorage.getItem("voyo_vsc_token"),localStorage.getItem("voyo_team_token"),localStorage.getItem("voyo_admin_token")];
    for(var i=0;i<cands.length;i++)if(cands[i])return cands[i];
    return null;
  }
  function showLogin(msg){
    $("#app").style.display="none";
    $("#login-screen").style.display="flex";
    $("#loginErr").textContent=msg||"";
    // переключение вкладок вход-по-коду / вход-сотрудника
    document.querySelectorAll(".ltab").forEach(function(t){t.onclick=function(){
      document.querySelectorAll(".ltab").forEach(function(x){x.classList.toggle("act",x===t);});
      var user=t.dataset.l==="user";
      $("#lg-user").style.display=user?"":"none";
      $("#lg-code").style.display=user?"none":"";
      $("#loginErr").textContent="";
      setTimeout(function(){$(user?"#loginEmail":"#loginCode").focus();},30);
    };});
    // вход по коду (супер-админ)
    var goCode=function(){
      var code=$("#loginCode").value.trim();
      if(!code)return;
      fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code})})
        .then(function(r){return r.json();})
        .then(function(j){
          if(j.success&&j.token){localStorage.setItem("voyo_crmcopy_token",j.token);location.reload();}
          else $("#loginErr").textContent=j.message||"Неверный код";
        })
        .catch(function(){$("#loginErr").textContent="Ошибка сети — попробуйте ещё раз";});
    };
    // вход сотрудника: email + пароль (пароль ставится при первом входе)
    var goUser=function(){
      var email=$("#loginEmail").value.trim(),pass=$("#loginPass").value;
      if(!email)return;
      fetch(API+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:pass})})
        .then(function(r){return r.json();})
        .then(function(j){
          if(j.success&&j.token){localStorage.setItem("voyo_crmcopy_token",j.token);location.reload();return;}
          if(j.success&&j.needSet){$("#setHint").style.display="block";$("#loginErr").textContent="";$("#loginPass").focus();return;}
          $("#loginErr").textContent=j.message||"Не удалось войти";
        })
        .catch(function(){$("#loginErr").textContent="Ошибка сети — попробуйте ещё раз";});
    };
    $("#loginGo").onclick=goCode;
    $("#loginCode").onkeydown=function(e){if(e.key==="Enter")goCode();};
    $("#loginUserGo").onclick=goUser;
    $("#loginEmail").onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();$("#loginPass").focus();}};
    $("#loginPass").onkeydown=function(e){if(e.key==="Enter")goUser();};
    setTimeout(function(){$("#loginEmail").focus();},50);
  }

  token=pickToken();
  if(!token)return showLogin();
  jreq(API+"/meta").then(function(meta){
    if(meta&&meta.success===false){
      $("#app").style.display="flex";renderSidebar("desk");setHeader("Копия amoCRM",{});
      $("#view").innerHTML='<div class="plain"><div class="pcard"><h2>Слепок ещё собирается</h2><p class="muted">'+esc(meta.message||"")+'</p></div></div>';
      return;
    }
    META=meta;
    return Promise.all([jreq(API+"/pipelines"),jreq(API+"/kanban"),jreq(API+"/users"),jreq(API+"/custom_fields"),jreq(API+"/auth/me").catch(function(){return null;}),jreq(API+"/task_types").catch(function(){return null;}),jreq(API+"/counts").catch(function(){return null;})]).then(function(r){
      PIPES=r[0];KANBAN=r[1];USERS=r[2];CF=r[3];
      ME=(r[4]&&r[4].me)||{is_admin:1,rights:null};
      TASK_TYPES=(r[5]&&r[5].types)||[];
      // живые счётчики из БД вместо статичных из слепка (копия синкается — цифры актуальные)
      META.counts=META.counts||{};
      if(r[6]&&r[6].success){if(r[6].contacts!=null)META.counts.contacts=r[6].contacts;if(r[6].leads!=null)META.counts.leads=r[6].leads;if(r[6].companies!=null)META.counts.companies=r[6].companies;if(r[6].tasksDue!=null)META.counts.tasksDue=r[6].tasksDue;if(r[6].tasksOpen!=null)META.counts.tasksOpen=r[6].tasksOpen;}
      $("#app").style.display="flex";
      go("leads");
    });
  }).catch(function(e){
    if(String(e.message)==="401")showLogin("Сессия истекла — введите код ещё раз.");
    else{$("#app").style.display="flex";$("#view").innerHTML='<div class="plain"><div class="pcard">Ошибка загрузки. Обновите страницу.</div></div>';}
  });
})();
</script>
</body>
</html>
