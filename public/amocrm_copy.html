  function contactActiveCols(){var sel=contactColSel();var all=contactAllCols();return all.filter(function(c){return sel?sel.indexOf(c[0])>=0:c[2];});}
  function contactCell(c,key){
    if(key==="n")return '<a data-c="'+c.id+'">'+esc(c.n||"Без имени")+'</a>'+((c.tags&&c.tags.length)?' '+c.tags.slice(0,3).map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join(""):"");
    if(key==="deals")return (c.deals||[]).map(function(d){return '<span class="deal-chip" data-dl="'+d.id+'" style="background:'+esc(d.color||"#c1d5e0")+'26;border-left:3px solid '+esc(d.color||"#c1d5e0")+'" title="'+esc(d.st||"")+(d.price?" · "+fmt(d.price)+" ₽":"")+'">'+esc((d.name||("#"+d.id)).slice(0,26))+'</span>';}).join("")||'<span class="muted">—</span>';
    if(key==="p")return esc((c.p||[]).join(", "));
    if(key==="e")return esc((c.e||[]).join(", "));
    if(key==="resp")return '<span class="muted">'+esc(c.resp||"")+'</span>';
    if(key==="created")return '<span class="muted">'+(c.created?dt(c.created):"")+'</span>';
    if(key==="updated")return '<span class="muted">'+(c.updated?dt(c.updated):"")+'</span>';
    if(key.slice(0,2)==="cf"){
      var fid=parseInt(key.slice(2),10),f=(c.cf||[]).find(function(x){return x.field_id===fid;});
      if(!f)return "";
      var val=(f.values||[]).map(function(v){
        var vv=v.value;
        // составное «Юр. лицо» (legal_entity, как в amo): название + реквизиты построчно
        if(vv&&typeof vv==="object"&&(vv.vat_id||vv.tax_registration_reason_code||vv.kpp||vv.address)){
          var parts=[vv.name||""];
          if(vv.vat_id)parts.push("ИНН "+vv.vat_id);
          if(vv.kpp||vv.tax_registration_reason_code)parts.push("КПП "+(vv.kpp||vv.tax_registration_reason_code));
          if(vv.bank_code)parts.push("БИК "+vv.bank_code);
          if(vv.address)parts.push("Адрес "+vv.address);
          return parts.filter(Boolean).join(" · ");
        }
        vv=vv&&vv.name?vv.name:vv;
        if((f.field_type==="date"||f.field_type==="date_time"||f.field_type==="birthday")&&vv&&isFinite(vv))vv=dShort(Number(vv));
        if(typeof vv==="boolean")vv=vv?"Да":"Нет";
        return vv;
      }).join(", ");
      return '<span class="muted">'+esc(String(val).slice(0,80))+'</span>';
    }
    return "";
  }

  function mdRender(md){
    var h=esc(md);
    h=h.replace(/^### (.*)$/gm,"<h3>$1</h3>").replace(/^## (.*)$/gm,"<h2>$1</h2>").replace(/^# (.*)$/gm,"<h1>$1</h1>");
    h=h.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>");
    h=h.replace(/((?:^\|.*\|\s*$\n?)+)/gm,function(block){
      var rows=block.trim().split("\n").filter(function(r){return !/^\|[\s:|-]+\|$/.test(r);});
      return "<table>"+rows.map(function(r,i){
        var cells=r.replace(/^\||\|$/g,"").split("|");
        return "<tr>"+cells.map(function(c){return (i===0?"<th>":"<td>")+c.trim()+(i===0?"</th>":"</td>");}).join("")+"</tr>";
      }).join("")+"</table>";
    });
    h=h.replace(/^- (.*)$/gm,"<li>$1</li>").replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g,"<ul>$1</ul>");
    return h.replace(/\n{2,}/g,"<br>");
  }

  // «Сводный отчёт» (как в amo): график создано/закрыто по неделям + всего сделок + этапы + менеджеры
  function renderSummaryReport(tabs){
    $("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><p class="muted">Загрузка…</p></div></div>';
    bindAnTabs();
    var ep=VIEW_EPOCH;
    jreq(API+"/summary_report").then(function(r){
      if(ep!==VIEW_EPOCH||anTab!=="summary")return;
      if(!r||!r.success)return $("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><p class="muted">'+esc((r&&r.message)||"Нет данных")+'</p></div></div>';
      // график по неделям (SVG): синяя — создано, зелёная — закрыто
      var ws=r.weeks||[],W=980,H=220,PAD=30;
      var maxV=Math.max.apply(null,ws.map(function(x){return Math.max(x.created,x.closed);}).concat([1]));
      var px=function(i){return PAD+i*(W-2*PAD)/Math.max(ws.length-1,1);};
      var py=function(v){return H-18-(v/maxV)*(H-40);};
      var line=function(key){return ws.map(function(x,i){return (i?"L":"M")+px(i).toFixed(1)+" "+py(x[key]).toFixed(1);}).join(" ");};
      var dots=function(key,col){return ws.map(function(x,i){return '<circle cx="'+px(i).toFixed(1)+'" cy="'+py(x[key]).toFixed(1)+'" r="2.6" fill="'+col+'"><title>'+esc(x.w)+': '+fmt(x[key])+'</title></circle>';}).join("");};
      var chart='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:1050px">'+
        '<text x="'+PAD+'" y="14" font-size="11" fill="#8a94a0">'+fmt(maxV)+'</text>'+
        '<path d="'+line("created")+'" fill="none" stroke="#3f83c9" stroke-width="2"/>'+dots("created","#3f83c9")+
        '<path d="'+line("closed")+'" fill="none" stroke="#63a04d" stroke-width="2"/>'+dots("closed","#63a04d")+
        '</svg><div class="muted" style="font-size:12px;margin-top:2px"><span style="color:#3f83c9">●</span> создано · <span style="color:#63a04d">●</span> закрыто · по неделям</div>';
      var col=function(title,items){
        return '<div style="flex:1;min-width:280px"><h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#8a94a0;margin:0 0 10px">'+title+'</h3>'+
          items.map(function(x){return '<div style="display:flex;gap:10px;align-items:baseline;margin:8px 0"><b style="font-size:20px;min-width:52px;text-align:right">'+x.pct+'%</b><div style="border-left:3px solid '+esc(x.color||"#c9d3de")+';padding-left:8px"><div style="font-size:13.5px">'+esc(x.name)+'</div><div class="muted" style="font-size:12px">'+fmt(x.c)+' сделок, '+fmt(x.s)+' ₽</div></div></div>';}).join("")+'</div>';
      };
      var center='<div style="flex:0 0 240px;text-align:center;align-self:center"><div style="font-size:40px;font-weight:700">'+fmt(r.total)+'</div><div class="muted">Всего сделок</div><div class="muted" style="margin-top:4px">'+fmt(r.sum)+' ₽</div></div>';
      $("#view").innerHTML='<div class="plain">'+tabs+
        '<div class="pcard"><h2>Сделки</h2>'+chart+'</div>'+
        '<div class="pcard"><div style="display:flex;gap:24px;flex-wrap:wrap">'+col("Этапы продаж",r.stages||[])+center+col("Сделки по менеджеру",r.mgrs||[])+'</div></div></div>';
      bindAnTabs();
    }).catch(function(){$("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><p class="muted">Ошибка загрузки.</p></div></div>';});
  }
  // отчёт «Звонки» (как в amo): вх/исх по менеджерам, переключатель количество/длительность
  var callsMode="count";
  function durH(sec){var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h+":"+("0"+m).slice(-2);}
  function renderCallsReport(tabs){
    $("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><p class="muted">Загрузка…</p></div></div>';
    bindAnTabs();
    var ep=VIEW_EPOCH;
    jreq(API+"/calls_report").then(function(r){
      if(ep!==VIEW_EPOCH||anTab!=="calls")return;
      if(!r||!r.success)return $("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><p class="muted">'+esc((r&&r.message)||"Нет данных")+'</p></div></div>';
      var rows=r.rows||[];
      var byCount=callsMode==="count";
      var val=function(x){return byCount?x.total:x.dur;};
      rows=rows.slice().sort(function(a,b){return val(b)-val(a);}).slice(0,40);
      var max=Math.max.apply(null,rows.map(val).concat([1]));
      var mode='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="muted" style="font-size:12.5px">По слепку примечаний (866 тыс. звонков); Входящий/Исходящий</span><div class="desk-pills" style="background:#eef2f6"><button data-cm="count"'+(byCount?' class="act"':"")+' style="color:#334">По количеству</button><button data-cm="dur"'+(!byCount?' class="act"':"")+' style="color:#334">По длительности</button></div></div>';
      var list=rows.map(function(x){
        var inV=byCount?x.in_c:x.in_d, outV=byCount?x.out_c:x.out_d, tot=val(x);
        var wIn=Math.round(inV/max*70), wOut=Math.round(outV/max*70);
        return '<div style="display:flex;align-items:center;gap:10px;margin:7px 0">'+
          '<div style="width:220px;text-align:right;flex-shrink:0"><div style="font-size:13.5px">'+esc(x.name)+'</div><div class="muted" style="font-size:11.5px">Продолжительность: '+durH(x.dur)+'</div></div>'+
          '<div style="flex:1;display:flex;align-items:center;gap:6px"><div style="display:flex;height:26px;border-radius:4px;overflow:hidden">'+
          (wIn?'<div style="width:'+Math.max(wIn,2)+'%;min-width:26px;background:#e8b64c;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 4px">'+fmt(inV)+'</div>':"")+
          (wOut?'<div style="width:'+Math.max(wOut,2)+'%;min-width:26px;background:#7fb3e0;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 4px">'+fmt(outV)+'</div>':"")+
          '</div><b style="font-size:16px">'+(byCount?fmt(tot):durH(tot))+'</b></div></div>';
      }).join("");
      $("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><h2>Звонки</h2>'+mode+list+'</div></div>';
      bindAnTabs();
      $("#view").querySelectorAll("[data-cm]").forEach(function(b){b.onclick=function(){callsMode=b.dataset.cm;renderCallsReport(tabs);};});
    }).catch(function(){$("#view").innerHTML='<div class="plain">'+tabs+'<div class="pcard"><p class="muted">Ошибка загрузки.</p></div></div>';});
  }

  /* ─── СПИСКИ (каталоги amoCRM: услуги, юр.лица, счета) ─── */
  function catalogElVal(el,fname){
    var f=(el.custom_fields_values||[]).find(function(x){return x.field_name===fname;});

  function vCatalog(id){
    renderSidebar("lists");
    var c=(LIST_CATALOGS||[]).find(function(x){return x.id===id;});
    setHeader(c?c.name:"Списки",{caret:true,onTitle:openListsMenu,count:c?fmt((c.elements||[]).length)+" элементов":""});
    if(!c){$("#view").innerHTML=listTabsHtml("cat:"+id)+'<div class="plain"><div class="pcard"><p class="muted">Каталог не найден.</p></div></div>';bindListTabs();return;}
    var typeName={products:"Товары/услуги",suppliers:"Юр. лица",invoices:"Счета и покупки",contacts:"Контакты",customers:"Покупатели"};
    var els=c.elements||[];
    var freq={};els.forEach(function(e){(e.custom_fields_values||[]).forEach(function(f){freq[f.field_name]=(freq[f.field_name]||0)+1;});});
    var cols=Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];}).slice(0,6);
    var html=listTabsHtml("cat:"+id)+'<div class="plain" style="max-width:none"><div class="pcard"><h2>'+esc(c.name)+' <span class="muted" style="font-weight:400;font-size:13px">— '+els.length+' элементов'+(typeName[c.type]?" · "+typeName[c.type]:"")+'</span></h2>';
    if(!els.length){html+='<p class="muted">Пусто.</p></div></div>';}
    else{
      html+='<table class="amo"><thead><tr><th>Наименование</th>'+cols.map(function(x){return '<th>'+esc(x)+'</th>';}).join("")+'</tr></thead><tbody>';
      html+=els.slice(0,500).map(function(e){return '<tr><td>'+esc(e.name||"—")+'</td>'+cols.map(function(x){return '<td class="muted">'+esc(catalogElVal(e,x))+'</td>';}).join("")+'</tr>';}).join("");
      html+='</tbody></table>'+(els.length>500?'<p class="muted" style="margin-top:8px">Показаны первые 500 из '+els.length+'</p>':"")+'</div></div>';
    }
    $("#view").innerHTML=html;bindListTabs();
  }

  var VIEW_EPOCH=0;
  function go(name){curView=name;VIEW_EPOCH++;hidePipePanel();(views[name]||vDesk)();pushUrl(sectionPath(name));}
  // ── URL-роутинг как в amo: путь отражает раздел/карточку, back/forward и F5 работают ──
  var SUPPRESS_PUSH=false;
  function pushUrl(p){if(SUPPRESS_PUSH||!p)return;try{if(location.pathname!==p)history.pushState({},"",p);}catch(_){}}
  function sectionPath(name){
    var m={desk:"/dashboard/",leads:"/leads/pipeline/"+(curPipe||""),tasks:"/todo/",customers:"/customers/",analytics:"/stats/",settings:"/settings/",mail:"/mail/",imbox:"/imbox/",fdoc:"/fdoc/",wazzup:"/wazzup/",market:"/market/",auto:"/auto/",refs:"/refs/",todo:"/devnotes/",companies:"/contacts/list/companies/",contacts:"/contacts/list/contacts/",lists:"/contacts/list/contacts/"};
    return m[name]||"/";
  }
  // разбор пути (при загрузке и back/forward). isBoot — открыть раздел-подложку перед карточкой.
  function routePath(p,isBoot){
    SUPPRESS_PUSH=true;
    try{
      var m;
      if(m=p.match(/^\/leads\/detail\/(\d+)/)){if(isBoot)go("leads");openLead(+m[1]);}
      else if(m=p.match(/^\/contacts\/detail\/(\d+)/)){if(isBoot)go("lists");openContact(+m[1]);}
      else if(m=p.match(/^\/companies\/detail\/(\d+)/)){if(isBoot)go("lists");openCompany(+m[1]);}
      else if(m=p.match(/^\/customers\/detail\/(\d+)/)){if(isBoot)go("customers");openCustomer(+m[1]);}
      else if(/^\/contacts\/list\/companies/.test(p)){curView="lists";VIEW_EPOCH++;hidePipePanel();listsTab="companies";LIST_CATALOGS?vCompanies():vLists();}
      else if(/^\/contacts/.test(p)){curView="lists";VIEW_EPOCH++;hidePipePanel();LIST_CATALOGS?vContacts():vLists();}
      else if(m=p.match(/^\/leads\/pipeline\/(\d+)/)){curPipe=+m[1];go("leads");}
      else if(/^\/leads/.test(p))go("leads");
      else if(/^\/dashboard/.test(p))go("desk");
      else if(/^\/todo/.test(p))go("tasks");
      else if(/^\/customers/.test(p))go("customers");
      else if(/^\/stats/.test(p))go("analytics");
      else if(/^\/settings/.test(p))go("settings");
      else if(/^\/mail/.test(p))go("mail");
      else if(/^\/imbox/.test(p))go("imbox");
      else if(/^\/fdoc/.test(p))go("fdoc");
      else if(/^\/wazzup/.test(p))go("wazzup");
      else if(/^\/market/.test(p))go("market");
      else if(/^\/auto/.test(p))go("auto");
      else if(/^\/refs/.test(p))go("refs");
      else if(/^\/devnotes/.test(p))go("todo");
      else return false;
    } finally { SUPPRESS_PUSH=false; }
    return true;
  }
  window.addEventListener("popstate",function(){
    document.querySelectorAll(".dcard-bg").forEach(function(x){x.remove();});
    routePath(location.pathname,true);
  });

  /* ─── вход ─── */
  function pickToken(){
    var qs=new URLSearchParams(location.search).get("token");
    var cands=[qs,localStorage.getItem("voyo_crmcopy_token"),localStorage.getItem("voyo_vsc_token"),localStorage.getItem("voyo_team_token"),localStorage.getItem("voyo_admin_token")];
    for(var i=0;i<cands.length;i++)if(cands[i])return cands[i];
    return null;
  }
  function showLogin(msg){
    $("#app").style.display="none";
    $("#login-screen").style.display="flex";
    $("#loginErr").textContent=msg||"";
    // переключение вкладок вход-по-коду / вход-сотрудника
    document.querySelectorAll(".ltab").forEach(function(t){t.onclick=function(){
      document.querySelectorAll(".ltab").forEach(function(x){x.classList.toggle("act",x===t);});
      var user=t.dataset.l==="user";
      $("#lg-user").style.display=user?"":"none";
      $("#lg-code").style.display=user?"none":"";
      $("#loginErr").textContent="";
      setTimeout(function(){$(user?"#loginEmail":"#loginCode").focus();},30);
    };});
    // вход по коду (супер-админ)
    var goCode=function(){
      var code=$("#loginCode").value.trim();
      if(!code)return;
      fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code})})
        .then(function(r){return r.json();})
        .then(function(j){
          if(j.success&&j.token){localStorage.setItem("voyo_crmcopy_token",j.token);location.reload();}
          else $("#loginErr").textContent=j.message||"Неверный код";
        })
        .catch(function(){$("#loginErr").textContent="Ошибка сети — попробуйте ещё раз";});
    };
    // вход сотрудника: email + пароль (пароль ставится при первом входе)
    var goUser=function(){
      var email=$("#loginEmail").value.trim(),pass=$("#loginPass").value;
      if(!email)return;
      fetch(API+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:pass})})
        .then(function(r){return r.json();})
        .then(function(j){
          if(j.success&&j.token){localStorage.setItem("voyo_crmcopy_token",j.token);location.reload();return;}
          if(j.success&&j.needSet){$("#setHint").style.display="block";$("#loginErr").textContent="";$("#loginPass").focus();return;}
          $("#loginErr").textContent=j.message||"Не удалось войти";
        })
        .catch(function(){$("#loginErr").textContent="Ошибка сети — попробуйте ещё раз";});
    };
    $("#loginGo").onclick=goCode;
    $("#loginCode").onkeydown=function(e){if(e.key==="Enter")goCode();};
    $("#loginUserGo").onclick=goUser;
    $("#loginEmail").onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();$("#loginPass").focus();}};
    $("#loginPass").onkeydown=function(e){if(e.key==="Enter")goUser();};
    setTimeout(function(){$("#loginEmail").focus();},50);
  }

  token=pickToken();
  if(!token)return showLogin();
  jreq(API+"/meta").then(function(meta){
    if(meta&&meta.success===false){
      $("#app").style.display="flex";renderSidebar("desk");setHeader("Копия amoCRM",{});
      $("#view").innerHTML='<div class="plain"><div class="pcard"><h2>Слепок ещё собирается</h2><p class="muted">'+esc(meta.message||"")+'</p></div></div>';
      return;
    }
    META=meta;
    return Promise.all([jreq(API+"/pipelines"),jreq(API+"/kanban"),jreq(API+"/users"),jreq(API+"/custom_fields"),jreq(API+"/auth/me").catch(function(){return null;}),jreq(API+"/task_types").catch(function(){return null;}),jreq(API+"/counts").catch(function(){return null;})]).then(function(r){
      PIPES=r[0];KANBAN=r[1];USERS=r[2];CF=r[3];
      ME=(r[4]&&r[4].me)||{is_admin:1,rights:null};
      TASK_TYPES=(r[5]&&r[5].types)||[];
      // живые счётчики из БД вместо статичных из слепка (копия синкается — цифры актуальные)
      META.counts=META.counts||{};
      if(r[6]&&r[6].success){["contacts","leads","companies","tasksDue","tasksOpen","imbox","mail","wazzup","market","notifications"].forEach(function(k){if(r[6][k]!=null)META.counts[k]=r[6][k];});}
      // бейдж «Задачи» = МОИ задачи (как в amo): для email-логина пере-читаем счётчик со срезом по user_id
      if(ME&&ME.user_id){jreq(API+"/counts?me="+ME.user_id).then(function(c){if(c&&c.success){["tasksDue","notifications"].forEach(function(k){if(c[k]!=null)META.counts[k]=c[k];});if(LAST_NAV)renderSidebar(LAST_NAV);}}).catch(function(){});}
      $("#app").style.display="flex";
      bindGlobalSearch();
      if(!routePath(location.pathname,true))go("leads");
    });
  }).catch(function(e){
    if(String(e.message)==="401")showLogin("Сессия истекла — введите код ещё раз.");
    else{$("#app").style.display="flex";$("#view").innerHTML='<div class="plain"><div class="pcard">Ошибка загрузки. Обновите страницу.</div></div>';}
  });
})();
</script>
</body>
</html>
