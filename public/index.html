<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет Клиента VSC</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2f7;
      color: #1d2330;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
    }

    .login-logo {
      display: block;
      width: 140px;
      height: auto;
      margin: 0 auto 22px;
      mix-blend-mode: multiply;
    }

    .login-card h2 {
      margin: 0 0 14px;
      font-size: 16px;
      color: #1d2330;
      line-height: 1.4;
      text-align: center;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .login-form input {
      width: 100%;
      height: 52px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      color: #1f2532;
      background: #fff;
    }

    .login-form button {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: #3589BD;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-form button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      margin-top: 14px;
    }

    .message.error {
      background: #fbebee;
      border: 1px solid #efcfd5;
      color: #a15561;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img class="login-logo" src="/logo.png" alt="VOYO" />
    <h2>Введите ваш номер телефона, чтобы найти все обращения</h2>
    <form id="loginForm" class="login-form">
      <input
        id="phoneInput"
        type="text"
        name="phone"
        placeholder="+79991234567"
        autocomplete="tel"
        required
      />
      <button id="searchBtn" type="submit">Найти обращения</button>
    </form>
    <div id="errorBox" class="message error"></div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const phoneInput = document.getElementById("phoneInput");
    const errorBox = document.getElementById("errorBox");

    function showError(msg) {
      errorBox.style.display = "block";
      errorBox.textContent = msg || "";
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      hideError();

      const phone = phoneInput.value.trim();
      if (!phone) {
        showError("Введите номер телефона");
        return;
      }

      window.location.href = `/cabinet?phone=${encodeURIComponent(phone)}`;
    });
  </script>
</body>
</html>
