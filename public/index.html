<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статус визового дела</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2f7;
      color: #1d2330;
    }

    .wrap {
      max-width: 1200px;
      margin: 22px auto;
      background: #faf9fc;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f0ebf7;
      color: #7a718d;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      color: #171c29;
    }

    .subtitle {
      margin: 0 0 18px;
      font-size: 14px;
      color: #737988;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
      border: 1px solid #e8e3ef;
      background: #fff;
      padding: 10px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      height: 52px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      color: #1f2532;
      background: #fff;
    }

    .search-box button {
      height: 52px;
      border: none;
      border-radius: 14px;
      background: #161d45;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .search-box button:disabled,
    .upload-btn:disabled,
    .questionnaire-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .message.error {
      background: #fbebee;
      border: 1px solid #efcfd5;
      color: #a15561;
    }

    .message.success {
      background: #edf8ef;
      border: 1px solid #cfe7d2;
      color: #2e7a43;
    }

    .message.info {
      background: #eef3ff;
      border: 1px solid #d7e0ff;
      color: #4b6198;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 22px;
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #1d2330;
    }

    .muted {
      color: #9096a3;
      font-size: 14px;
      line-height: 1.5;
    }

    .lead-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .lead-item {
      width: 100%;
      text-align: left;
      border: 1px solid #ebe5f2;
      background: #fcfbfe;
      border-radius: 16px;
      padding: 14px 14px;
      cursor: pointer;
      transition: 0.18s ease;
      color: #1e2433;
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
    }

    .lead-item:hover {
      border-color: #ddd2eb;
      background: #faf7fd;
    }

    .lead-item.active {
      border-color: #73b489;
      background: #eef8f1;
    }

    .status-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .status-top p {
      margin: 0;
      font-size: 14px;
      color: #747b88;
      line-height: 1.55;
      max-width: 740px;
    }

    .mini-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: #f4efe4;
      color: #bf9654;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 34px;
    }

    .stages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 18px;
    }

    .stage {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      color: #9da3ae;
      font-weight: 500;
      line-height: 1.4;
    }

    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #d6dbe2;
      background: #fff;
      flex: 0 0 20px;
    }

    .stage.done,
    .stage.current {
      color: #4f9f68;
    }

    .stage.done .dot {
      border-color: #4f9f68;
      background: #4f9f68;
      box-shadow: inset 0 0 0 4px #fff;
    }

    .stage.current .dot {
      border-color: #4f9f68;
      background: #fff;
      box-shadow: inset 0 0 0 4px #4f9f68;
    }

    .questionnaire-inline {
      display: none;
      margin: 0 0 2px 32px;
      padding: 0;
      background: transparent;
    }

    .questionnaire-btn {
      height: 46px;
      border: none;
      border-radius: 14px;
      background: #4f9f68;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 20px;
    }

    .documents-inline {
      display: none;
      margin: 2px 0 2px 32px;
      padding: 16px;
      border: 1px solid #ece7f2;
      border-radius: 18px;
      background: #faf9fc;
    }

    .documents-inline h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #1d2330;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .file-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-group label {
      font-size: 13px;
      color: #666d7c;
      font-weight: 600;
    }

    .file-group input[type="file"] {
      width: 100%;
      border: 1px solid #e8e2ee;
      border-radius: 12px;
      padding: 8px;
      background: #fff;
      font-size: 12px;
    }

    .upload-btn {
      height: 46px;
      border: none;
      border-radius: 14px;
      background: #161d45;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 20px;
    }

    .empty-status {
      color: #9ca2ae;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .search-box {
        grid-template-columns: 1fr;
      }

      .file-grid {
        grid-template-columns: 1fr;
      }

      .lead-item {
        white-space: normal;
      }

      .documents-inline,
      .questionnaire-inline {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="subtitle">
      Введите телефон, выберите нужное обращение и справа посмотрите текущий этап обработки.
    </p>

    <form id="statusForm" class="search-box">
      <input
        id="phoneInput"
        type="text"
        name="phone"
        placeholder="+79991234567"
        autocomplete="tel"
        required
      />
      <button id="searchBtn" type="submit">Открыть статус</button>
    </form>

    <div id="errorBox" class="message error"></div>
    <div id="successBox" class="message success"></div>
    <div id="infoBox" class="message info"></div>

    <div class="grid">
      <div class="card">
        <h2>Ваши обращения</h2>
        <div id="leadsPlaceholder" class="muted">Введите телефон и нажмите кнопку.</div>
        <div id="leadList" class="lead-list"></div>
      </div>

      <div class="card">
        <div class="status-top">
          <div>
            <h2>Статус обращения</h2>
            <p id="statusText">Выберите обращение слева.</p>
          </div>
          <button type="button" class="mini-btn">−</button>
        </div>

        <div id="stages" class="stages"></div>

        <div id="emptyStatus" class="empty-status">
          Ниже показаны реальные этапы обработки. Текущий этап и уже пройденные шаги подсвечиваются зелёным.
        </div>
      </div>
    </div>
  </div>

  <script>
    const STAGES = [
      "Сбор документов",
      "Подготовка документов",
      "Ожидание записи / подачи",
      "Документы поданы на рассмотрение в Консульство",
      "Рассмотрение завершено"
    ];

    const statusForm = document.getElementById("statusForm");
    const phoneInput = document.getElementById("phoneInput");
    const searchBtn = document.getElementById("searchBtn");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");
    const infoBox = document.getElementById("infoBox");
    const leadList = document.getElementById("leadList");
    const leadsPlaceholder = document.getElementById("leadsPlaceholder");
    const statusText = document.getElementById("statusText");
    const stagesEl = document.getElementById("stages");
    const emptyStatus = document.getElementById("emptyStatus");

    let selectedLead = null;

    function showBox(el, message) {
      el.style.display = "block";
      el.textContent = message || "";
    }

    function hideBox(el) {
      el.style.display = "none";
      el.textContent = "";
    }

    function hideMessages() {
      hideBox(errorBox);
      hideBox(successBox);
      hideBox(infoBox);
    }

    function formatDate(timestampSeconds) {
      if (!timestampSeconds) return "без даты";
      const date = new Date(timestampSeconds * 1000);
      return date.toLocaleDateString("ru-RU");
    }

    function getLeadLabel(lead) {
      return `Обращение от ${formatDate(lead.created_at)}`;
    }

    function getCurrentStageIndex(lead) {
      if (typeof lead.cabinet_stage_index === "number") {
        return lead.cabinet_stage_index;
      }
      return 0;
    }

    function createQuestionnaireBlock(lead) {
      const wrapper = document.createElement("div");
      wrapper.className = "questionnaire-inline";
      wrapper.style.display = "block";

      const button = document.createElement("button");
      button.type = "button";
      button.className = "questionnaire-btn";
      button.textContent = "Заполните опросник";

      button.addEventListener("click", () => {
        const phone = phoneInput.value.trim();
        const leadId = lead?.id;

        if (!phone || !leadId) {
          showBox(errorBox, "Не удалось открыть опросник");
          return;
        }

        const url = `/questionnaire?phone=${encodeURIComponent(phone)}&leadId=${encodeURIComponent(leadId)}`;
        window.open(url, "_blank");
      });

      wrapper.appendChild(button);
      return wrapper;
    }

    async function fetchQuestionnaireState(phone) {
      try {
        const response = await fetch(`/api/questionnaire-state?phone=${encodeURIComponent(phone)}`);
        if (!response.ok) return null;
        const data = await response.json();
        return data && data.success ? data.state : null;
      } catch (err) {
        console.error("FETCH STATE ERROR:", err);
        return null;
      }
    }

    function buildUploadBlocksConfig(state) {
      const blocks = [];

      // Всегда после заполнения опросника
      blocks.push({ field: "mainPassport",  label: "Заграничный паспорт (в который запрашиваем визу)" });
      blocks.push({ field: "innerPassport", label: "Внутренний паспорт" });

      // По ответам в опроснике
      if (state.hadSchengen3Years === "Да") {
        blocks.push({ field: "prevSchengen", label: "Шенгенские визы за последние 3 года" });
      }
      if (state.hasSecondPassport === "Да") {
        blocks.push({ field: "secondPassport", label: "Второй заграничный паспорт" });
      }
      const employer = (state.employerName || "").trim();
      if (employer && employer.toUpperCase() !== "НЕТ") {
        blocks.push({ field: "workCert", label: "Справка с работы" });
      }

      return blocks;
    }

    function createDocumentsBlock(blocksConfig) {
      const wrapper = document.createElement("div");
      wrapper.className = "documents-inline";
      wrapper.style.display = "block";

      const header = document.createElement("h3");
      header.textContent = "Загрузка документов";
      wrapper.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "file-grid";
      wrapper.appendChild(grid);

      blocksConfig.forEach((cfg) => {
        const group = document.createElement("div");
        group.className = "file-group";

        const label = document.createElement("label");
        label.textContent = cfg.label;

        const input = document.createElement("input");
        input.type = "file";
        input.dataset.field = cfg.field;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "upload-btn";
        btn.style.marginTop = "6px";
        btn.style.height = "36px";
        btn.style.padding = "0 14px";
        btn.style.fontSize = "13px";
        btn.textContent = "Загрузить";

        btn.addEventListener("click", async () => {
          hideMessages();

          const phone = phoneInput.value.trim();
          if (!phone) {
            showBox(errorBox, "Сначала введите телефон");
            return;
          }

          const file = input.files[0];
          if (!file) {
            showBox(errorBox, `Выберите файл для "${cfg.label}"`);
            return;
          }

          const formData = new FormData();
          formData.append("phone", phone);
          formData.append("field", cfg.field);
          formData.append("file", file);

          btn.disabled = true;
          btn.textContent = "Загрузка...";

          try {
            const response = await fetch("/upload-document", {
              method: "POST",
              body: formData
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
              throw new Error(data.message || "Ошибка загрузки файла");
            }

            showBox(successBox, `Документ "${cfg.label}" успешно загружен`);
          } catch (error) {
            console.error("UPLOAD ERROR:", error);
            showBox(errorBox, `Не удалось загрузить "${cfg.label}"`);
          } finally {
            btn.disabled = false;
            btn.textContent = "Загрузить";
          }
        });

        group.appendChild(label);
        group.appendChild(input);
        group.appendChild(btn);
        grid.appendChild(group);
      });

      return wrapper;
    }

    function createNoStateNotice() {
      const wrapper = document.createElement("div");
      wrapper.className = "documents-inline";
      wrapper.style.display = "block";
      wrapper.innerHTML = `
        <h3>Загрузка документов</h3>
        <div class="muted">
          После заполнения опросника здесь появятся поля для загрузки нужных документов.
        </div>
      `;
      return wrapper;
    }

    function renderStages(currentIndex, lead) {
      stagesEl.innerHTML = "";

      const stageNodes = [];

      STAGES.forEach((stageName, index) => {
        const row = document.createElement("div");
        row.className = "stage";

        if (index < currentIndex) row.classList.add("done");
        if (index === currentIndex) row.classList.add("current");

        row.innerHTML = `
          <div class="dot"></div>
          <div>${stageName}</div>
        `;

        stagesEl.appendChild(row);
        stageNodes.push(row);
      });

      if (currentIndex === 0 && stageNodes[0]) {
        const questionnaireBlock = createQuestionnaireBlock(lead);
        stageNodes[0].after(questionnaireBlock);

        // Плейсхолдер для блока документов — заполнится после загрузки состояния опросника
        const placeholder = createNoStateNotice();
        questionnaireBlock.after(placeholder);

        const phone = phoneInput.value.trim();
        if (phone) {
          fetchQuestionnaireState(phone).then((state) => {
            if (!state) return;
            const blocksConfig = buildUploadBlocksConfig(state);
            if (!blocksConfig.length) return;
            const docsBlock = createDocumentsBlock(blocksConfig);
            placeholder.replaceWith(docsBlock);
          });
        }
      }
    }

    function selectLead(lead, itemEl) {
      selectedLead = lead;

      document.querySelectorAll(".lead-item").forEach((node) => {
        node.classList.remove("active");
      });

      if (itemEl) itemEl.classList.add("active");

      const currentStageIndex = getCurrentStageIndex(lead);
      const currentStageTitle = STAGES[currentStageIndex] || "Сбор документов";

      statusText.textContent = `Вы выбрали ${getLeadLabel(lead)}. Текущий этап: ${currentStageTitle}.`;
      emptyStatus.style.display = "none";
      renderStages(currentStageIndex, lead);
    }

    function renderLeads(leads) {
      leadList.innerHTML = "";

      if (!Array.isArray(leads) || !leads.length) {
        leadsPlaceholder.style.display = "block";
        leadsPlaceholder.textContent = "По этому номеру обращения не найдены.";
        statusText.textContent = "Нет данных для отображения.";
        stagesEl.innerHTML = "";
        emptyStatus.style.display = "block";
        selectedLead = null;
        return;
      }

      leadsPlaceholder.style.display = "none";

      leads.forEach((lead, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "lead-item";
        button.textContent = getLeadLabel(lead);

        button.addEventListener("click", () => {
          selectLead(lead, button);
        });

        leadList.appendChild(button);

        if (index === 0) {
          selectLead(lead, button);
        }
      });
    }

    statusForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideMessages();

      const phone = phoneInput.value.trim();

      if (!phone) {
        showBox(errorBox, "Введите номер телефона");
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "Загрузка...";

      leadList.innerHTML = "";
      leadsPlaceholder.style.display = "block";
      leadsPlaceholder.textContent = "Загрузка обращений...";
      statusText.textContent = "Получаем данные из amoCRM...";
      stagesEl.innerHTML = "";
      emptyStatus.style.display = "block";
      selectedLead = null;

      try {
        const response = await fetch(`/api/leads?phone=${encodeURIComponent(phone)}`);

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Ошибка ответа сервера");
        }

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "Не удалось получить данные");
        }

        renderLeads(data.leads || []);

        if (!(data.leads || []).length) {
          showBox(infoBox, "По этому номеру обращения не найдены");
        }
      } catch (error) {
        console.error("LOAD LEADS ERROR:", error);
        showBox(errorBox, "Ошибка загрузки данных");
        leadsPlaceholder.style.display = "block";
        leadsPlaceholder.textContent = "Ошибка загрузки.";
        statusText.textContent = "Выберите обращение слева.";
        stagesEl.innerHTML = "";
        emptyStatus.style.display = "block";
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "Открыть статус";
      }
    });
  </script>
</body>
</html>
