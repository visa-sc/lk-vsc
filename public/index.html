<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет Клиента VSC</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2f7;
      color: #1d2330;
    }

    .wrap {
      max-width: 1200px;
      margin: 22px auto;
      background: #faf9fc;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
    }

    .card {
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 22px;
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #1d2330;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
    }

    .search-box input {
      width: 100%;
      height: 52px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      color: #1f2532;
      background: #fff;
    }

    .search-box button {
      height: 52px;
      border: none;
      border-radius: 14px;
      background: #3589BD;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .search-box button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      margin-top: 14px;
    }

    .message.error {
      background: #fbebee;
      border: 1px solid #efcfd5;
      color: #a15561;
    }

    @media (max-width: 900px) {
      .search-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Введите ваш номер телефона, чтобы найти все обращения</h2>
      <form id="loginForm" class="search-box">
        <input
          id="phoneInput"
          type="text"
          name="phone"
          placeholder="+79991234567"
          autocomplete="tel"
          required
        />
        <button id="searchBtn" type="submit">Найти обращения</button>
      </form>
      <div id="errorBox" class="message error"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const phoneInput = document.getElementById("phoneInput");
    const errorBox = document.getElementById("errorBox");

    function showError(msg) {
      errorBox.style.display = "block";
      errorBox.textContent = msg || "";
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      hideError();

      const phone = phoneInput.value.trim();
      if (!phone) {
        showError("Введите номер телефона");
        return;
      }

      window.location.href = `/cabinet?phone=${encodeURIComponent(phone)}`;
    });
  </script>
</body>
</html>
