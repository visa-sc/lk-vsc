<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет Клиента VSC</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="VOYO" />
  <meta name="description" content="VOYO — личный кабинет для подготовки к поездке: визы, страховки, бронирования, банковские карты." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="VOYO" />
  <meta property="og:title" content="VOYO — личный кабинет" />
  <meta property="og:description" content="Личный кабинет для подготовки к поездке: визы, страховки, бронирования, банковские карты." />
  <meta property="og:url" content="https://voyovoyo.ru/" />
  <meta property="og:image" content="https://voyovoyo.ru/logo.png" />
  <meta property="og:image:width" content="600" />
  <meta property="og:image:height" content="300" />
  <meta property="og:image:alt" content="VOYO" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VOYO — личный кабинет" />
  <meta name="twitter:description" content="Личный кабинет для подготовки к поездке." />
  <meta name="twitter:image" content="https://voyovoyo.ru/logo.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --vsc-ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes vsc-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2f7;
      color: #1d2330;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 14px;
    }

    .about-link {
      display: inline-block;
      padding: 8px 14px;
      font-size: 13px;
      color: #9096a3;
      background: transparent;
      border: 1px solid #e3e0eb;
      border-radius: 12px;
      text-decoration: none;
      transition: color 0.2s var(--vsc-ease), border-color 0.2s var(--vsc-ease), transform 0.15s var(--vsc-ease);
      animation: vsc-fade-in 0.6s 0.1s var(--vsc-ease) both;
    }

    .about-link:hover {
      color: #3589BD;
      border-color: #c6dceb;
      transform: translateY(-1px);
    }

    .about-link:active {
      transform: translateY(0);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
      animation: vsc-fade-in 0.5s var(--vsc-ease) both;
    }

    .login-logo {
      display: block;
      width: 140px;
      height: auto;
      aspect-ratio: 2 / 1;
      margin: 0 auto 22px;
      mix-blend-mode: multiply;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.55s var(--vsc-ease), transform 0.55s var(--vsc-ease);
    }

    .login-logo.is-loaded {
      opacity: 1;
      transform: scale(1);
    }

    .login-card h2 {
      margin: 0 0 14px;
      font-size: 16px;
      color: #1d2330;
      line-height: 1.4;
      text-align: center;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .login-form input {
      width: 100%;
      height: 52px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      color: #1f2532;
      background: #fff;
    }

    .login-form button {
      width: 100%;
      height: 44px;
      border: 1.5px solid #3589BD;
      border-radius: 12px;
      background: #fff;
      color: #3589BD;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s var(--vsc-ease), color 0.2s var(--vsc-ease),
                  border-color 0.2s var(--vsc-ease), opacity 0.2s var(--vsc-ease);
    }

    .login-form button:hover:not(:disabled) {
      background: #f0f7fc;
    }

    .login-form button:active:not(:disabled) {
      background: #e6f1f8;
    }

    .login-form button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      background: #fff;
      color: #9096a3;
      border-color: #d6dbe3;
    }

    .login-form input {
      transition: border-color 0.2s var(--vsc-ease), box-shadow 0.2s var(--vsc-ease);
    }

    .login-form input:focus {
      border-color: #3589BD;
      box-shadow: 0 0 0 3px rgba(53, 137, 189, 0.15);
    }

    /* Красная подсветка поля телефона, когда пользователь нажал «Войти»
       при пустом инпуте. Цвета — те же, что у .message.error и у
       .login-input.is-error в админском ЛК. Сбрасывается на первый input. */
    #phoneInput.is-error {
      border-color: #d97a8a;
      background: #fbebee;
    }
    #phoneInput.is-error:focus {
      border-color: #d97a8a;
      box-shadow: 0 0 0 3px rgba(217, 122, 138, 0.15);
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      margin-top: 14px;
    }

    .message.error {
      background: #fbebee;
      border: 1px solid #efcfd5;
      color: #a15561;
    }

    .not-found-info {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f0f7fc;
      border: 1px solid #d3e7f4;
      color: #2f6e95;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      animation: vsc-fade-in 0.3s var(--vsc-ease) both;
    }
    .not-found-info.show { display: block; }

    /* Секция регистрации лежит ВНУТРИ .not-found-info. По умолчанию скрыта —
       раскрывается только после первого клика по главной кнопке «Зарегистрироваться». */
    .register-section {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
      text-align: left;
      animation: vsc-fade-in 0.3s var(--vsc-ease) both;
    }
    .register-section.show { display: flex; }
    .register-question {
      font-size: 14px;
      color: #1d2330;
      font-weight: 600;
      text-align: center;
    }
    .register-radio {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 14px;
      color: #1d2330;
    }
    .register-radio label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    /* Перебиваем .login-form input { width:100%; height:52px; ... } для радио */
    .register-radio input[type="radio"] {
      appearance: auto;
      -webkit-appearance: auto;
      width: auto;
      height: auto;
      padding: 0;
      margin: 0;
      border: initial;
      border-radius: initial;
      background: initial;
      vertical-align: middle;
    }

    .promo-area {
      display: none;
      flex-direction: column;
      gap: 8px;
      animation: vsc-fade-in 0.25s var(--vsc-ease) both;
    }
    .promo-area.show { display: flex; }
    .promo-input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: stretch;
    }
    .promo-input-row input[type="text"] {
      flex: 1 1 140px;
      min-width: 0;
      height: 44px;
      border: 1px solid #ebe6f1;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 14px;
      background: #fff;
      color: #1f2532;
      outline: none;
    }
    .promo-input-row input[type="text"]:focus {
      border-color: #3589BD;
      box-shadow: 0 0 0 3px rgba(53, 137, 189, 0.15);
    }
    .promo-input-row input[type="text"].input-error {
      border-color: #d97a8a;
      background: #fbebee;
    }
    .promo-apply-btn {
      height: 44px;
      padding: 0 14px;
      border: 1.5px solid #3589BD;
      border-radius: 12px;
      background: #fff;
      color: #3589BD;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s var(--vsc-ease);
    }
    .promo-apply-btn:hover:not(:disabled) { background: #f0f7fc; }
    .promo-apply-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .promo-result {
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }
    .promo-result.show { display: block; }
    .promo-result.ok { color: #1f7a3f; }
    .promo-result.err { color: #c4314b; }

    .bio-offer {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
      animation: vsc-fade-in 0.35s var(--vsc-ease) both;
    }
    .bio-offer.show { display: flex; }
    .bio-offer-title {
      margin: 0;
      font-size: 16px;
      color: #1d2330;
      font-weight: 600;
      text-align: center;
    }
    .bio-offer-desc {
      margin: 0;
      font-size: 13px;
      color: #737988;
      line-height: 1.5;
      text-align: center;
    }
    .bio-offer-actions {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .login-form .bio-offer-actions button {
      flex: 1 1 0;
      width: auto;
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1.5px solid #3589BD;
      background: #fff;
      color: #3589BD;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s var(--vsc-ease), color 0.2s var(--vsc-ease),
                  border-color 0.2s var(--vsc-ease), opacity 0.2s var(--vsc-ease);
    }
    .login-form .bio-offer-actions button.primary {
      background: #3589BD;
      color: #fff;
    }
    .login-form .bio-offer-actions button.primary:hover:not(:disabled) {
      background: #2c79a8;
      transform: none;
      filter: none;
    }
    .login-form .bio-offer-actions button:not(.primary):hover:not(:disabled) {
      background: #f0f7fc;
      transform: none;
      filter: none;
    }
    .login-form .bio-offer-actions button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Согласие на обработку персональных данных (152-ФЗ). Намеренно мелкое
       и приглушённое — не должно перетягивать внимание с кнопки. */
    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 2px 0;
      margin: 0;
      cursor: pointer;
    }
    .consent-row input[type="checkbox"] {
      margin: 2px 0 0;
      width: 14px;
      height: 14px;
      accent-color: #3589BD;
      cursor: pointer;
      flex-shrink: 0;
    }
    .consent-text {
      font-size: 11px;
      line-height: 1.4;
      color: #9096a3;
      user-select: none;
    }
    .consent-row.is-error .consent-text {
      color: #c4314b;
    }

    .code-section {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      animation: vsc-fade-in 0.35s var(--vsc-ease) both;
    }
    .code-section.show { display: flex; }
    .code-label {
      font-size: 13px;
      color: #737988;
      line-height: 1.4;
      text-align: center;
    }
    .code-cells {
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }
    .code-cell {
      flex: 1 1 0;
      min-width: 0;
      max-width: 80px;
      height: 60px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      text-align: center;
      font-size: 26px;
      font-weight: 600;
      outline: none;
      color: #1f2532;
      background: #fff;
      transition: border-color 0.2s var(--vsc-ease), box-shadow 0.2s var(--vsc-ease), background 0.2s var(--vsc-ease);
      -moz-appearance: textfield;
    }
    .code-cell::-webkit-outer-spin-button,
    .code-cell::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .code-cell:focus {
      border-color: #3589BD;
      box-shadow: 0 0 0 3px rgba(53, 137, 189, 0.15);
    }
    .code-cells.is-error .code-cell {
      border-color: #d97a8a;
      background: #fbebee;
    }
    .code-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: stretch;
      margin-top: 2px;
    }
    /* Перебиваем глобальный .login-form button */
    .login-form .code-footer button {
      flex: 1 1 0;
      width: auto;
      height: 40px;
      padding: 0 14px;
      border: 1.5px solid #3589BD;
      border-radius: 12px;
      background: #fff;
      color: #3589BD;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s var(--vsc-ease), color 0.2s var(--vsc-ease),
                  border-color 0.2s var(--vsc-ease), opacity 0.2s var(--vsc-ease),
                  transform 0.15s var(--vsc-ease), filter 0.2s var(--vsc-ease);
    }
    .login-form .code-footer button:hover:not(:disabled) {
      background: #f0f7fc;
      transform: none;
      filter: none;
    }
    .login-form .code-footer button:active:not(:disabled) {
      transform: none;
      filter: none;
    }
    .login-form .code-footer button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      background: #fff;
      color: #9096a3;
      border-color: #d6dbe3;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img class="login-logo" src="/logo.png" alt="VOYO" width="600" height="300" fetchpriority="high" onload="this.classList.add('is-loaded')" onerror="this.classList.add('is-loaded')" />
    <noscript><style>.login-logo{opacity:1;transform:none;}</style></noscript>
    <h2>Введите номер телефона<br />для входа в личный кабинет</h2>
    <form id="loginForm" class="login-form">
      <input
        id="phoneInput"
        type="text"
        name="phone"
        placeholder="+7 (912) 345-67-89"
        autocomplete="tel"
      />
      <div id="notFoundBox" class="not-found-info">
        <div class="not-found-text">По этому номеру обращения не найдены.</div>
        <div id="registerSection" class="register-section">
          <div class="register-question">Хотите использовать промокод?</div>
          <div class="register-radio">
            <label><input type="radio" name="usePromo" value="Да" /> Да</label>
            <label><input type="radio" name="usePromo" value="Нет" /> Нет</label>
          </div>
          <div id="promoArea" class="promo-area">
            <div class="promo-input-row">
              <input id="promoInput" type="text" placeholder="Введите промокод" autocomplete="off" />
              <button type="button" id="promoApplyBtn" class="promo-apply-btn">Применить промокод</button>
            </div>
            <div id="promoResult" class="promo-result"></div>
          </div>
        </div>
      </div>
      <button id="searchBtn" type="submit">Войти</button>

      <label id="consentRow" class="consent-row">
        <input type="checkbox" id="consentCheckbox" checked />
        <span class="consent-text">Нажимая кнопку, я даю согласие на обработку моих персональных данных VOYO в целях оказания услуг в соответствии с Федеральным законом № 152-ФЗ «О персональных данных».</span>
      </label>

      <div id="codeSection" class="code-section">
        <div class="code-label">Введите код из SMS, отправленный на ваш номер</div>
        <div id="codeCells" class="code-cells">
          <input class="code-cell" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="one-time-code" aria-label="Код, цифра 1" />
          <input class="code-cell" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Код, цифра 2" />
          <input class="code-cell" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Код, цифра 3" />
          <input class="code-cell" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Код, цифра 4" />
        </div>
        <div class="code-footer">
          <button type="button" id="changePhoneBtn" class="code-change-phone">Изменить номер</button>
          <button type="button" id="resendBtn" class="code-resend-btn" disabled>Отправить ещё раз</button>
        </div>
      </div>

      <div id="bioOfferSection" class="bio-offer">
        <h3 class="bio-offer-title">Входить без SMS?</h3>
        <p class="bio-offer-desc">Включите вход по Face ID / отпечатку — больше не придётся каждый раз вводить SMS-код.</p>
        <div class="bio-offer-actions">
          <button type="button" id="bioSkipBtn">Не сейчас</button>
          <button type="button" id="bioEnableBtn" class="primary">Включить</button>
        </div>
      </div>
    </form>
    <div id="errorBox" class="message error"></div>
  </div>

  <a href="/about" class="about-link" target="_blank" rel="noopener">Что такое VOYO?</a>

  <script>
    // Служебный «обходной» код входа: проверка делается на сервере
    // (POST /api/auth/staff-bypass) с rate-limit 15 неудачных попыток в сутки на IP.
    // Клиент НЕ знает значение кода — на любую короткую цифровую строку, не похожую
    // на телефон, отправляем запрос; сервер сам решит, верно/неверно/превышен лимит.

    const form = document.getElementById("loginForm");
    const phoneInput = document.getElementById("phoneInput");
    const searchBtn = document.getElementById("searchBtn");
    const errorBox = document.getElementById("errorBox");
    const codeSection = document.getElementById("codeSection");
    const codeCellsWrap = document.getElementById("codeCells");
    const codeCells = Array.from(codeCellsWrap.querySelectorAll(".code-cell"));
    const changePhoneBtn = document.getElementById("changePhoneBtn");
    const resendBtn = document.getElementById("resendBtn");
    const notFoundBox = document.getElementById("notFoundBox");
    const bioOfferSection = document.getElementById("bioOfferSection");
    const bioSkipBtn = document.getElementById("bioSkipBtn");
    const bioEnableBtn = document.getElementById("bioEnableBtn");

    const registerSection = document.getElementById("registerSection");
    const promoArea = document.getElementById("promoArea");
    const promoInput = document.getElementById("promoInput");
    const promoApplyBtn = document.getElementById("promoApplyBtn");
    const promoResult = document.getElementById("promoResult");
    const usePromoRadios = Array.from(document.querySelectorAll('input[name="usePromo"]'));

    // Режим регистрации = синий блок «не найдено» сейчас показан.
    const VALID_PROMO_CODES = new Set(["10OFFBRO", "15OFFBRO", "20OFFBRO", "WELCOME"]);
    let isRegistrationMode = false;
    let isPromoApplied = false;        // true только когда введён валидный промокод и не отменён
    let lastAppliedPromoCode = "";     // конкретный код, который успешно применили (для отправки на сервер)
    let promoQuestionRevealed = false; // true после первого клика по «Зарегистрироваться»

    function resetPromoState() {
      isPromoApplied = false;
      lastAppliedPromoCode = "";
      promoQuestionRevealed = false;
      registerSection.classList.remove("show");
      promoArea.classList.remove("show");
      promoResult.classList.remove("show", "ok", "err");
      promoResult.textContent = "";
      promoInput.value = "";
      promoInput.classList.remove("input-error");
      promoApplyBtn.style.display = ""; // восстанавливаем после возможного скрытия при валидном коде
      usePromoRadios.forEach((r) => { r.checked = false; });
    }

    function hideNotFound() {
      notFoundBox.classList.remove("show");
      // Выход из режима регистрации — синхронно с прятаньем блока
      isRegistrationMode = false;
      searchBtn.textContent = "Войти";
      resetPromoState();
    }

    function showNotFound() {
      notFoundBox.classList.add("show");
      // Вход в режим регистрации — синхронно с показом блока, но вопрос промокода
      // ещё не раскрываем — он покажется только после первого клика по «Зарегистрироваться»
      isRegistrationMode = true;
      searchBtn.textContent = "Зарегистрироваться";
      resetPromoState();
    }


    usePromoRadios.forEach((radio) => {
      radio.addEventListener("change", () => {
        if (radio.value === "Да" && radio.checked) {
          promoArea.classList.add("show");
        } else if (radio.value === "Нет" && radio.checked) {
          promoArea.classList.remove("show");
          // Сброс ранее введённого
          promoResult.classList.remove("show", "ok", "err");
          promoResult.textContent = "";
          promoInput.value = "";
          promoInput.classList.remove("input-error");
          promoApplyBtn.style.display = "";
          isPromoApplied = false;
          lastAppliedPromoCode = "";
        }
      });
    });

    promoApplyBtn.addEventListener("click", () => {
      const code = promoInput.value.trim().toUpperCase();
      if (VALID_PROMO_CODES.has(code)) {
        // Валидный — оставляем только зелёный текст, кнопку «Применить промокод» скрываем
        promoResult.classList.remove("err");
        promoResult.classList.add("show", "ok");
        promoResult.textContent = "Промокод успешно применён.";
        promoInput.classList.remove("input-error");
        promoApplyBtn.style.display = "none";
        isPromoApplied = true;
        lastAppliedPromoCode = code;
      } else {
        // Невалидный — красный текст; кнопка «Применить» остаётся, никаких кнопок «Отменить» нет
        promoResult.classList.remove("ok");
        promoResult.classList.add("show", "err");
        promoResult.textContent = "Неверный промокод.";
        promoInput.classList.add("input-error");
        isPromoApplied = false;
        lastAppliedPromoCode = "";
      }
    });

    promoInput.addEventListener("input", () => {
      // Сбрасываем подсветку ошибки при вводе
      if (promoInput.classList.contains("input-error")) {
        promoInput.classList.remove("input-error");
      }
    });

    // Скрываем плашку и сбрасываем режим регистрации, как только пользователь меняет номер
    document.getElementById("phoneInput").addEventListener("input", () => {
      hideNotFound();
      if (isRegistrationMode) {
        exitRegistrationMode();
      }
    });

    let serverPhone = ""; // нормализованный телефон, на который ушёл код
    let resendTimer = null;
    let isVerifying = false;
    // После УСПЕШНОГО verify ставим в true и держим до навигации на /cabinet.
    // Защитный флаг от случайного повторного запроса /api/auth/request-code
    // в момент показа bioOffer'а (iOS-клавиатура / autofill / Enter могут
    // случайно ре-триггернуть submit формы, и юзеру уходит ещё одна SMS).
    let loginFinalizing = false;

    function showError(msg) {
      errorBox.style.display = "block";
      errorBox.textContent = msg || "";
    }
    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function normalizePhoneJs(raw) {
      const digits = String(raw || "").replace(/\D/g, "");
      if (!digits) return "";
      if (digits.length === 11 && digits.startsWith("8")) return "7" + digits.slice(1);
      if (digits.length === 10) return "7" + digits;
      return digits;
    }

    function startResendCooldown(seconds) {
      let remaining = seconds;
      resendBtn.disabled = true;
      resendBtn.textContent = `Отправить ещё раз (${remaining})`;
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(resendTimer);
          resendTimer = null;
          resendBtn.disabled = false;
          resendBtn.textContent = "Отправить ещё раз";
        } else {
          resendBtn.textContent = `Отправить ещё раз (${remaining})`;
        }
      }, 1000);
    }

    // ── Маска ввода телефона ──
    // Любой ввод в виде 9999999999 / 89999999999 / 79999999999 / +79999999999
    // приводим к формату «+7 (999) 999-99-99». Маска НЕ применяется к коротким
    // числовым строкам, не похожим на phone-attempt — это сохраняет работу
    // служебного кода входа (`111`, `STAFF_BYPASS_CODE` в env).
    function applyPhoneMask(raw) {
      const trimmed = String(raw || "").trim();
      if (!trimmed) return "";
      const digitsOnly = trimmed.replace(/\D/g, "");
      if (!digitsOnly) return trimmed;
      // Включаем маску, если ввод выглядит как явный phone-attempt:
      //   • начинается с +, 7, 8 или 9 (все RU-мобильные начинаются с +7 9XX,
      //     так что любая цифра 7/8/9 в начале — это однозначно попытка
      //     ввести номер, и сразу же подставляем +7 как country-code);
      //   • либо набрано 4+ цифр (служебные коды короче).
      // Цифры 0–6 в начале без + не маскируем — это путь для bypass-кода.
      const startsWithPhonePrefix = /^[+789]/.test(trimmed);
      const hasEnoughDigits = digitsOnly.length >= 4;
      if (!startsWithPhonePrefix && !hasEnoughDigits) return trimmed;

      let body = digitsOnly;
      // 7 и 8 в начале body — это всегда «country code», их игнорируем.
      // Поэтому ввод 799… / 899… / 99… даёт одинаковое тело «99…».
      if (body.startsWith("7") || body.startsWith("8")) body = body.slice(1);
      body = body.slice(0, 10); // 10-значный «тело» номера

      let result = "+7";
      if (body.length === 0) return result;
      result += " (" + body.slice(0, 3);
      if (body.length >= 3) result += ")";
      if (body.length > 3) result += " " + body.slice(3, 6);
      if (body.length > 6) result += "-" + body.slice(6, 8);
      if (body.length > 8) result += "-" + body.slice(8, 10);
      return result;
    }

    phoneInput.addEventListener("input", (e) => {
      // На первый input сбрасываем красную подсветку и месседж «Введите номер
      // телефона» — аналог админки (codeInput.addEventListener('input', hideLoginError)).
      if (phoneInput.classList.contains("is-error")) {
        phoneInput.classList.remove("is-error");
        hideError();
      }
      const current = phoneInput.value;
      const formatted = applyPhoneMask(current);
      // Кейс «удалил только сепаратор» (backspace на `)`, `(`, пробеле, дефисе):
      // количество цифр совпадает, но formatted длиннее — маска хочет дорисовать
      // сепаратор обратно. Срабатывает ТОЛЬКО при удалении (inputType начинается
      // на "delete"), иначе ломает ввод 3-й/6-й/8-й цифры.
      const isDeleting = !!(e && e.inputType && e.inputType.indexOf("delete") === 0);
      if (
        isDeleting &&
        formatted.length > current.length &&
        formatted.replace(/\D/g, "") === current.replace(/\D/g, "")
      ) {
        const digits = current.replace(/\D/g, "");
        let body = digits;
        if (body.startsWith("7") || body.startsWith("8")) body = body.slice(1);
        body = body.slice(0, -1);
        const shorter = body.length === 0 ? "" : applyPhoneMask("+7" + body);
        phoneInput.value = shorter;
        try { phoneInput.setSelectionRange(shorter.length, shorter.length); } catch (_) {}
        return;
      }
      if (formatted !== current) {
        phoneInput.value = formatted;
        // Курсор — в конец (компромисс для простоты редактирования)
        try { phoneInput.setSelectionRange(formatted.length, formatted.length); } catch (_) {}
      }
    });
    // На случай paste / autofill — прогоняем маску ещё раз асинхронно
    phoneInput.addEventListener("paste", () => {
      setTimeout(() => { phoneInput.value = applyPhoneMask(phoneInput.value); }, 0);
    });

    // ── Чек-бокс согласия на обработку персональных данных (152-ФЗ) ──
    const consentRow = document.getElementById("consentRow");
    const consentCheckbox = document.getElementById("consentCheckbox");

    function setConsentError(on) {
      if (on) consentRow.classList.add("is-error");
      else consentRow.classList.remove("is-error");
    }
    consentCheckbox.addEventListener("change", () => {
      if (consentCheckbox.checked) setConsentError(false);
    });

    function showCodeStage() {
      codeSection.classList.add("show");
      searchBtn.style.display = "none";
      consentRow.style.display = "none";
      phoneInput.readOnly = true;
      codeCells.forEach((c) => { c.value = ""; });
      codeCellsWrap.classList.remove("is-error");
      setTimeout(() => codeCells[0].focus(), 50);
    }

    function backToPhoneStage() {
      codeSection.classList.remove("show");
      searchBtn.style.display = "";
      consentRow.style.display = "";
      phoneInput.readOnly = false;
      codeCells.forEach((c) => { c.value = ""; });
      codeCellsWrap.classList.remove("is-error");
      if (resendTimer) { clearInterval(resendTimer); resendTimer = null; }
      hideError();
      setTimeout(() => phoneInput.focus(), 50);
    }

    async function requestCode(phone) {
      searchBtn.disabled = true;
      const prevText = searchBtn.textContent;
      searchBtn.textContent = "Отправка SMS...";
      try {
        const r = await fetch("/api/auth/request-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone })
        });
        const data = await r.json();
        if (!r.ok || !data.success) {
          throw new Error(data.message || "Не удалось отправить SMS");
        }
        serverPhone = phone;
        showCodeStage();
        startResendCooldown(60);
        return true;
      } catch (err) {
        showError(err.message || "Ошибка отправки SMS");
        return false;
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = prevText;
      }
    }

    async function verifyCode(code) {
      if (isVerifying) return;
      isVerifying = true;
      hideError();
      codeCellsWrap.classList.remove("is-error");
      try {
        const r = await fetch("/api/auth/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: serverPhone, code })
        });
        const data = await r.json();
        if (!r.ok || !data.success) {
          throw new Error(data.message || "Неверный код");
        }
        // Verify прошёл. Всё дальше — пост-verify-фаза: bioOffer, потом
        // редирект. Любой повторный submit формы / клик resend в этой фазе
        // НЕ должен слать новую SMS.
        loginFinalizing = true;
        // Предложим зарегистрировать passkey (если устройство поддерживает и passkey'ов ещё нет).
        // Внутри либо ничего не делает, либо ждёт выбора пользователя.
        try { await maybeOfferBiometricRegistration(serverPhone); } catch (_) {}
        // replace, чтобы кнопка "Назад" в браузере не возвращала на использованный код
        window.location.replace("/cabinet?phone=" + encodeURIComponent(serverPhone));
      } catch (err) {
        codeCellsWrap.classList.add("is-error");
        showError(err.message || "Неверный код");
        codeCells.forEach((c) => { c.value = ""; });
        codeCells[0].focus();
        isVerifying = false;
      }
    }

    function fillCellsFrom(str) {
      const digits = String(str || "").replace(/\D/g, "").slice(0, 4);
      codeCells.forEach((c, i) => { c.value = digits[i] || ""; });
      if (digits.length < 4) {
        codeCells[digits.length].focus();
      } else {
        codeCells[3].blur();
        verifyCode(digits);
      }
    }

    // Поведение ячеек: вставка кода целиком, авто-переход, бэкспейс
    codeCells.forEach((cell, idx) => {
      cell.addEventListener("input", (e) => {
        const v = String(cell.value || "").replace(/\D/g, "");
        // Если получили несколько цифр (paste / iOS one-time-code) — раскладываем
        if (v.length > 1) {
          fillCellsFrom(v);
          return;
        }
        cell.value = v;
        if (v && idx < codeCells.length - 1) {
          codeCells[idx + 1].focus();
        }
        // Если последний и заполнен — проверяем код
        const all = codeCells.map((c) => c.value).join("");
        if (all.length === 4 && /^\d{4}$/.test(all)) {
          verifyCode(all);
        }
      });

      cell.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !cell.value && idx > 0) {
          codeCells[idx - 1].focus();
          codeCells[idx - 1].value = "";
          e.preventDefault();
        } else if (e.key === "ArrowLeft" && idx > 0) {
          codeCells[idx - 1].focus();
          e.preventDefault();
        } else if (e.key === "ArrowRight" && idx < codeCells.length - 1) {
          codeCells[idx + 1].focus();
          e.preventDefault();
        }
      });

      cell.addEventListener("paste", (e) => {
        const text = (e.clipboardData || window.clipboardData).getData("text") || "";
        if (/\d/.test(text)) {
          e.preventDefault();
          fillCellsFrom(text);
        }
      });

      cell.addEventListener("focus", () => cell.select && cell.select());
    });

    changePhoneBtn.addEventListener("click", backToPhoneStage);

    resendBtn.addEventListener("click", async () => {
      if (resendBtn.disabled || !serverPhone) return;
      // Resend SMS блокируем пока verify в полёте (isVerifying) или уже
      // прошёл успешно (loginFinalizing) — иначе случайный клик в этом
      // окне отправит лишнюю SMS, а пользователь её точно не ждёт.
      if (loginFinalizing || isVerifying) return;
      hideError();
      codeCellsWrap.classList.remove("is-error");
      codeCells.forEach((c) => { c.value = ""; });
      const ok = await requestCode(serverPhone);
      if (ok) codeCells[0].focus();
    });

    // ────── WebAuthn (биометрия) ──────
    function b64uToBytes(b64u) {
      const s = String(b64u || "").replace(/-/g, "+").replace(/_/g, "/");
      const pad = s.length % 4 === 0 ? "" : "=".repeat(4 - (s.length % 4));
      const bin = atob(s + pad);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return arr.buffer;
    }
    function bytesToB64u(buf) {
      const arr = new Uint8Array(buf);
      let bin = "";
      for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
    }
    async function isPlatformAuthAvailable() {
      if (!window.PublicKeyCredential) return false;
      if (typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable !== "function") return false;
      try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
      catch (_) { return false; }
    }
    async function checkHasCredentials(phone) {
      try {
        const r = await fetch("/api/auth/webauthn/has-credentials", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone })
        });
        const d = await r.json();
        return !!d.hasCredentials;
      } catch (_) { return false; }
    }
    async function tryWebauthnLogin(phone) {
      if (!window.PublicKeyCredential) return false;
      try {
        const optsR = await fetch("/api/auth/webauthn/auth-options", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone })
        });
        if (!optsR.ok) return false;
        const opts = await optsR.json();
        const publicKey = {
          ...opts,
          challenge: b64uToBytes(opts.challenge),
          allowCredentials: (opts.allowCredentials || []).map((c) => ({
            ...c,
            id: b64uToBytes(c.id),
          })),
        };
        const assertion = await navigator.credentials.get({ publicKey });
        const verifyR = await fetch("/api/auth/webauthn/auth-verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            phone,
            assertionResponse: {
              id: assertion.id,
              rawId: bytesToB64u(assertion.rawId),
              type: assertion.type,
              response: {
                clientDataJSON: bytesToB64u(assertion.response.clientDataJSON),
                authenticatorData: bytesToB64u(assertion.response.authenticatorData),
                signature: bytesToB64u(assertion.response.signature),
                userHandle: assertion.response.userHandle ? bytesToB64u(assertion.response.userHandle) : null,
              },
              clientExtensionResults: assertion.getClientExtensionResults ? assertion.getClientExtensionResults() : {},
            },
          }),
        });
        const data = await verifyR.json();
        return data && data.success === true;
      } catch (err) {
        console.warn("WebAuthn login failed/cancelled:", err);
        return false;
      }
    }
    async function tryWebauthnRegister(phone) {
      if (!window.PublicKeyCredential) return false;
      try {
        const optsR = await fetch("/api/auth/webauthn/register-options", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone })
        });
        if (!optsR.ok) return false;
        const opts = await optsR.json();
        const publicKey = {
          ...opts,
          challenge: b64uToBytes(opts.challenge),
          user: { ...opts.user, id: b64uToBytes(opts.user.id) },
          excludeCredentials: (opts.excludeCredentials || []).map((c) => ({
            ...c,
            id: b64uToBytes(c.id),
          })),
        };
        const attestation = await navigator.credentials.create({ publicKey });
        const verifyR = await fetch("/api/auth/webauthn/register-verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            phone,
            attestationResponse: {
              id: attestation.id,
              rawId: bytesToB64u(attestation.rawId),
              type: attestation.type,
              response: {
                clientDataJSON: bytesToB64u(attestation.response.clientDataJSON),
                attestationObject: bytesToB64u(attestation.response.attestationObject),
              },
              clientExtensionResults: attestation.getClientExtensionResults ? attestation.getClientExtensionResults() : {},
            },
          }),
        });
        const data = await verifyR.json();
        return data && data.success === true;
      } catch (err) {
        console.warn("WebAuthn register failed/cancelled:", err);
        return false;
      }
    }
    async function maybeOfferBiometricRegistration(phone) {
      if (!(await isPlatformAuthAvailable())) return;
      const has = await checkHasCredentials(phone);
      if (has) return; // уже есть passkey для этого номера — не предлагаем повторно
      // Показываем секцию предложения
      codeSection.classList.remove("show");
      bioOfferSection.classList.add("show");
      await new Promise((resolve) => {
        function cleanup() {
          bioOfferSection.classList.remove("show");
          bioEnableBtn.removeEventListener("click", onEnable);
          bioSkipBtn.removeEventListener("click", onSkip);
        }
        const onSkip = () => { cleanup(); resolve(); };
        const onEnable = async () => {
          bioEnableBtn.disabled = true;
          bioSkipBtn.disabled = true;
          await tryWebauthnRegister(phone);
          cleanup();
          resolve();
        };
        bioSkipBtn.addEventListener("click", onSkip);
        bioEnableBtn.addEventListener("click", onEnable);
      });
    }

    async function checkHasLeads(phone) {
      try {
        const r = await fetch("/api/auth/has-leads", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone })
        });
        const data = await r.json();
        if (!r.ok || !data.success) {
          // При сбое проверки — не блокируем, пусть SMS уйдёт
          return true;
        }
        return !!data.hasLeads;
      } catch (_) {
        // Сетевые ошибки — fallthrough в обычный SMS-флоу
        return true;
      }
    }

    async function registerNewClient(phone) {
      // Промокод отправляем, только если он был успешно применён.
      // Если клиент ввёл невалидный — регистрируемся БЕЗ промо (комментарий не ставится).
      const promoCode = isPromoApplied ? lastAppliedPromoCode : "";
      searchBtn.disabled = true;
      const prevText = searchBtn.textContent;
      searchBtn.textContent = "Регистрируем...";
      try {
        const r = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, promoCode })
        });
        const data = await r.json();
        if (!r.ok || !data.success) {
          throw new Error(data.message || "Не удалось зарегистрировать");
        }
        return true;
      } catch (err) {
        showError(err.message || "Не удалось зарегистрировать");
        return false;
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = prevText;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      // Submit формы шлёт SMS — он легитимен ТОЛЬКО на стадии ввода телефона.
      // Любой submit в стадии ввода SMS-кода, в момент verify-запроса или на
      // bioOffer'е — это случайное / гоночное событие (iOS-клавиатурная кнопка
      // "Go"/"Done" / Enter / OTC-autofill / возврат фокуса от системного
      // диалога), и второй SMS отправляться не должен.
      //   • loginFinalizing — verify уже прошёл, идём к /cabinet;
      //   • isVerifying — verify сейчас в полёте (окно ~100-500 мс между
      //     стартом fetch и loginFinalizing=true);
      //   • codeSection.show — пользователь в стадии ввода SMS-кода;
      //   • bioOfferSection.show — после verify, до выбора Не сейчас / Включить.
      if (
        loginFinalizing ||
        isVerifying ||
        codeSection.classList.contains("show") ||
        bioOfferSection.classList.contains("show")
      ) {
        return;
      }
      hideError();

      // Согласие на обработку персональных данных (152-ФЗ) — обязательно.
      // Чек-бокс по умолчанию отмечен; если клиент снял галку — блокируем сабмит.
      if (!consentCheckbox.checked) {
        setConsentError(true);
        showError("Чтобы продолжить, подтвердите согласие на обработку персональных данных.");
        return;
      }
      setConsentError(false);

      const raw = phoneInput.value.trim();
      if (!raw) {
        // Аналог админки: подсвечиваем поле красным + красный месседж под
        // кнопками. Без браузерного «Please fill out this form» (required
        // у инпута снят), без изменений в логике дальше.
        phoneInput.classList.add("is-error");
        showError("Введите номер телефона");
        try { phoneInput.focus(); } catch (_) {}
        return;
      }

      // Если введённая строка не похожа на номер телефона (короткая, только цифры,
      // не нормализуется в 11+ цифр) — пробуем как служебный код через сервер.
      // Это ровно одна попытка, рейт-лимит работает на стороне сервера.
      const phone = normalizePhoneJs(raw);
      const looksLikePhone = !!(phone && phone.length >= 11);
      const looksLikeServiceCode = !isRegistrationMode && !looksLikePhone && /^\d{1,9}$/.test(raw);

      if (looksLikeServiceCode) {
        try {
          const r = await fetch("/api/auth/staff-bypass", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: raw })
          });
          const data = await r.json().catch(() => ({}));
          if (r.ok && data && data.success) {
            window.location.replace("/search");
            return;
          }
          if (r.status === 429) {
            showError(data.message || "Слишком много попыток. Попробуйте позже.");
            return;
          }
          // r.status === 403 (неверный код) или 400 — падаем в стандартное сообщение
        } catch (_) {
          // Сетевая ошибка — покажем стандартное сообщение про телефон
        }
      }

      if (!looksLikePhone) {
        showError("Введите корректный номер телефона");
        return;
      }

      // ── Режим регистрации ──
      if (isRegistrationMode) {
        // Первый клик по «Зарегистрироваться» — раскрываем вопрос «Хотите использовать промокод?»,
        // регистрацию пока не отправляем. Второй клик уже отправит.
        if (!promoQuestionRevealed) {
          promoQuestionRevealed = true;
          registerSection.classList.add("show");
          return;
        }
        const ok = await registerNewClient(phone);
        if (!ok) return;
        // Дальше — стандартный SMS-флоу. После verify клиент попадёт в /cabinet,
        // где увидит свежесозданную сделку на этапе «Сбор документов».
        hideNotFound();
        await requestCode(phone);
        return;
      }

      // ── Обычный логин ──
      hideNotFound();
      // Проверяем, есть ли обращения в amoCRM. Если нет — показываем плашку, SMS не шлём.
      searchBtn.disabled = true;
      const prevText = searchBtn.textContent;
      searchBtn.textContent = "Проверка...";
      const [hasLeads, hasCreds] = await Promise.all([
        checkHasLeads(phone),
        checkHasCredentials(phone)
      ]);
      searchBtn.disabled = false;
      searchBtn.textContent = prevText;

      if (!hasLeads) {
        showNotFound();
        return;
      }

      // Если у этого номера зарегистрирован passkey — пробуем биометрию.
      // При отмене / ошибке падаем в обычный SMS-флоу.
      if (hasCreds) {
        searchBtn.disabled = true;
        searchBtn.textContent = "Подтвердите вход...";
        const bioOk = await tryWebauthnLogin(phone);
        searchBtn.disabled = false;
        searchBtn.textContent = prevText;
        if (bioOk) {
          serverPhone = phone;
          window.location.replace("/cabinet?phone=" + encodeURIComponent(phone));
          return;
        }
        // не получилось — продолжаем SMS-флоу
      }

      await requestCode(phone);
    });
  </script>
</body>
</html>
