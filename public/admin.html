<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>VOYO — админка</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { --vsc-ease: cubic-bezier(0.4, 0, 0.2, 1); }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2f7;
      color: #1d2330;
      min-height: 100vh;
    }

    .brand-bar {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .brand-bar img {
      width: 140px; height: auto; aspect-ratio: 2 / 1;
      mix-blend-mode: multiply;
      opacity: 0; transform: scale(0.96);
      transition: opacity 0.55s var(--vsc-ease), transform 0.55s var(--vsc-ease);
    }
    .brand-bar img.is-loaded { opacity: 1; transform: scale(1); }
    .brand-sub {
      font-size: 13px;
      font-weight: 500;
      color: #9096a3;
      letter-spacing: 0.02em;
      text-align: center;
      margin-top: -4px; /* придвигаем чуть ближе к лого */
    }

    /* ── Логин ── */
    .login-wrap {
      max-width: 420px; width: 100%;
      margin: 28px auto;
      padding: 0 16px;
    }
    /* ── Логин-карточка в стиле основного ЛК ── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
      text-align: center;
    }
    .login-card h2 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 500;
      color: #1d2330;
      line-height: 1.4;
      text-align: center;
      letter-spacing: 0;
    }
    .login-card .sub {
      margin: 0 0 18px;
      font-size: 13px;
      font-weight: 400;
      color: #9096a3;
      text-align: center;
    }

    .login-form-inner {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      text-align: center;
    }

    .login-input {
      width: 100%;
      height: 52px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 400;
      outline: none;
      font-family: inherit;
      color: #1f2532;
      background: #fff;
      text-align: center;
      letter-spacing: normal;
      transition: border-color 0.2s var(--vsc-ease), box-shadow 0.2s var(--vsc-ease);
    }
    /* Введённый код — крупнее и с интервалом, чтобы password-«булиты»
       смотрелись красиво. Placeholder и пустое состояние без spacing'а. */
    .login-input[type="password"]:not(:placeholder-shown) {
      letter-spacing: 0.18em;
      font-size: 22px;
    }
    .login-input::placeholder { color: #9a9faa; letter-spacing: normal; font-weight: 400; }
    .login-input:focus {
      border-color: #3589BD;
      box-shadow: 0 0 0 3px rgba(53, 137, 189, 0.15);
    }
    .login-input.is-error { border-color: #d97a8a; background: #fbebee; }

    /* Главная кнопка — белая с синей обводкой, ровно как в LK. */
    .login-btn {
      width: 100%;
      height: 44px;
      margin: 0;
      border: 1.5px solid #3589BD;
      border-radius: 12px;
      background: #fff;
      color: #3589BD;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0;
      box-shadow: none;
      transition: background 0.2s var(--vsc-ease), color 0.2s var(--vsc-ease),
                  border-color 0.2s var(--vsc-ease), opacity 0.2s var(--vsc-ease);
    }
    .login-btn:hover:not(:disabled) { background: #f0f7fc; }
    .login-btn:active:not(:disabled) { background: #e6f1f8; transform: none; }
    .login-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      background: #fff;
      color: #9096a3;
      border-color: #d6dbe3;
    }

    .login-error {
      margin-top: 14px;
      color: #a15561;
      font-size: 14px;
      padding: 12px 14px;
      background: #fbebee;
      border: 1px solid #efcfd5;
      border-radius: 14px;
      text-align: center;
      display: none;
    }
    .login-error.show { display: block; }

    /* Био-кнопка — такая же белая с синей обводкой, чуть выше, с иконкой.
       Размещена ПОД кнопкой «Войти» — отсюда margin-top, а не margin-bottom. */
    .bio-btn {
      width: 100%;
      height: 48px;
      margin: 10px 0 0;
      border: 1.5px solid #3589BD;
      background: #fff;
      color: #3589BD;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s var(--vsc-ease), color 0.2s var(--vsc-ease),
                  border-color 0.2s var(--vsc-ease);
    }
    .bio-btn.show { display: flex; }
    .bio-btn:hover:not(:disabled) { background: #f0f7fc; }
    .bio-btn:active:not(:disabled) { background: #e6f1f8; }
    .bio-btn:disabled { opacity: 0.6; cursor: progress; }
    .bio-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Оффер после кода — «Включить Face ID» */
    .bio-offer {
      display: none;
      margin-top: 14px;
      padding: 16px;
      background: #f0f7fc;
      border: 1px solid #d3e7f4;
      border-radius: 14px;
    }
    .bio-offer.show { display: block; }
    .bio-offer h3 {
      margin: 0 0 6px;
      font-size: 15px;
      color: #2f6e95;
    }
    .bio-offer p {
      margin: 0 0 12px;
      font-size: 13px;
      color: #4a5260;
      line-height: 1.4;
    }
    .bio-offer-actions { display: flex; gap: 10px; }
    .bio-offer-actions button {
      flex: 1;
      height: 38px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .bio-skip {
      border: 1.5px solid #d3d2da;
      background: #fff;
      color: #4a5260;
    }
    .bio-enable {
      border: 0;
      background: #3589BD;
      color: #fff;
    }
    .bio-offer-actions button:disabled { opacity: 0.6; cursor: progress; }

    /* ── Дашборд ── */
    .dash {
      display: none;
      max-width: 1100px;
      margin: 28px auto 64px;
      padding: 0 16px;
    }
    .dash.show { display: block; }
    .dash-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .dash-title { margin: 0; font-size: 22px; color: #161d45; }
    /* Кнопка «Выйти» — в стиле «Перейти на страницу входа» в LK-кабинете:
       прозрачная, серая обводка, серый текст, маленькая, внизу страницы. */
    .footer-logout {
      display: flex;
      justify-content: center;
      margin: 28px 0 16px;
    }
    .logout-btn {
      display: inline-block;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 400;
      color: #9096a3;
      background: transparent;
      border: 1px solid #e3e0eb;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: color 0.15s var(--vsc-ease), border-color 0.15s var(--vsc-ease);
    }
    .logout-btn:hover {
      color: #3589BD;
      border-color: #c6dceb;
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      height: 38px; padding: 0 18px;
      border: 1.5px solid #e8e2ee;
      background: #fff; color: #3a4150;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s var(--vsc-ease), border-color 0.2s var(--vsc-ease), color 0.2s var(--vsc-ease);
    }
    .tab-btn:hover { background: #faf9fc; }
    .tab-btn.active { background: #3589BD; color: #fff; border-color: #3589BD; }

    .panel {
      display: none;
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
    }
    .panel.show { display: block; }

    /* ── Заголовок с датой обновления ── */
    .stats-header {
      display: flex; align-items: baseline;
      justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #ece7f2;
    }
    .stats-since { font-size: 13px; color: #737988; }
    .stats-since strong { color: #1d2330; }
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4f9f68;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 0 0 rgba(79, 159, 104, 0.6);
      animation: live-pulse 2s infinite;
    }
    @keyframes live-pulse {
      0% { box-shadow: 0 0 0 0 rgba(79, 159, 104, 0.55); }
      70% { box-shadow: 0 0 0 8px rgba(79, 159, 104, 0); }
      100% { box-shadow: 0 0 0 0 rgba(79, 159, 104, 0); }
    }

    /* ── Hero-карточка «сквозной конверсии» (только в Статистике) ── */
    .hero-conv {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: linear-gradient(135deg, #3589BD 0%, #2b6f96 100%);
      border-radius: 18px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 12px 28px rgba(53, 137, 189, 0.22);
    }
    .hero-conv .num {
      font-size: 56px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .hero-conv .text {
      font-size: 13px;
      line-height: 1.45;
      opacity: 0.95;
    }
    .hero-conv .text strong { font-weight: 600; }
    @media (max-width: 720px) {
      .hero-conv { gap: 14px; padding: 18px; }
      .hero-conv .num { font-size: 44px; }
    }

    /* ── Воронка (универсальная для Статистики и Опросников) ── */
    /* Подход: flex-row на десктопе, flex-column на мобиле. Шаги и чипы
       идут в интерливе в DOM, занимают своё естественное место в обоих
       ориентациях — никаких абсолютных позиционирований. */
    .funnel {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 6px;
    }
    .funnel-step {
      flex: 1 1 0;
      min-width: 0;
      padding: 16px 12px;
      text-align: center;
      background: #f8f7fb;
      border: 1px solid #ece7f2;
      border-radius: 16px;
    }
    .funnel-step.step-1 { background: #f0f7fc; border-color: #d3e7f4; }
    .funnel-step.step-2 { background: #f6f4fb; }
    .funnel-step.step-3 { background: #f6f4fb; }
    .funnel-step.step-4 { background: #eef8f1; border-color: #cfe6d8; }
    .funnel-num {
      font-size: 38px; font-weight: 700;
      color: #161d45; line-height: 1;
      margin-bottom: 6px;
    }
    .funnel-label {
      font-size: 12px; line-height: 1.3;
      color: #4a5260;
    }
    .funnel-conv {
      flex: 0 0 auto;
      align-self: center;
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 999px;
      padding: 4px 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #3589BD;
      white-space: nowrap;
    }

    /* Воронка «по этапам» — 7 шагов. Аккуратные карточки фикс. ширины,
       при нехватке места — горизонтальный скролл (метки не вылезают). */
    .funnel.funnel-stages { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 6px; }
    .funnel.funnel-stages .funnel-step { flex: 0 0 124px; min-width: 124px; padding: 16px 10px; }
    .funnel.funnel-stages .funnel-num { font-size: 32px; }
    .funnel.funnel-stages .funnel-label { overflow-wrap: anywhere; }

    /* ── Блок «Конверсия по оплаченным сделкам amoCRM» (обособленный, сразу под табами) ── */
    #paidConvBlock { margin: 14px 0 18px; }
    .paid-conv {
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 18px;
      padding: 18px;
    }
    .paid-conv-title {
      font-size: 14px;
      font-weight: 600;
      color: #161d45;
      margin-bottom: 4px;
    }
    .paid-conv-sub {
      font-size: 12px;
      color: #737988;
      line-height: 1.4;
      margin-bottom: 14px;
    }
    .paid-conv-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .paid-conv-cell {
      padding: 14px 12px;
      background: #f8f7fb;
      border: 1px solid #ece7f2;
      border-radius: 14px;
      text-align: center;
    }
    .paid-conv-cell.cell-all      { background: #f0f7fc; border-color: #d3e7f4; }
    .paid-conv-cell.cell-nojp     { background: #f6f4fb; border-color: #e3dcef; }
    .paid-conv-cell.cell-jp       { background: #fff3e8; border-color: #f4ddc5; }
    .paid-conv-num {
      font-size: 32px; font-weight: 700; color: #161d45; line-height: 1; margin-bottom: 4px;
    }
    .paid-conv-label {
      font-size: 12px; color: #4a5260; line-height: 1.3;
    }
    .paid-conv-frac {
      font-size: 11px; color: #9096a3; margin-top: 4px;
    }
    .paid-conv-error {
      color: #c4314b; font-size: 12px; padding: 10px; background: #fbebee;
      border: 1px solid #efcfd5; border-radius: 10px; margin-top: 4px;
    }
    @media (max-width: 720px) {
      .paid-conv-grid { grid-template-columns: 1fr; }
      .paid-conv-num { font-size: 28px; }
    }

    /* ── Кнопка раскрытия списка ── */
    .toggle-phones {
      margin-top: 18px;
      width: 100%;
      height: 42px;
      border: 1.5px solid #3589BD;
      background: #fff;
      color: #3589BD;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s var(--vsc-ease);
    }
    .toggle-phones:hover { background: #f0f7fc; }

    /* ── Список номеров ── */
    .phones-list {
      display: none;
      flex-direction: column;
      margin-top: 16px;
      gap: 10px;
    }
    .phones-list.show { display: flex; }
    .phone-row {
      display: grid;
      grid-template-columns: 1.3fr 2fr 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fbfaff;
      border: 1px solid #ece7f2;
      border-radius: 12px;
    }
    .phone-num { font-size: 14px; font-weight: 600; color: #1d2330; }
    .phone-meta { font-size: 12px; color: #9096a3; text-align: right; }

    /* ── Мини-шкала этапов клиента ── */
    .phone-stages {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .stage-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid #d3d2da;
      background: #fff;
      position: relative;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .stage-dot.done {
      border-color: #4f9f68;
      background: #4f9f68;
    }
    .stage-dot.done::after {
      content: "";
      width: 6px; height: 10px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
      margin-top: -2px;
    }
    .stage-line {
      flex: 1;
      height: 2px;
      background: #ece7f2;
      min-width: 12px;
    }
    .stage-line.done { background: #4f9f68; }

    .stage-titles {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 4px;
      margin-top: 4px;
      font-size: 10px;
      line-height: 1.2;
      color: #737988;
      text-align: center;
    }

    .empty-state, .loading-state {
      padding: 24px 0; text-align: center;
      color: #9096a3; font-size: 14px;
    }

    /* ── Опросники (вкладка) ── */
    .surveys-summary {
      display: flex;
      gap: 16px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #ece7f2;
    }
    .surveys-big {
      font-size: 38px; font-weight: 700;
      color: #161d45; line-height: 1;
    }
    .surveys-sub {
      font-size: 13px; color: #737988;
    }
    .surveys-sub strong { color: #1d2330; }
    .surveys-list { display: flex; flex-direction: column; gap: 0; }
    .survey-row {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f3f2f7;
      gap: 12px;
      flex-wrap: wrap;
    }
    .survey-row:last-child { border-bottom: none; }
    .survey-name { flex: 1; font-size: 14px; color: #1d2330; word-break: break-word; }
    .survey-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .survey-btn {
      height: 32px; padding: 0 12px;
      border: 1.5px solid #3589BD;
      background: #fff; color: #3589BD;
      border-radius: 10px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.2s var(--vsc-ease);
    }
    .survey-btn:hover { background: #f0f7fc; }
    .survey-btn.primary { background: #3589BD; color: #fff; }
    .survey-btn.primary:hover { background: #2c7aa6; }

    /* ── Мобила ── */
    @media (max-width: 720px) {
      .funnel { flex-direction: column; gap: 8px; }
      .funnel-conv { margin: -2px auto; padding: 4px 14px; }
      .funnel.funnel-stages { overflow-x: visible; }
      .funnel.funnel-stages .funnel-step { flex: 1 1 auto; min-width: 0; width: 100%; }
      .phone-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .phone-meta { text-align: left; }
      .stage-titles { font-size: 9px; }
    }
  </style>
</head>
<body>
  <div class="brand-bar">
    <img src="/logo.png" alt="VOYO" width="600" height="300" onload="this.classList.add('is-loaded')" onerror="this.classList.add('is-loaded')" />
    <noscript><style>.brand-bar img{opacity:1;transform:none;}</style></noscript>
    <div class="brand-sub">Админка</div>
  </div>

  <!-- ── Логин ── -->
  <div id="loginBlock" class="login-wrap">
    <div class="login-card">
      <div class="sub">Введите код доступа</div>

      <form id="loginForm" class="login-form-inner">
        <input
          id="codeInput"
          class="login-input"
          type="password"
          inputmode="numeric"
          autocomplete="off"
          placeholder="Код доступа"
        />
        <button id="loginBtn" type="submit" class="login-btn">Войти</button>
      </form>

      <button id="bioLoginBtn" type="button" class="bio-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 11a3 3 0 0 0-3 3v1m6-1v3a3 3 0 0 1-6 0M6 11a6 6 0 0 1 12 0v3m-9 4a3 3 0 0 0 6 0M5 8a8 8 0 0 1 14 0M5 14v1a8 8 0 0 0 .35 2.34" />
        </svg>
        Войти по Face ID / отпечатку
      </button>

      <div id="loginError" class="login-error"></div>

      <div id="bioOffer" class="bio-offer">
        <h3>Входить без кода?</h3>
        <p>Включите вход по Face ID / отпечатку — больше не нужно будет вводить код каждый раз на этом устройстве.</p>
        <div class="bio-offer-actions">
          <button type="button" id="bioSkipBtn" class="bio-skip">Не сейчас</button>
          <button type="button" id="bioEnableBtn" class="bio-enable">Включить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Дашборд ── -->
  <div id="dashBlock" class="dash">

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="stats">Статистика (доки)</button>
      <button type="button" class="tab-btn" data-tab="stages">Статистика (этапы)</button>
      <button type="button" class="tab-btn" data-tab="surveys">Опросники</button>
      <button type="button" class="tab-btn" data-tab="traffic">Трафик</button>
    </div>

    <!-- Обособленный блок «Конверсия авторизаций по оплаченным сделкам».
         Виден всегда, независимо от активной вкладки. -->
    <div id="paidConvBlock">
      <div class="loading-state">Загружаем конверсию по оплаченным сделкам…</div>
    </div>

    <div id="panelStats" class="panel show">
      <div id="statsContent">
        <div class="loading-state">Загружаем…</div>
      </div>
    </div>

    <div id="panelStages" class="panel">
      <div id="stagesContent">
        <div class="loading-state">Загружаем…</div>
      </div>
    </div>

    <div id="panelSurveys" class="panel">
      <div id="surveysContent">
        <div class="loading-state">Загружаем…</div>
      </div>
    </div>

    <div id="panelTraffic" class="panel">
      <div id="trafficContent">
        <div class="loading-state">Загружаем…</div>
      </div>
    </div>

    <div class="footer-logout">
      <button id="logoutBtn" type="button" class="logout-btn">Выйти</button>
    </div>
  </div>

  <script>
    (function() {
      const TOKEN_KEY = "voyo_admin_token";
      // Кэш «на этом устройстве кнопка Face ID должна быть видна» — выставляется
      // после успешной аутентификации/регистрации passkey, чтобы при следующих
      // заходах кнопка появлялась СИНХРОННО на render'е, без ожидания async-
      // проверки isUVPAA() и /has-credentials (раньше из-за этого она «прыгала»).
      const BIO_SHOW_CACHE_KEY = "voyo_admin_bio_show";
      const POLL_INTERVAL_MS = 10 * 1000;

      const loginBlock = document.getElementById("loginBlock");
      const dashBlock = document.getElementById("dashBlock");
      const loginForm = document.getElementById("loginForm");
      const codeInput = document.getElementById("codeInput");
      const loginBtn = document.getElementById("loginBtn");
      const loginError = document.getElementById("loginError");
      const logoutBtn = document.getElementById("logoutBtn");

      const bioLoginBtn = document.getElementById("bioLoginBtn");
      const bioOffer = document.getElementById("bioOffer");
      const bioSkipBtn = document.getElementById("bioSkipBtn");
      const bioEnableBtn = document.getElementById("bioEnableBtn");

      const tabBtns = Array.from(document.querySelectorAll(".tab-btn"));
      const panelStats = document.getElementById("panelStats");
      const panelStages = document.getElementById("panelStages");
      const panelSurveys = document.getElementById("panelSurveys");
      const panelTraffic = document.getElementById("panelTraffic");
      const statsContent = document.getElementById("statsContent");
      const stagesContent = document.getElementById("stagesContent");
      const surveysContent = document.getElementById("surveysContent");
      const trafficContent = document.getElementById("trafficContent");

      let activeTab = "stats";
      let phonesExpanded = false;
      let statsSortMode = "stage"; // "stage" (по умолчанию) | "date_asc"
      let stagesExpanded = false;
      let stagesSortMode = "stage";
      let statsPollTimer = null;

      function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
      function setToken(t) { localStorage.setItem(TOKEN_KEY, t || ""); }
      function clearToken() { localStorage.removeItem(TOKEN_KEY); }

      function getBioShowCache() {
        try { return localStorage.getItem(BIO_SHOW_CACHE_KEY) === "1"; }
        catch (_) { return false; }
      }
      function setBioShowCache(v) {
        try {
          if (v) localStorage.setItem(BIO_SHOW_CACHE_KEY, "1");
          else localStorage.removeItem(BIO_SHOW_CACHE_KEY);
        } catch (_) {}
      }
      // Отдельный флаг: «на ЭТОМ устройстве локально есть admin-passkey».
      // Без него navigator.credentials.get() на iOS показывает системный
      // «You don't have any passwords or passkeys saved», даже если на сервере
      // есть passkey'и для других устройств. Флаг ставим только когда
      // tryAdminBioLogin/tryAdminBioRegister прошёл успешно на этом устройстве.
      // Чистим, когда сервер достоверно ответил «hasCredentials: false».
      const LOCAL_PASSKEY_KEY = "voyo_admin_local_passkey";
      function hasLocalPasskeyFlag() {
        try { return localStorage.getItem(LOCAL_PASSKEY_KEY) === "1"; }
        catch (_) { return false; }
      }
      function setLocalPasskeyFlag() {
        try { localStorage.setItem(LOCAL_PASSKEY_KEY, "1"); } catch (_) {}
      }
      function clearLocalPasskeyFlag() {
        try { localStorage.removeItem(LOCAL_PASSKEY_KEY); } catch (_) {}
      }
      function applyBioBtnVisibility(show) {
        bioLoginBtn.classList.toggle("show", !!show);
      }

      function showLogin() {
        loginBlock.style.display = "";
        dashBlock.classList.remove("show");
        codeInput.value = "";
        bioOffer.classList.remove("show");
        stopPolling();
        // Оптимистично показываем кнопку из кэша СРАЗУ, чтобы она не «пропадала»
        // на время async-проверки. Реальная сверка идёт в tryAutoBioOnLoad()
        // и при необходимости поправит видимость + кэш.
        if (getBioShowCache()) applyBioBtnVisibility(true);
      }
      function showDash() {
        loginBlock.style.display = "none";
        dashBlock.classList.add("show");
        bioOffer.classList.remove("show");
        loadStats();
        loadPaidConvStats();
        startPolling();
      }

      // ── WebAuthn helpers ──
      function b64uToBytes(s) {
        const pad = (s + "=".repeat((4 - (s.length % 4)) % 4)).replace(/-/g, "+").replace(/_/g, "/");
        const bin = atob(pad);
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out;
      }
      function bytesToB64u(buf) {
        const arr = buf instanceof Uint8Array ? buf : new Uint8Array(buf);
        let bin = "";
        for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
        return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }
      async function isPlatformAuthAvailable() {
        if (!window.PublicKeyCredential) return false;
        if (typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable !== "function") return false;
        try { return !!(await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()); }
        catch (_) { return false; }
      }
      // Возвращает { hasCreds, known } — known=true только если был чистый
      // HTTP-ответ. Сетевая ошибка / non-OK = known=false (не считаем доказанной
      // отрицательной информацией — иначе кнопка моргала бы на блипах сети).
      async function adminHasCredentials() {
        try {
          const r = await fetch("/admin/api/webauthn/has-credentials", { cache: "no-store" });
          if (!r.ok) return { hasCreds: false, known: false };
          const d = await r.json();
          return { hasCreds: !!(d && d.hasCredentials), known: true };
        } catch (_) {
          return { hasCreds: false, known: false };
        }
      }
      async function maybeShowBioLoginBtn() {
        const [platformOk, credsRes] = await Promise.all([
          isPlatformAuthAvailable(),
          adminHasCredentials()
        ]);
        const localOk = hasLocalPasskeyFlag();
        // Кнопку показываем только при ВСЕХ трёх: platform поддерживает,
        // на сервере есть creds, И на ЭТОМ устройстве passkey локально есть.
        // Иначе клик по кнопке вызовет системный «no passkeys saved» — этого
        // на странице с «нет passkey'я» не должно быть видно.
        const eligible = platformOk && credsRes.hasCreds && localOk;
        if (credsRes.known) {
          // Достоверный ответ от сервера — обновляем видимость и кэш.
          applyBioBtnVisibility(eligible);
          setBioShowCache(eligible);
          // Если сервер сказал «creds нет» — локальный флаг точно устарел.
          if (!credsRes.hasCreds && localOk) clearLocalPasskeyFlag();
        } else if (eligible) {
          // Сетевой сбой, но всё сходится по кэшу + локальному флагу.
          applyBioBtnVisibility(true);
        }
        // Если known=false и eligible=false — НЕ прячем, оставляем как было.
        return eligible;
      }

      // Авто-prompt Face ID / Touch ID при заходе на /admin без сессии:
      // запускаем только если на сервере есть passkey И на ЭТОМ устройстве
      // он реально зарегистрирован локально (флаг hasLocalPasskeyFlag).
      // Без локального флага navigator.credentials.get() на iOS показывает
      // системный «no passkeys saved» — этого мы не хотим, пока passkey
      // не зарегистрирован.
      // Порог для эвристики «passkey удалили из системного хранилища»:
      // реальная отмена Face ID / Touch ID занимает ≥ 2 секунд (биометрический
      // диалог появляется, пользователь сканит / нажимает отмену). А системный
      // диалог «You don't have any passwords or passkeys saved» закрывается
      // тапом по X / Continue и обычно отрабатывает быстрее. Если получили
      // ошибку быстрее, чем за столько мс — считаем, что passkey'я локально
      // больше нет, и чистим LOCAL_PASSKEY_KEY.
      const BIO_FAST_FAIL_MS = 2000;
      function handleFastBioFailure() {
        clearLocalPasskeyFlag();
        setBioShowCache(false);
        applyBioBtnVisibility(false);
      }

      async function tryAutoBioOnLoad() {
        const eligible = await maybeShowBioLoginBtn();
        if (!eligible) return false;
        // Небольшая задержка, чтобы LK-форма успела отрисоваться до системного
        // popup'а — пользователь понимает, ГДЕ он находится, когда видит диалог.
        await new Promise((r) => setTimeout(r, 120));
        const ok = await tryAdminBioLogin();
        if (ok) {
          showDash();
          return true;
        }
        // На отмену / неуспех — форма с кодом уже видна, кнопка Face ID
        // остаётся как fallback. Локальный флаг НЕ чистим даже при быстром
        // отказе: iOS Safari может молча отклонить navigator.credentials.get()
        // из IIFE без user-gesture, и это НЕ означает, что passkey'я нет.
        // Если passkey'я реально нет — fast-fail сработает в click-handler'е
        // кнопки (там есть user-gesture, быстрый отказ — реальный сигнал).
        return false;
      }

      async function tryAdminBioLogin() {
        try {
          const optsR = await fetch("/admin/api/webauthn/auth-options", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}"
          });
          if (!optsR.ok) return false;
          const opts = await optsR.json();
          const publicKey = {
            ...opts,
            challenge: b64uToBytes(opts.challenge),
            allowCredentials: (opts.allowCredentials || []).map((c) => ({ ...c, id: b64uToBytes(c.id) }))
          };
          const assertion = await navigator.credentials.get({ publicKey });
          const verifyR = await fetch("/admin/api/webauthn/auth-verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              assertionResponse: {
                id: assertion.id,
                rawId: bytesToB64u(assertion.rawId),
                type: assertion.type,
                response: {
                  clientDataJSON: bytesToB64u(assertion.response.clientDataJSON),
                  authenticatorData: bytesToB64u(assertion.response.authenticatorData),
                  signature: bytesToB64u(assertion.response.signature),
                  userHandle: assertion.response.userHandle ? bytesToB64u(assertion.response.userHandle) : null
                },
                clientExtensionResults: assertion.getClientExtensionResults ? assertion.getClientExtensionResults() : {}
              }
            })
          });
          const data = await verifyR.json().catch(() => ({}));
          if (verifyR.ok && data.success && data.token) {
            setToken(data.token);
            // Успешный вход — passkey ТОЧНО есть локально на этом устройстве,
            // фиксируем оба флага: и кэш видимости кнопки, и local-passkey.
            setBioShowCache(true);
            setLocalPasskeyFlag();
            return true;
          }
          return false;
        } catch (err) {
          console.warn("admin bio login failed/cancelled:", err);
          return false;
        }
      }

      async function tryAdminBioRegister() {
        const t = getToken();
        if (!t) return false;
        try {
          const optsR = await fetch("/admin/api/webauthn/register-options", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + t
            },
            body: "{}"
          });
          if (!optsR.ok) return false;
          const opts = await optsR.json();
          const publicKey = {
            ...opts,
            challenge: b64uToBytes(opts.challenge),
            user: { ...opts.user, id: b64uToBytes(opts.user.id) },
            excludeCredentials: (opts.excludeCredentials || []).map((c) => ({ ...c, id: b64uToBytes(c.id) }))
          };
          const attestation = await navigator.credentials.create({ publicKey });
          const verifyR = await fetch("/admin/api/webauthn/register-verify", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + t
            },
            body: JSON.stringify({
              attestationResponse: {
                id: attestation.id,
                rawId: bytesToB64u(attestation.rawId),
                type: attestation.type,
                response: {
                  clientDataJSON: bytesToB64u(attestation.response.clientDataJSON),
                  attestationObject: bytesToB64u(attestation.response.attestationObject)
                },
                clientExtensionResults: attestation.getClientExtensionResults ? attestation.getClientExtensionResults() : {}
              }
            })
          });
          const data = await verifyR.json().catch(() => ({}));
          const ok = !!(verifyR.ok && data.success);
          // Регистрация прошла — passkey локально создан на этом устройстве,
          // фиксируем оба флага: видимость кнопки + local-passkey.
          if (ok) {
            setBioShowCache(true);
            setLocalPasskeyFlag();
          }
          return ok;
        } catch (err) {
          console.warn("admin bio register failed/cancelled:", err);
          return false;
        }
      }

      bioLoginBtn.addEventListener("click", async () => {
        if (bioLoginBtn.disabled) return;
        bioLoginBtn.disabled = true;
        const prev = bioLoginBtn.innerHTML;
        bioLoginBtn.innerHTML = "Подтвердите вход…";
        const start = Date.now();
        const ok = await tryAdminBioLogin();
        bioLoginBtn.disabled = false;
        bioLoginBtn.innerHTML = prev;
        if (ok) {
          showDash();
        } else {
          // Та же эвристика, что в tryAutoBioOnLoad: быстрый отказ →
          // passkey удалили из системного хранилища → чистим локальный флаг.
          if (Date.now() - start < BIO_FAST_FAIL_MS) handleFastBioFailure();
          showLoginError("Не удалось войти по биометрии. Попробуйте код.");
        }
      });

      bioSkipBtn.addEventListener("click", () => {
        bioOffer.classList.remove("show");
        showDash();
      });
      bioEnableBtn.addEventListener("click", async () => {
        bioEnableBtn.disabled = true;
        bioSkipBtn.disabled = true;
        const ok = await tryAdminBioRegister();
        bioEnableBtn.disabled = false;
        bioSkipBtn.disabled = false;
        bioOffer.classList.remove("show");
        showDash();
        // Если успешно — следующая сессия покажет кнопку Bio на логине.
      });
      function showLoginError(msg) {
        loginError.textContent = msg || "";
        loginError.classList.add("show");
        codeInput.classList.add("is-error");
      }
      function hideLoginError() {
        loginError.classList.remove("show");
        codeInput.classList.remove("is-error");
      }
      codeInput.addEventListener("input", hideLoginError);

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideLoginError();
        const code = (codeInput.value || "").trim();
        if (!code) { showLoginError("Введите код доступа"); return; }
        loginBtn.disabled = true;
        const prevText = loginBtn.textContent;
        loginBtn.textContent = "Проверка…";
        try {
          const r = await fetch("/admin/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok || !data.success || !data.token) {
            showLoginError(data.message || "Не удалось войти");
            return;
          }
          setToken(data.token);
          // Предлагаем включить вход по Face ID если:
          //  • устройство поддерживает платформенный аутентификатор;
          //  • И либо на сервере вообще нет passkey'я, либо у нас не выставлен
          //    локальный флаг (значит на ЭТОМ устройстве passkey не привязан —
          //    нужно зарегистрировать новую кредитку для текущего девайса).
          const [platformOk, credsRes] = await Promise.all([
            isPlatformAuthAvailable(),
            adminHasCredentials()
          ]);
          if (platformOk && credsRes.known && (!credsRes.hasCreds || !hasLocalPasskeyFlag())) {
            // Показываем оффер; на «Не сейчас» / «Включить» уйдём в дашборд.
            bioOffer.classList.add("show");
            return;
          }
          showDash();
        } catch (_) {
          showLoginError("Сетевая ошибка");
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = prevText;
        }
      });

      logoutBtn.addEventListener("click", async () => {
        const t = getToken();
        if (t) {
          try {
            await fetch("/admin/api/logout", {
              method: "POST",
              headers: { Authorization: "Bearer " + t }
            });
          } catch (_) {}
        }
        clearToken();
        showLogin();
      });

      // Видимость блока «Конверсия по оплаченным сделкам» — только на вкладке «Статистика».
      function applyPaidConvVisibility() {
        const block = document.getElementById("paidConvBlock");
        if (block) block.style.display = (activeTab === "stats" || activeTab === "stages") ? "" : "none";
      }
      applyPaidConvVisibility();

      // Табы
      tabBtns.forEach((b) => {
        b.addEventListener("click", () => {
          const which = b.dataset.tab;
          activeTab = which;
          tabBtns.forEach((x) => x.classList.toggle("active", x === b));
          panelStats.classList.toggle("show", which === "stats");
          panelStages.classList.toggle("show", which === "stages");
          panelSurveys.classList.toggle("show", which === "surveys");
          panelTraffic.classList.toggle("show", which === "traffic");
          applyPaidConvVisibility();
          if (which === "surveys") {
            loadSurveys();
            startPolling();
          } else if (which === "traffic") {
            loadTraffic();
            startPolling();
          } else if (which === "stages") {
            loadStages();
            startPolling();
          } else if (which === "stats") {
            loadStats();
            startPolling();
          }
        });
      });

      // ── Polling ── единый таймер. Активная вкладка обновляется на каждом тике;
      // paid-conv (обособленный блок над табами) обновляется параллельно — он не
      // зависит от вкладки и всегда виден.
      function startPolling() {
        if (statsPollTimer) return;
        statsPollTimer = setInterval(() => {
          if (document.hidden) return;
          if (activeTab === "stats") loadStats({ silent: true });
          else if (activeTab === "stages") loadStages({ silent: true });
          else if (activeTab === "surveys") loadSurveys({ silent: true });
          else if (activeTab === "traffic") loadTraffic({ silent: true });
          loadPaidConvStats({ silent: true });
        }, POLL_INTERVAL_MS);
      }
      function stopPolling() {
        if (statsPollTimer) { clearInterval(statsPollTimer); statsPollTimer = null; }
      }
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) return;
        if (activeTab === "stats") loadStats({ silent: true });
        else if (activeTab === "stages") loadStages({ silent: true });
        else if (activeTab === "surveys") loadSurveys({ silent: true });
        else if (activeTab === "traffic") loadTraffic({ silent: true });
        loadPaidConvStats({ silent: true });
      });

      // ── Fetch helpers ──
      async function apiFetch(url) {
        const t = getToken();
        const r = await fetch(url, { headers: { Authorization: "Bearer " + t } });
        if (r.status === 401) {
          clearToken();
          showLogin();
          throw new Error("Unauthorized");
        }
        const d = await r.json().catch(() => ({}));
        if (!r.ok || !d.success) throw new Error(d.message || "Ошибка");
        return d;
      }

      function formatDateMsk(ms) {
        if (!ms) return "—";
        try {
          return new Date(ms).toLocaleString("ru-RU", { timeZone: "Europe/Moscow" });
        } catch (_) {
          return new Date(ms).toLocaleString("ru-RU");
        }
      }

      function escapeHtml(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // Универсальный билдер воронки. steps: [{idx,num,label}], convs: [pct, pct, ...]
      // Возвращает корневой <div class="funnel"> с интерливом step → conv → step → ...
      function buildFunnel(steps, convs) {
        const f = document.createElement("div");
        f.className = "funnel";
        steps.forEach((s, i) => {
          const cell = document.createElement("div");
          cell.className = "funnel-step step-" + s.idx;
          const n = document.createElement("div");
          n.className = "funnel-num";
          n.textContent = String(s.num || 0);
          const l = document.createElement("div");
          l.className = "funnel-label";
          l.textContent = s.label;
          cell.appendChild(n);
          cell.appendChild(l);
          f.appendChild(cell);
          if (i < steps.length - 1 && i < convs.length) {
            const c = document.createElement("div");
            c.className = "funnel-conv";
            c.textContent = (convs[i] || 0) + "%";
            f.appendChild(c);
          }
        });
        return f;
      }

      // ── Статистика ──
      async function loadStats(opts) {
        const silent = opts && opts.silent;
        if (!silent) statsContent.innerHTML = '<div class="loading-state">Загружаем…</div>';
        try {
          const statsData = await apiFetch("/admin/api/stats");
          renderStats(statsData);
        } catch (e) {
          if (!silent) statsContent.innerHTML = '<div class="empty-state">Ошибка загрузки: ' + escapeHtml(e.message) + '</div>';
        }
      }

      // ── Обособленный блок «Конверсия по оплаченным сделкам» (над табами) ──
      const paidConvBlock = document.getElementById("paidConvBlock");
      async function loadPaidConvStats(opts) {
        const silent = opts && opts.silent;
        if (!silent && paidConvBlock) {
          paidConvBlock.innerHTML = '<div class="loading-state">Загружаем конверсию по оплаченным сделкам…</div>';
        }
        try {
          const paidConv = await apiFetch("/admin/api/paid-conversion-stats");
          renderPaidConvBlock(paidConv);

      function trafficSummary(label, val, color) {
        return '<div style="flex:1;min-width:160px;background:#faf9fc;border:1px solid #ece7f3;border-radius:14px;padding:16px 18px;text-align:center;">'
          + '<div style="font-size:26px;font-weight:700;color:' + color + ';">' + (val || 0) + '</div>'
          + '<div style="font-size:12px;color:#737988;margin-top:4px;">' + label + '</div></div>';
      }

      function renderTraffic(data) {
        const pages = (data && data.pages) || ["welcome", "welcome_schengen", "welcome_japan"];
        const visits = (data && data.visits) || {};
        const visitsAll = (data && data.visitsAll) || { total: 0, yd: 0 };
        const conv = (data && data.conversions) || { total: 0, yd: 0, byPage: {} };
        const NAMES = {
          welcome: "Общая · /welcome",
          welcome_schengen: "Шенген · /welcome_schengen",
          welcome_japan: "Япония · /welcome_japan"
        };
        function pct(n, d) { return d > 0 ? Math.round((n / d) * 100) : 0; }

        const rate = pct(conv.yd, visitsAll.yd);

        const cards = pages.map((p) => {
          const v = visits[p] || { total: 0, yd: 0 };
          const cp = (conv.byPage && conv.byPage[p]) || 0;
          return ''
            + '<div style="flex:1;min-width:210px;background:#fff;border:1px solid #ece7f3;border-radius:16px;padding:18px 20px;">'
            +   '<div style="font-size:13px;font-weight:600;color:#1d2330;margin-bottom:12px;">' + escapeHtml(NAMES[p] || p) + '</div>'
            +   '<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#737988;margin-bottom:6px;"><span>Переходы с Я.Директа</span><b style="color:#3589BD;font-size:18px;">' + (v.yd || 0) + '</b></div>'
            +   '<div style="display:flex;justify-content:space-between;font-size:12px;color:#9096a3;margin-bottom:10px;"><span>Всего визитов</span><span>' + (v.total || 0) + '</span></div>'
            +   '<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#737988;border-top:1px solid #f0eef5;padding-top:10px;"><span>Регистраций</span><b style="color:#4f9f68;font-size:18px;">' + cp + '</b></div>'
            +   '<div style="font-size:11px;color:#9096a3;margin-top:4px;">конверсия Я.Директ → рег.: ' + pct(cp, v.yd) + '%</div>'
            + '</div>';
        }).join("");

        trafficContent.innerHTML = ''
          + '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px;">'
          +   '<div class="stats-since"><span class="live-dot"></span>Трафик с лендингов · переходы и регистрации · обновляется онлайн</div>'
          +   '<div class="stats-since" style="color:#9096a3;">Обновлено: ' + new Date().toLocaleTimeString("ru-RU", { timeZone: "Europe/Moscow" }) + ' МСК</div>'
          + '</div>'
          + '<div class="hero-conv"><div class="num">' + rate + '%</div><div class="text"><strong>Конверсия Яндекс.Директ → регистрация</strong><br>' + (conv.yd || 0) + ' из ' + (visitsAll.yd || 0) + ' переходов с Я.Директа завершились регистрацией в ЛК</div></div>'
          + '<div style="display:flex;gap:14px;flex-wrap:wrap;margin:16px 0;">' + cards + '</div>'
          + '<div style="display:flex;gap:14px;flex-wrap:wrap;">'
          +   trafficSummary("Переходы с Я.Директа", visitsAll.yd, "#3589BD")
          +   trafficSummary("Все визиты лендингов", visitsAll.total, "#1d2330")
          +   trafficSummary("Регистрации с Я.Директа", conv.yd, "#4f9f68")
          +   trafficSummary("Регистрации (всего)", conv.total, "#1d2330")
          + '</div>'
          + '<div style="font-size:12px;color:#9096a3;margin-top:16px;line-height:1.5;">Конверсия = уникальная регистрация в ЛК (новая авторизация + создание нового контакта в amoCRM, одним действием). Переход считается «с Яндекс.Директа», если в ссылке есть <code>yclid</code> или <code>utm_source=yandex</code>. Атрибуция к лендингу — по последнему переходу (cookie, 30 дней).</div>';
      }

        header.appendChild(updated);
        wrap.appendChild(header);

        // Hero: сквозная конверсия «Получили SMS → Отправили опросник».
        const hero = document.createElement("div");
        hero.className = "hero-conv";
        const heroNum = document.createElement("div");
        heroNum.className = "num";
        heroNum.textContent = (conv.sent_to_submitted || 0) + "%";
        const heroText = document.createElement("div");
        heroText.className = "text";
        heroText.innerHTML =
          "<strong>Сквозная конверсия</strong><br>" +
          "из «Получили SMS» в «Отправили опросник»<br>" +
          (totals.submitted || 0) + " из " + (totals.smsSent || 0) + " клиентов прошли весь путь";
        hero.appendChild(heroNum);
        hero.appendChild(heroText);
        wrap.appendChild(hero);

        // Воронка 3 шага
        const funnel = buildFunnel([
          { idx: 1, num: totals.smsSent,   label: "Получили SMS с опросом" },
          { idx: 3, num: totals.clicked,   label: "Перешли по ссылке" },
          { idx: 4, num: totals.submitted, label: "Отправили опросник" }
        ], [
          conv.sent_to_clicked || 0,
          conv.clicked_to_submitted || 0
        ]);
        wrap.appendChild(funnel);

        // Кнопка раскрытия списка
        const toggleBtn = document.createElement("button");
        toggleBtn.type = "button";
        toggleBtn.className = "toggle-phones";
        toggleBtn.textContent = surveysPhonesExpanded
          ? "Скрыть список номеров"
          : "Показать список номеров (" + phones.length + ")";
        wrap.appendChild(toggleBtn);

        // Список
        const list = document.createElement("div");
        list.className = "phones-list" + (surveysPhonesExpanded ? " show" : "");

        if (!phones.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "SMS пока никому не отправлялась.";
          list.appendChild(empty);
        } else {
          phones.forEach((it) => {
            const row = document.createElement("div");
            row.className = "phone-row";

            // Номер + (если есть) ФИО
            const numWrap = document.createElement("div");
            const num = document.createElement("div");
            num.className = "phone-num";
            num.textContent = it.formatted || it.phone;
            numWrap.appendChild(num);
            if (it.fullName) {
              const fio = document.createElement("div");
              fio.style.fontSize = "11px";
              fio.style.color = "#9096a3";
              fio.style.marginTop = "2px";
              fio.textContent = it.fullName;
              numWrap.appendChild(fio);
            }
            row.appendChild(numWrap);

            // 3-шаговая шкала
            const stagesWrap = document.createElement("div");
            const stages = document.createElement("div");
            stages.className = "phone-stages";
            const s = it.stages || {};
            function dot(done) { const d = document.createElement("div"); d.className = "stage-dot" + (done ? " done" : ""); return d; }
            function line(done) { const l = document.createElement("div"); l.className = "stage-line" + (done ? " done" : ""); return l; }
            stages.appendChild(dot(!!s.sent));
            stages.appendChild(line(!!s.clicked));
            stages.appendChild(dot(!!s.clicked));
            stages.appendChild(line(!!s.submitted));
            stages.appendChild(dot(!!s.submitted));

            const titles = document.createElement("div");
            titles.className = "stage-titles";
            titles.style.gridTemplateColumns = "1fr 1fr 1fr";
            titles.innerHTML = "<span>SMS</span><span>клик</span><span>отправил</span>";

            stagesWrap.appendChild(stages);
            stagesWrap.appendChild(titles);
            row.appendChild(stagesWrap);

            // Мета + (если есть PDF) кнопка «Открыть»
            const meta = document.createElement("div");
            meta.className = "phone-meta";
            meta.textContent = formatDateMsk(it.sentAt);
            if (it.pdfFileName) {
              const linkWrap = document.createElement("div");
              linkWrap.style.marginTop = "4px";
              const a = document.createElement("a");
              a.className = "survey-btn primary";
              a.target = "_blank";
              a.rel = "noopener";
              a.href = "/admin/api/surveys/download?name="
                + encodeURIComponent(it.pdfFileName)
                + "&token=" + encodeURIComponent(getToken());
              a.textContent = "Открыть PDF";
              linkWrap.appendChild(a);
              meta.appendChild(linkWrap);
            }
            row.appendChild(meta);

            list.appendChild(row);
          });
        }
        wrap.appendChild(list);

        toggleBtn.addEventListener("click", () => {
          surveysPhonesExpanded = !surveysPhonesExpanded;
          list.classList.toggle("show", surveysPhonesExpanded);
          toggleBtn.textContent = surveysPhonesExpanded
            ? "Скрыть список номеров"
            : "Показать список номеров (" + phones.length + ")";
        });

        surveysContent.innerHTML = "";
        surveysContent.appendChild(wrap);
      }

      // Старт
      (async function bootstrap() {
        // Каждый заход на /admin требует свежей аутентификации — Face ID/Touch ID
        // (если passkey зарегистрирован) или код. Старый admin-токен из
        // localStorage НЕ используется для молчаливого входа: раньше это
        // позволяло попасть в дашборд без какой-либо проверки, если 24-часовой
        // токен с прошлого входа ещё не истёк на сервере. Сам механизм токена
        // остаётся — он создаётся при успешной аутентификации и используется
        // для API-запросов из дашборда (polling и т. д.) в рамках открытой
        // страницы. Закрытие/обновление вкладки → снова требуется auth.
        clearToken();
        showLogin();
        await tryAutoBioOnLoad();
      })();
    })();
  </script>
</body>
</html>
