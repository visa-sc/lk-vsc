<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет Клиента VSC</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="VOYO" />
  <meta name="description" content="VOYO — личный кабинет для подготовки к поездке: визы, страховки, бронирования, банковские карты." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="VOYO" />
  <meta property="og:title" content="VOYO — личный кабинет" />
  <meta property="og:description" content="Личный кабинет для подготовки к поездке: визы, страховки, бронирования, банковские карты." />
  <meta property="og:url" content="https://voyovoyo.ru/" />
  <meta property="og:image" content="https://voyovoyo.ru/logo.png" />
  <meta property="og:image:width" content="600" />
  <meta property="og:image:height" content="300" />
  <meta property="og:image:alt" content="VOYO" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VOYO — личный кабинет" />
  <meta name="twitter:description" content="Личный кабинет для подготовки к поездке." />
  <meta name="twitter:image" content="https://voyovoyo.ru/logo.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f2f7;
      color: #1d2330;
    }

    :root {
      --vsc-ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes vsc-fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    .questionnaire-inline,
    .documents-inline,
    .help-inline {
      animation: vsc-fade-in 0.32s var(--vsc-ease) both;
    }

    .stage {
      transition: color 0.3s var(--vsc-ease);
    }
    .dot {
      transition: border-color 0.3s var(--vsc-ease), background 0.3s var(--vsc-ease), box-shadow 0.3s var(--vsc-ease);
    }

    .questionnaire-btn,
    .upload-btn,
    .docs-correct-btn,
    .search-box button {
      transition: background 0.2s var(--vsc-ease), transform 0.15s var(--vsc-ease), opacity 0.2s var(--vsc-ease), filter 0.2s var(--vsc-ease);
    }
    .questionnaire-btn:hover:not(:disabled),
    .upload-btn:hover:not(:disabled),
    .docs-correct-btn:hover:not(:disabled),
    .search-box button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    .questionnaire-btn:active:not(:disabled),
    .upload-btn:active:not(:disabled),
    .docs-correct-btn:active:not(:disabled),
    .search-box button:active:not(:disabled) {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    .brand-bar {
      max-width: 1200px;
      margin: 40px auto 0;
      padding: 0 24px;
      display: flex;
      justify-content: center;
    }

    .brand-bar img {
      width: 160px;
      height: auto;
      aspect-ratio: 2 / 1;
      mix-blend-mode: multiply;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.55s var(--vsc-ease), transform 0.55s var(--vsc-ease);
    }

    .brand-bar img.is-loaded {
      opacity: 1;
      transform: scale(1);
    }

    .wrap {
      max-width: 1200px;
      margin: 28px auto 40px;
      background: #faf9fc;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(34, 36, 52, 0.05);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f0ebf7;
      color: #7a718d;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      color: #171c29;
    }

    .search-card {
      margin-bottom: 16px;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
    }

    .search-box input {
      width: 100%;
      height: 52px;
      border: 1px solid #ebe6f1;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      color: #1f2532;
      background: #fff;
    }

    .search-box button {
      height: 52px;
      border: none;
      border-radius: 14px;
      background: #3589BD;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .search-box button:disabled,
    .upload-btn:disabled,
    .questionnaire-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .message.error {
      background: #fbebee;
      border: 1px solid #efcfd5;
      color: #a15561;
    }

    .message.success {
      background: #edf8ef;
      border: 1px solid #cfe7d2;
      color: #2e7a43;
    }

    .message.info {
      background: #eef3ff;
      border: 1px solid #d7e0ff;
      color: #4b6198;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: #fff;
      border: 1px solid #ece7f2;
      border-radius: 22px;
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #1d2330;
    }

    .muted {
      color: #9096a3;
      font-size: 14px;
      line-height: 1.5;
    }

    .lead-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .lead-item {
      width: 100%;
      text-align: left;
      border: 1px solid #ebe5f2;
      background: #fcfbfe;
      border-radius: 16px;
      padding: 14px 14px;
      cursor: pointer;
      transition: border-color 0.25s var(--vsc-ease), background 0.25s var(--vsc-ease), transform 0.18s var(--vsc-ease);
      color: #1e2433;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 700;
    }

    .lead-item:active {
      transform: scale(0.99);
    }

    .lead-item-country {
      margin-bottom: 2px;
    }

    .lead-item:hover {
      border-color: #ddd2eb;
      background: #faf7fd;
    }

    .lead-item.active {
      border-color: #73b489;
      background: #eef8f1;
    }

    .status-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .status-top p {
      margin: 0;
      font-size: 14px;
      color: #747b88;
      line-height: 1.55;
      max-width: 740px;
    }

    .stages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 18px;
    }

    .stage {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      color: #9da3ae;
      font-weight: 500;
      line-height: 1.4;
    }

    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #d6dbe2;
      background: #fff;
      flex: 0 0 20px;
    }

    .stage.done,
    .stage.current {
      color: #4f9f68;
    }

    .stage.done .dot {
      border-color: #4f9f68;
      background: #4f9f68;
      box-shadow: inset 0 0 0 4px #fff;
    }

    .stage.current .dot {
      border-color: #4f9f68;
      background: #fff;
      box-shadow: inset 0 0 0 4px #4f9f68;
    }

    .stage.current.warn {
      color: #c89432;
    }

    .stage.current.warn .dot {
      border-color: #e1aa3f;
      background: #fff;
      box-shadow: inset 0 0 0 4px #e1aa3f;
    }

    .questionnaire-inline {
      display: none;
      margin: 0 0 2px 32px;
      padding: 0;
      background: transparent;
    }

    .questionnaire-btn {
      height: 46px;
      border: none;
      border-radius: 14px;
      background: #4f9f68;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 20px;
    }

    .questionnaire-btn.questionnaire-btn-edit {
      background: #3589BD;
      height: 38px;
      padding: 0 18px;
      font-size: 13px;
    }

    .applicant-picker {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-top: 10px;
      max-width: 480px;
    }

    .applicant-picker.show {
      display: flex;
    }

    .applicant-picker.show {
      animation: vsc-fade-in 0.28s var(--vsc-ease) both;
    }

    .applicant-pick-btn {
      width: auto;
      max-width: 100%;
      text-align: left;
      transition: background 0.2s var(--vsc-ease), border-color 0.2s var(--vsc-ease), transform 0.15s var(--vsc-ease);
      border: 1px solid #d3e2ee;
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      color: #1d2330;
      font-weight: 600;
    }

    .applicant-pick-btn:hover {
      background: #f4faff;
      border-color: #3589BD;
    }

    .footer-block {
      margin-top: 18px;
      padding: 18px 20px;
      border: 1px solid #ece7f2;
      border-radius: 18px;
      background: #fff;
    }

    .footer-block h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #9096a3;
      font-weight: 600;
      text-align: center;
    }

    .footer-back-standalone {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .back-to-login-btn {
      display: inline-block;
      padding: 8px 14px;
      font-size: 13px;
      color: #9096a3;
      background: transparent;
      border: 1px solid #e3e0eb;
      border-radius: 12px;
      text-decoration: none;
      transition: 0.15s;
    }

    .back-to-login-btn:hover {
      color: #3589BD;
      border-color: #c6dceb;
    }

    .documents-inline {
      display: none;
      margin: 2px 0 2px 32px;
      padding: 16px;
      border: 1px solid #ece7f2;
      border-radius: 18px;
      background: #faf9fc;
    }

    .documents-inline + .documents-inline {
      margin-top: 10px;
    }

    .documents-inline h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #1d2330;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .file-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-group label {
      font-size: 13px;
      color: #666d7c;
      font-weight: 600;
      min-height: 2.8em;
      line-height: 1.35;
      display: block;
    }

    .file-group input[type="file"] {
      width: 100%;
      border: 1px solid #e8e2ee;
      border-radius: 12px;
      padding: 8px;
      background: #fff;
      font-size: 12px;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
    }

    .file-list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px dashed #ece7f2;
    }

    .file-list-row:first-child {
      border-top: none;
      padding-top: 0;
    }

    .file-list-label {
      font-size: 13px;
      color: #3a4150;
      font-weight: 500;
      line-height: 1.35;
    }

    .file-list-row input[type="file"] {
      max-width: 260px;
      font-size: 12px;
      border: 1px solid #e8e2ee;
      border-radius: 10px;
      padding: 6px 8px;
      background: #fff;
    }

    .file-list-row .file-row-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .file-attach-btn {
      height: 38px;
      padding: 0 16px;
      border: 1.5px solid #3589BD;
      border-radius: 12px;
      background: #fff;
      color: #3589BD;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .file-attach-btn:hover { background: #f0f7fc; }
    .file-attach-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .file-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 260px;
    }

    .file-preview-tile {
      position: relative;
      width: 72px;
      height: 72px;
      border: 1px solid #e8e2ee;
      border-radius: 10px;
      background: #fafafa;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file-preview-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .file-preview-placeholder {
      font-size: 24px;
      color: #9096a3;
      line-height: 1;
    }
    .file-preview-name {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 2px 4px;
      background: rgba(255,255,255,0.92);
      font-size: 10px;
      color: #3a4150;
      line-height: 1.2;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-preview-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: rgba(29, 35, 48, 0.78);
      color: #fff;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }
    .file-preview-remove:hover {
      background: #d97a8a;
    }

    .docs-done-msg {
      font-size: 14px;
      color: #4f9f68;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .docs-local-error {
      color: #c4314b;
      font-size: 13px;
      font-weight: 500;
      margin: 12px 0 14px;
    }

    .file-list-row.is-required-missing .file-list-label {
      color: #c4314b;
    }
    .file-list-row.is-required-missing .file-attach-btn {
      border-color: #d97a8a;
      color: #c4314b;
      background: #fff;
    }
    .file-list-row.is-required-missing .file-attach-btn:hover {
      background: #fbebee;
    }

    .docs-correct-btn {
      height: 38px;
      border: none;
      border-radius: 14px;
      background: #3589BD;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 18px;
    }

    .upload-btn {
      height: 46px;
      border: none;
      border-radius: 14px;
      background: #161d45;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 20px;
    }

    .help-inline {
      display: none;
      margin: 2px 0 2px 32px;
      padding: 14px 16px;
      border: 1px solid #ece7f2;
      border-radius: 18px;
      background: transparent;
    }

    .help-inline h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #9096a3;
      font-weight: 600;
    }

    .help-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .help-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      border: 1px solid #e3e0eb;
      border-radius: 12px;
      background: transparent;
      color: #9096a3;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 0 12px;
      text-decoration: none;
      text-align: center;
      transition: 0.15s;
    }

    .help-btn:hover {
      color: #3589BD;
      border-color: #c6dceb;
    }

    .help-btn .help-icon {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
    }

    @media (max-width: 900px) {
      .brand-bar {
        margin-top: 18px;
        padding: 0 16px;
      }

      .brand-bar img {
        width: 120px;
      }

      .wrap {
        margin: 14px auto 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .search-box {
        grid-template-columns: 1fr;
      }

      .file-grid {
        grid-template-columns: 1fr;
      }

      .file-list-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .file-list-row input[type="file"] {
        max-width: 100%;
      }

      .file-list-row .file-row-controls {
        align-items: stretch;
      }

      .file-previews {
        justify-content: flex-start;
        max-width: 100%;
      }

      .file-attach-btn {
        width: 100%;
      }

      .help-actions {
        grid-template-columns: 1fr;
      }

      .documents-inline,
      .questionnaire-inline,
      .help-inline {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="brand-bar">
    <img src="/logo.png" alt="VOYO" width="600" height="300" fetchpriority="high" onload="this.classList.add('is-loaded')" onerror="this.classList.add('is-loaded')" />
    <noscript><style>.brand-bar img{opacity:1;transform:none;}</style></noscript>
  </div>
  <div class="wrap">
    <input id="phoneInput" type="hidden" />

    <div id="errorBox" class="message error"></div>
    <div id="successBox" class="message success"></div>
    <div id="infoBox" class="message info"></div>

    <div class="grid">
      <div class="card">
        <h2>Ваши обращения</h2>
        <div id="leadsPlaceholder" class="muted">Введите телефон и нажмите кнопку.</div>
        <div id="leadList" class="lead-list"></div>
      </div>

      <div class="card">
        <div class="status-top">
          <div>
            <h2>Статус обращения</h2>
            <p id="statusText">Выберите обращение, чтобы увидеть актуальный статус по нему. Пройденные шаги будут подсвечиваться зелёным цветом.</p>
          </div>
        </div>

        <div id="stages" class="stages"></div>
      </div>
    </div>

    <div class="footer-block">
      <h3>Нужна помощь?</h3>
      <div class="help-actions">
        <a class="help-btn" href="https://wa.me/+79299435150" target="_blank" rel="noopener">
          <svg class="help-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          Написать в WhatsApp

    const STAGES = [

    const phoneInput = document.getElementById("phoneInput");

    function formatFio(name) {
      const s = String(name || "").trim().toLowerCase();
      if (!s) return "";
      return s.replace(/(^|[\s-])(\p{L})/gu, (_, sep, ch) => sep + ch.toUpperCase());
    }

    function showBox(el, message) {
      el.style.display = "block";
      el.textContent = message || "";
    }

    function hideBox(el) {
      el.style.display = "none";
      el.textContent = "";
    }

    function hideMessages() {
      hideBox(errorBox);
      hideBox(successBox);
      hideBox(infoBox);
    }

    function formatDate(timestampSeconds) {
      if (!timestampSeconds) return "без даты";
      const date = new Date(timestampSeconds * 1000);
      return date.toLocaleDateString("ru-RU");
    }

    function getLeadLabel(lead) {
      return `Обращение от ${formatDate(lead.created_at)}`;
    }

    function formatCountryService(value) {
      if (!value || typeof value !== "string") return "";

      const EXCLUDE = new Set([
        "с", "тх", "vms", "бум.", "эл.", "акк", "тур.", "ост.", "ст", "лич",
        "альмавива", "через", "вклейка", "астана", "варшава"
      ]);
      const EXCLUDE_PREFIXES = ["партнер"];

      const cleaned = value.replace(/[\d|]/g, " ");

      const words = cleaned
        .split(/\s+/)
        .filter(Boolean)
        .filter((w) => {
          const lw = w.toLowerCase();
          if (EXCLUDE.has(lw)) return false;
          if (EXCLUDE_PREFIXES.some((p) => lw.startsWith(p))) return false;
          return true;
        });

      if (!words.length) return "";

      const processed = words.map((w) => {
        if (w.toUpperCase() === "США") return "США";
        return w.toLowerCase();
      });

      const first = processed[0];
      if (first !== "США" && first.length > 0) {
        processed[0] = first.charAt(0).toUpperCase() + first.slice(1);
      }

      return processed.join(" ");
    }

    function getCurrentStageIndex(lead) {
      if (typeof lead.cabinet_stage_index === "number") {
        return lead.cabinet_stage_index;
      }
      return 0;
    }

    function createQuestionnaireBlock(lead) {
      const wrapper = document.createElement("div");
      wrapper.className = "questionnaire-inline";
      wrapper.style.display = "block";

      const button = document.createElement("button");
      button.type = "button";
      button.className = "questionnaire-btn";
      button.textContent = "Заполните опросник";

      button.addEventListener("click", () => {
        const phone = phoneInput.value.trim();
        const leadId = lead?.id;

        if (!phone || !leadId) {
          showBox(errorBox, "Не удалось открыть опросник");
          return;
        }

        const url = `/questionnaire-start?phone=${encodeURIComponent(phone)}&leadId=${encodeURIComponent(leadId)}`;
        window.open(url, "_blank");
      });

      wrapper.appendChild(button);

      const picker = document.createElement("div");
      picker.className = "applicant-picker";
      wrapper.appendChild(picker);

      return wrapper;
    }

    function switchQuestionnaireBlockToEdit(blockEl, lead, applicants) {
      if (!blockEl) return;
      const button = blockEl.querySelector(".questionnaire-btn");
      const picker = blockEl.querySelector(".applicant-picker");
      if (!button || !picker) return;

      let doneMsg = blockEl.querySelector(".questionnaire-done-msg");
      if (!doneMsg) {
        doneMsg = document.createElement("div");
        doneMsg.className = "docs-done-msg questionnaire-done-msg";
        doneMsg.textContent = applicants.length > 1 ? "Опросники заполнены." : "Опросник заполнен.";
        blockEl.insertBefore(doneMsg, button);
      }

      button.textContent = "Скорректировать опросник";
      button.classList.add("questionnaire-btn-edit");

      // Заменяем оригинальный listener, клонируя кнопку
      const fresh = button.cloneNode(true);
      button.replaceWith(fresh);

      fresh.addEventListener("click", () => {
        const isOpen = picker.classList.toggle("show");
        fresh.textContent = isOpen ? "Скрыть опросники" : "Скорректировать опросник";
        doneMsg.style.display = isOpen ? "none" : "";
      });

      picker.innerHTML = "";
      applicants.forEach((applicant) => {
        const a = document.createElement("button");
        a.type = "button";
        a.className = "applicant-pick-btn";
        const fio = (applicant && applicant.fullName ? String(applicant.fullName) : "").trim();
        a.textContent = formatFio(fio) || `Заявитель ${applicant.applicantIndex}`;
        a.addEventListener("click", () => {
          const phone = phoneInput.value.trim();
          const leadId = lead?.id;
          if (!phone || !leadId) {
            showBox(errorBox, "Не удалось открыть опросник");
            return;
          }
          const url = `/questionnaire?phone=${encodeURIComponent(phone)}&leadId=${encodeURIComponent(leadId)}&applicantIndex=${applicant.applicantIndex}&edit=1`;
          window.open(url, "_blank");
        });
        picker.appendChild(a);
      });
    }

    async function refreshApplicantsCache() {
      const phone = phoneInput.value.trim();
      if (!phone) return;
      const a = await fetchApplicantStates(phone);
      applicantsCache = a || [];
    }

    async function fetchApplicantStates(phone) {
      try {
        const response = await fetch(`/api/questionnaire-state?phone=${encodeURIComponent(phone)}`);
        if (!response.ok) return [];
        const data = await response.json();
        return data && data.success && Array.isArray(data.applicants) ? data.applicants : [];
      } catch (err) {
        console.error("FETCH STATE ERROR:", err);
        return [];
      }
    }

    // Необязательные области загрузки документов: их пропуск не блокирует кнопку "Загрузить".
    const OPTIONAL_UPLOAD_FIELDS = new Set([
      "invitation",
      "thirdCountryTickets",
      "birthCertificate",
      "sponsorPassport",
      "insurancePolicy",
      "workCert"
    ]);

    function buildUploadBlocksConfig(state) {
      const blocks = [];

      // ── Всегда после "Отправить опросник" ──
      blocks.push({ field: "mainPassport",  label: "Загран. паспорт (в который запрашиваем визу)" });
      blocks.push({ field: "innerPassport", label: "Внутренний паспорт (1-ый разворот, разворот с актуальной пропиской, последний разворот)" });

      // ── По ответам в опроснике ──
      // "У меня есть второй заграничный паспорт" → "Да" → "2-ой загран. паспорт"
      if (state.hasSecondPassport === "Да") {
        blocks.push({ field: "secondPassport", label: "2-ой загран. паспорт" });
      }
      // "Можете ли вы сдать второй паспорт в ВЦ на период рассмотрения?" → "Нет" → "Билеты в 3-ю страну..."
      if (state.canSurrenderPassport === "Нет") {
        blocks.push({ field: "thirdCountryTickets", label: "Билеты в 3-ю страну на второй загран. паспорт" });
      }
      // "Цель поездки" → не "Туризм" → "Приглашение"
      const tripPurpose = (state.tripPurpose || "").trim();
      if (tripPurpose && tripPurpose !== "Туризм") {
        blocks.push({ field: "invitation", label: "Приглашение" });
      }
      // "У меня есть действующая Шенгенская виза" → "Да" → "Фото действующей Шенгенской визы"
      if (state.hasActiveSchengen === "Да") {
        blocks.push({ field: "activeSchengenPhoto", label: "Фото действующей Шенгенской визы" });
      }
      // "У меня были Шенгенские визы за последние 3 года" → "Да" → "Фото последней Шенгенской визы"
      if (state.hadSchengen3Years === "Да") {
        blocks.push({ field: "prevSchengenPhoto", label: "Фото последней Шенгенской визы" });
      }
      // "На момент подачи я буду младше 18 лет" → "Да" → "Свидетельство о рождении"
      if (state.isUnder18 === "Да") {
        blocks.push({ field: "birthCertificate", label: "Свидетельство о рождении" });
      }
      // "Мою поездку спонсирует 3 лицо" → "Да" → "1-ый разворот внутреннего паспорта РФ спонсора"
      if (state.hasSponsor === "Да") {
        blocks.push({ field: "sponsorPassport", label: "1-ый разворот внутреннего паспорта РФ спонсора" });
      }
      // "У меня есть действительная страховка для въезда в Шенген" → "Да" → "Страховой полис для въезда в Шенген"
      if (state.hasInsurance === "Да") {
        blocks.push({ field: "insurancePolicy", label: "Страховой полис для въезда в Шенген" });
      }
      // "Наименование работодателя/учебной организации" → любой ответ кроме "НЕТ" → "Справка с работы или учёбы"
      const employer = (state.employerName || "").trim();
      if (employer && employer.toUpperCase() !== "НЕТ") {
        blocks.push({ field: "workCert", label: "Справка с работы или учёбы" });
      }

      // Сортируем: сначала обязательные, потом необязательные. Внутри групп — исходный порядок.
      const required = blocks.filter((b) => !OPTIONAL_UPLOAD_FIELDS.has(b.field));
      const optional = blocks.filter((b) =>  OPTIONAL_UPLOAD_FIELDS.has(b.field));
      return required.concat(optional);
    }

      const inputs = [];

        function renderPreviews() {
          previewWrap.innerHTML = "";

            if (isImage) {
              const img = document.createElement("img");
              img.alt = file.name || "preview";
              const reader = new FileReader();
              reader.onload = (e) => { img.src = e.target.result; };
              reader.readAsDataURL(file);
              tile.appendChild(img);
            } else {
              const placeholder = document.createElement("div");
              placeholder.className = "file-preview-placeholder";
              placeholder.textContent = "📄";
              tile.appendChild(placeholder);
            }

            const nameEl = document.createElement("div");
            nameEl.className = "file-preview-name";
            nameEl.textContent = file.name || "file";
            tile.appendChild(nameEl);

            const removeBtn = document.createElement("button");
            removeBtn.type = "button";
            removeBtn.className = "file-preview-remove";
            removeBtn.setAttribute("aria-label", "Убрать файл");
            removeBtn.title = "Убрать файл";
            removeBtn.textContent = "×";
            removeBtn.addEventListener("click", () => {
              pendingFiles.splice(idx, 1);
              renderPreviews();
            });
            tile.appendChild(removeBtn);

            previewWrap.appendChild(tile);
          });
          // Кнопка меняет надпись, если уже что-то прикреплено
          attachBtn.textContent = pendingFiles.length > 0
            ? "Добавить ещё"
            : "Прикрепить фото или файл";
        }

        fileInput.addEventListener("change", () => {
          if (fileInput.files && fileInput.files.length > 0) {
            for (let i = 0; i < fileInput.files.length; i++) {
              pendingFiles.push(fileInput.files[i]);
            }
            renderPreviews();
            // Сбрасываем значение, чтобы можно было повторно выбрать тот же файл / сделать ещё одно фото
            fileInput.value = "";
          }
        });

        inputs.push({ cfg, pendingFiles, fileInput, renderPreviews, row });

        row.appendChild(controls);
        list.appendChild(row);
      });

      const localError = document.createElement("div");

      localError.style.display = "none";

      const btnRow = document.createElement("div");

      formState.appendChild(btnRow);

      wrapper.appendChild(formState);

      // ─── Состояние "Документы загружены" ───

      corrBtnRow.appendChild(corrCancelBtn);

      wrapper.appendChild(correctionState);

      let corrCurrent = null; // { cfg, pendingFiles }

      function corrShowError(msg) { corrError.textContent = msg; corrError.style.display = "block"; }
      function corrHideError() { corrError.textContent = ""; corrError.style.display = "none"; }

      function corrUpdateUploadBtn() {
        corrUploadBtn.disabled = !(corrCurrent && corrCurrent.pendingFiles.length > 0);
      }

      function buildCorrectionRow(cfg) {
        const row = document.createElement("div");
        row.className = "file-list-row";

        const labelEl = document.createElement("div");
        labelEl.className = "file-list-label";
        labelEl.textContent = cfg.label;

        fileInput.accept = "image/*,application/pdf";
        fileInput.style.display = "none";

        const attachBtn = document.createElement("button");
        attachBtn.type = "button";
        attachBtn.className = "file-attach-btn";
        attachBtn.textContent = "Прикрепить фото или файл";
        attachBtn.addEventListener("click", () => fileInput.click());
        controls.appendChild(attachBtn);

        const previewWrap = document.createElement("div");
        previewWrap.className = "file-previews";
        controls.appendChild(previewWrap);

        const pendingFiles = [];

        function renderPreviews() {
          previewWrap.innerHTML = "";
          pendingFiles.forEach((file, idx) => {
            const tile = document.createElement("div");
            tile.className = "file-preview-tile";
            const isImage = (file.type || "").indexOf("image/") === 0;
            if (isImage) {
              const img = document.createElement("img");
              img.alt = file.name || "preview";

              reader.readAsDataURL(file);

        }

        fileInput.addEventListener("change", () => {
          if (fileInput.files && fileInput.files.length > 0) {
            for (let i = 0; i < fileInput.files.length; i++) {
              pendingFiles.push(fileInput.files[i]);
            }
            renderPreviews();
            fileInput.value = "";
            corrUpdateUploadBtn();
          }
        });

        row.appendChild(controls);
        return { row, pendingFiles };
      }

      corrPicker.addEventListener("change", () => {
        corrHideError();
        const field = corrPicker.value;
        if (!field) {
          corrSlot.style.display = "none";
          corrSlot.innerHTML = "";
          corrCurrent = null;
          corrUpdateUploadBtn();
          return;
        }
        const cfg = blocksConfig.find((b) => b.field === field);
        if (!cfg) return;
        corrSlot.innerHTML = "";
        const built = buildCorrectionRow(cfg);
        corrSlot.appendChild(built.row);
        corrSlot.style.display = "block";
        corrCurrent = { cfg, pendingFiles: built.pendingFiles };
        corrUpdateUploadBtn();
      });

      function resetCorrection() {
        corrPicker.value = "";
        corrSlot.style.display = "none";
        corrSlot.innerHTML = "";
        corrCurrent = null;
        corrHideError();
        corrUpdateUploadBtn();
      }

      function showDone() {
        formState.style.display = "none";
        doneState.style.display = "block";
        correctionState.style.display = "none";
        cancelCorrectBtn.style.display = "none";
        header.style.display = "none";
        resetCorrection();
      }
      function showForm(viaCorrection) {
        formState.style.display = "block";
        doneState.style.display = "none";
        correctionState.style.display = "none";
        inputs.forEach(({ pendingFiles, fileInput, renderPreviews }) => {
          pendingFiles.length = 0;
          if (fileInput) fileInput.value = "";
          if (renderPreviews) renderPreviews();
        });
        cancelCorrectBtn.style.display = viaCorrection ? "inline-block" : "none";
        header.style.display = "";
      }
      function showCorrection() {
        formState.style.display = "none";
        doneState.style.display = "none";
        correctionState.style.display = "block";
        header.style.display = "";
        resetCorrection();
      }

      // Если все ОБЯЗАТЕЛЬНЫЕ документы уже загружены — сразу done
      // (необязательные области могут быть пустыми)
      const initialFiles = Array.isArray(applicant.uploadedFiles) ? applicant.uploadedFiles : [];
      const alreadyAll = blocksConfig.every((b) => {
        if (OPTIONAL_UPLOAD_FIELDS.has(b.field)) return true;
        return initialFiles.some((f) => {
          if (!f.startsWith(b.label)) return false;
          const next = f.charAt(b.label.length);
          return next === "." || next === " ";
        });
      });
      if (alreadyAll) showDone();

      correctBtn.addEventListener("click", () => {
        hideMessages();
        showCorrection();
      });

      cancelCorrectBtn.addEventListener("click", () => {
        hideLocalError();
        showDone();
      });

      corrCancelBtn.addEventListener("click", () => {
        showDone();
      });

      corrUploadBtn.addEventListener("click", async () => {
        if (!corrCurrent || !corrCurrent.pendingFiles.length) return;
        corrHideError();
        const phone = phoneInput.value.trim();
        if (!phone) { corrShowError("Ошибка загрузки файла"); return; }

        corrUploadBtn.disabled = true;
        const origText = corrUploadBtn.textContent;
        corrUploadBtn.textContent = "Загрузка...";

        const cfg = corrCurrent.cfg;
        const filesToSend = corrCurrent.pendingFiles.slice();
        const leadIdForUpload = lead && lead.id ? String(lead.id) : "";

        try {
          const results = await Promise.all(filesToSend.map(async (file, i) => {
            const fd = new FormData();
            fd.append("phone", phone);
            fd.append("field", cfg.field);
            fd.append("applicantIndex", String(applicantIndex));
            fd.append("partIndex", String(i + 1));
            if (leadIdForUpload) fd.append("leadId", leadIdForUpload);
            fd.append("file", file);
            const r = await fetch("/upload-document", { method: "POST", body: fd });
            const d = await r.json().catch(() => ({}));
            return !!(r.ok && d && d.success);
          }));
          if (!results.every(Boolean)) throw new Error();
          if (lead) {
            await refreshApplicantsCache();
            renderStages(0, lead);
          }
          showDone();
        } catch (_) {
          corrShowError("Ошибка загрузки файла");
          corrUploadBtn.disabled = false;
          corrUploadBtn.textContent = origText;
        }
      });

      function showLocalError(msg) {
        localError.textContent = msg;
        localError.style.display = "block";
      }
      function hideLocalError() {
        localError.textContent = "";
        localError.style.display = "none";
      }

      uploadBtn.addEventListener("click", async () => {
        hideMessages();
        hideLocalError();

        const phone = phoneInput.value.trim();
        if (!phone) {
          showLocalError("Ошибка загрузки файлов");
          return;
        }

        // Снимаем подсветку со всех строк перед новой проверкой
        inputs.forEach(({ row }) => { if (row) row.classList.remove("is-required-missing"); });

        // Проверяем обязательные области: должны быть прикреплены файлы
        const missingRequired = inputs.filter(({ cfg, pendingFiles }) =>
          !OPTIONAL_UPLOAD_FIELDS.has(cfg.field) && (!pendingFiles || pendingFiles.length === 0)
        );
        if (missingRequired.length > 0) {
          missingRequired.forEach(({ row }) => { if (row) row.classList.add("is-required-missing"); });
          showLocalError("Загрузите оставшиеся файлы.");
          // Прокручиваем к первому пустому обязательному
          const firstMissing = missingRequired[0] && missingRequired[0].row;
          if (firstMissing && firstMissing.scrollIntoView) {
            firstMissing.scrollIntoView({ behavior: "smooth", block: "center" });
          }
          return;
        }

        const selected = inputs.filter(({ pendingFiles }) => pendingFiles && pendingFiles.length > 0);
        if (!selected.length) {
          // Все области пустые (включая необязательные) — нечего загружать
          showLocalError("Выберите файлы для загрузки.");
          return;
        }

        uploadBtn.disabled = true;
        uploadBtn.textContent = "Загрузка...";

        // Раскрываем все файлы из pending-очередей в плоский список
        const allTasks = [];
        selected.forEach(({ pendingFiles, cfg }) => {
          pendingFiles.forEach((file, i) => {
            allTasks.push({ file, cfg, partIndex: i + 1 });
          });
        });

        const leadIdForUpload = lead && lead.id ? String(lead.id) : "";
        const results = await Promise.all(allTasks.map(async ({ file, cfg, partIndex }) => {
          try {
            const fd = new FormData();
            fd.append("phone", phone);
            fd.append("field", cfg.field);
            fd.append("applicantIndex", String(applicantIndex));
            fd.append("partIndex", String(partIndex));
            if (leadIdForUpload) fd.append("leadId", leadIdForUpload);
            fd.append("file", file);
            const r = await fetch("/upload-document", { method: "POST", body: fd });
            const d = await r.json();
            return { ok: !!(r.ok && d.success), label: cfg.label };
          } catch (e) {
            return { ok: false, label: cfg.label };
          }
        }));

        uploadBtn.disabled = false;
        uploadBtn.textContent = "Загрузить";

        const failed = results.filter((r) => !r.ok);
        if (failed.length) {
          showLocalError("Ошибка загрузки файлов");
          return;
        }

        showDone();
        // Обновить кэш и цвет этапа (жёлтый → зелёный, если всё собрано)
        if (lead) {
          await refreshApplicantsCache();
          renderStages(0, lead);
        }
      });

      return wrapper;
    }

    function createNoStateNotice() {
      const wrapper = document.createElement("div");
      wrapper.className = "documents-inline";
      wrapper.style.display = "block";
      wrapper.innerHTML = `
        <h3>Загрузка документов</h3>
        <div class="muted">
          После заполнения опросника здесь появятся поля для загрузки нужных документов.
        </div>
      `;
      return wrapper;
    }

    function createHelpBlock() {
      const wrapper = document.createElement("div");
      wrapper.className = "help-inline";
      wrapper.style.display = "block";

      const waIcon = '<svg class="help-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>';

      const phoneIcon = '<svg class="help-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>';

      wrapper.innerHTML = `
        <h3>Нужна помощь?</h3>
        <div class="help-actions">
          <a class="help-btn" href="https://wa.me/+79299435150" target="_blank" rel="noopener">${waIcon}Написать в WhatsApp</a>
          <a class="help-btn" href="https://t.me/vsc_operator" target="_blank" rel="noopener">${tgIcon}Написать в Telegram</a>
          <a class="help-btn" href="tel:+74953691867">${phoneIcon}Позвонить</a>
        </div>
      `;

      return wrapper;
    }

    function createExtraDocBlock(lead) {
      const wrapper = document.createElement("div");
      wrapper.className = "documents-inline";
      wrapper.style.display = "block";

      const desc = document.createElement("div");
      desc.className = "muted";
      desc.style.marginBottom = "12px";
      desc.textContent = "Документы для подачи в Консульство сейчас готовятся Отделом оформления. Если сотрудник попросит вас приложить дополнительный документ, ниже есть свободная область для загрузки файла.";
      wrapper.appendChild(desc);

      const input = document.createElement("input");
      input.type = "file";
      input.multiple = true;
      input.style.display = "block";
      input.style.width = "100%";
      input.style.border = "1px solid #e8e2ee";
      input.style.borderRadius = "12px";
      input.style.padding = "8px";
      input.style.fontSize = "12px";
      input.style.background = "#fff";
      input.style.marginBottom = "10px";
      wrapper.appendChild(input);

      const errMsg = document.createElement("div");
      errMsg.className = "docs-local-error";
      errMsg.style.display = "none";
      wrapper.appendChild(errMsg);

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "docs-correct-btn";
      btn.textContent = "Загрузить";
      wrapper.appendChild(btn);

      function showErr(m) { errMsg.textContent = m; errMsg.style.display = "block"; }
      function hideErr() { errMsg.textContent = ""; errMsg.style.display = "none"; }

      btn.addEventListener("click", async () => {
        hideErr();
        const phone = phoneInput.value.trim();
        if (!phone) { showErr("Ошибка загрузки файла"); return; }
        const files = input.files && input.files.length ? Array.from(input.files) : [];
        if (!files.length) { showErr("Выберите файл для загрузки."); return; }

        btn.disabled = true;
        const orig = btn.textContent;
        btn.textContent = "Загрузка...";

        try {
          const leadIdForExtra = lead && lead.id ? String(lead.id) : "";
          const results = await Promise.all(files.map(async (file) => {
            const fd = new FormData();
            fd.append("phone", phone);
            if (leadIdForExtra) fd.append("leadId", leadIdForExtra);
            fd.append("file", file);
            const r = await fetch("/upload-extra-document", { method: "POST", body: fd });
            const d = await r.json().catch(() => ({}));
            return !!(r.ok && d && d.success);
          }));
          const allOk = results.every(Boolean);
          if (!allOk) throw new Error();
          input.value = "";
          btn.textContent = files.length > 1 ? "Файлы загружены" : "Файл загружен";
          setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1800);
        } catch (e) {
          showErr("Ошибка загрузки файла");
          btn.disabled = false;
          btn.textContent = orig;
        }
      });

      return wrapper;
    }

    function createTelegramBlock() {
      const wrapper = document.createElement("div");
      wrapper.className = "documents-inline";
      wrapper.style.display = "block";
      wrapper.innerHTML = `
        <h3>Подписывайтесь на наш Telegram-канал</h3>
        <div class="muted" style="margin-bottom: 12px;">
          Оставайтесь в курсе туристических новостей.
        </div>
        <a class="upload-btn" href="https://t.me/visa_sc" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;height:38px;padding:0 18px;font-size:13px;background:#3589BD;">
          Перейти на канал
        </a>
      `;
      return wrapper;
    }

    function createBankCardBlock() {
      const wrapper = document.createElement("div");
      wrapper.className = "documents-inline";
      wrapper.style.display = "block";
      wrapper.innerHTML = `
        <h3>Зарубежная банковская карта</h3>
        <div class="muted" style="margin-bottom: 12px;">
          Рассмотрите возможность оформления зарубежной банковской карты, чтобы с комфортом оплачивать товары и услуги в зарубежной поездке.
        </div>
        <a class="upload-btn" href="https://visa-sc.ru/bank_lk/" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;height:38px;padding:0 18px;font-size:13px;background:#3589BD;">
          Узнать подробнее
        </a>
      `;
      return wrapper;
    }

    function renderStages(currentIndex, lead) {
      stagesEl.innerHTML = "";

      const stageNodes = [];

      STAGES.forEach((stageName, index) => {
        const row = document.createElement("div");
        row.className = "stage";

        if (index < currentIndex) row.classList.add("done");
        if (index === currentIndex) row.classList.add("current");

        row.innerHTML = `
          <div class="dot"></div>
          <div>${stageName}</div>
        `;

        stagesEl.appendChild(row);
        stageNodes.push(row);
      });

      if (currentIndex === 0 && stageNodes[0]) {
        // Используем кэш applicants — собран в loadLeads, чтобы не было лагов
        const applicants = Array.isArray(applicantsCache) ? applicantsCache : [];

        const totalFromFirst = applicants.length
          ? (parseInt(applicants[0] && applicants[0].totalApplicants, 10) || applicants.length)
          : 0;
        const allFilled = applicants.length >= totalFromFirst && totalFromFirst > 0;
        const allDocsUploaded = allFilled && applicants.every((a) => {
          const blocks = buildUploadBlocksConfig(a);
          const files = Array.isArray(a.uploadedFiles) ? a.uploadedFiles : [];
          return blocks.every((b) => files.some((f) => {
            if (!f.startsWith(b.label)) return false;
            const next = f.charAt(b.label.length);
            return next === "." || next === " ";
          }));
        });

        // Жёлтый только если что-то ещё не собрано
        if (!(allFilled && allDocsUploaded)) {
          stageNodes[0].classList.add("warn");
        }

        const questionnaireBlock = createQuestionnaireBlock(lead);
        stageNodes[0].after(questionnaireBlock);

        if (!applicants.length) {
          // Опросник не заполнен — стандартный плейсхолдер
          const placeholder = createNoStateNotice();
          questionnaireBlock.after(placeholder);
        } else {
          if (allFilled) {
            switchQuestionnaireBlockToEdit(questionnaireBlock, lead, applicants);
          }
          const fragment = document.createDocumentFragment();
          applicants.forEach((applicant) => {
            const blocksConfig = buildUploadBlocksConfig(applicant);
            if (!blocksConfig.length) return;
            const docsBlock = createDocumentsBlock(applicant, blocksConfig, lead);
            fragment.appendChild(docsBlock);
          });
          if (fragment.childNodes.length) {
            questionnaireBlock.after(fragment);
          } else {
            const placeholder = createNoStateNotice();
            questionnaireBlock.after(placeholder);
          }
        }
      }

      if (currentIndex === 1 && stageNodes[1]) {
        const extraBlock = createExtraDocBlock(lead);
        stageNodes[1].after(extraBlock);
      }

      if (currentIndex === 2 && stageNodes[2]) {
        const bankBlock = createBankCardBlock();
        stageNodes[2].after(bankBlock);
      }

      if (currentIndex === 3 && stageNodes[3]) {
        const bankBlock = createBankCardBlock();
        stageNodes[3].after(bankBlock);
      }

      if (currentIndex === 4 && stageNodes[4]) {
        const tgBlock = createTelegramBlock();
        stageNodes[4].after(tgBlock);
      }
    }

    function selectLead(lead, itemEl) {
      selectedLead = lead;

      document.querySelectorAll(".lead-item").forEach((node) => {
        node.classList.remove("active");
      });

      if (itemEl) itemEl.classList.add("active");

      const currentStageIndex = getCurrentStageIndex(lead);
      const currentStageTitle = STAGES[currentStageIndex] || "Сбор документов";

      statusText.textContent = `Вы выбрали ${getLeadLabel(lead)}. Текущий этап: ${currentStageTitle}.`;
      renderStages(currentStageIndex, lead);
    }

    function renderLeads(leads) {
      leadList.innerHTML = "";

      if (!Array.isArray(leads) || !leads.length) {
        leadsPlaceholder.style.display = "block";
        leadsPlaceholder.textContent = "По этому номеру обращения не найдены.";
        statusText.textContent = "Нет данных для отображения.";
        stagesEl.innerHTML = "";
        selectedLead = null;
        return;
      }

      leadsPlaceholder.style.display = "none";

      leads.forEach((lead, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "lead-item";

        const country = formatCountryService(lead.country_service);
        if (country) {
          const countryLine = document.createElement("div");
          countryLine.className = "lead-item-country";
          countryLine.textContent = country;
          button.appendChild(countryLine);
        }

        const dateLine = document.createElement("div");
        dateLine.textContent = getLeadLabel(lead);
        button.appendChild(dateLine);

        button.addEventListener("click", () => {
          selectLead(lead, button);
        });

        leadList.appendChild(button);

        if (index === 0) {
          selectLead(lead, button);
        }
      });
    }

    async function loadLeads() {
      hideMessages();

      const phone = phoneInput.value.trim();
      if (!phone) {
        window.location.href = "/";
        return;
      }

      leadList.innerHTML = "";
      leadsPlaceholder.style.display = "block";
      leadsPlaceholder.textContent = "Загрузка обращений...";
      statusText.textContent = "Загружаем данные";
      stagesEl.innerHTML = "";
      selectedLead = null;

      try {
        const [leadsResp, applicants] = await Promise.all([
          fetch(`/api/leads?phone=${encodeURIComponent(phone)}`),
          fetchApplicantStates(phone)
        ]);

        applicantsCache = applicants || [];

        if (!leadsResp.ok) {
          const text = await leadsResp.text();
          throw new Error(text || "Ошибка ответа сервера");
        }

        const data = await leadsResp.json();

        if (!data.success) {
          throw new Error(data.message || "Не удалось получить данные");
        }

        renderLeads(data.leads || []);

        if (!(data.leads || []).length) {
          showBox(infoBox, "По этому номеру обращения не найдены");
        }
      } catch (error) {
        console.error("LOAD LEADS ERROR:", error);
        showBox(errorBox, "Ошибка загрузки данных");
        leadsPlaceholder.style.display = "block";
        leadsPlaceholder.textContent = "Ошибка загрузки.";
        statusText.textContent = "Выберите обращение, чтобы увидеть актуальный статус по нему. Пройденные шаги будут подсвечиваться зелёным цветом.";
        stagesEl.innerHTML = "";
      }
    }

    (function bootstrap() {
      const phoneFromUrl = new URLSearchParams(window.location.search).get("phone") || "";
      if (!phoneFromUrl.trim()) {
        window.location.href = "/";
        return;
      }
      phoneInput.value = phoneFromUrl.trim();
      loadLeads();
    })();

    // Авто-обновление при сохранении опросника в другой вкладке
    window.addEventListener("storage", async (event) => {
      if (event.key !== "vsc_questionnaire_updated" || !event.newValue) return;
      try {
        const payload = JSON.parse(event.newValue);
        const evtPhone = String(payload.phone || "").replace(/\D/g, "");
        const myPhone = phoneInput.value.replace(/\D/g, "");
        if (!evtPhone || !myPhone) return;
        const matches = evtPhone === myPhone || myPhone.endsWith(evtPhone) || evtPhone.endsWith(myPhone);
        if (!matches) return;
        await refreshApplicantsCache();
        if (selectedLead && getCurrentStageIndex(selectedLead) === 0) {
          renderStages(0, selectedLead);
        }
      } catch (_) {}
    });
  </script>
